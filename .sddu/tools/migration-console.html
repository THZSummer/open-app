<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据迁移控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .card-header {
            background: #3498db;
            color: white;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .card-body {
            padding: 20px;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #3498db;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-success {
            background: #27ae60;
            color: white;
        }
        
        .btn-success:hover {
            background: #229954;
        }
        
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        
        .btn-warning:hover {
            background: #d68910;
        }
        
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c0392b;
        }
        
        .btn-secondary {
            background: #95a5a6;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .header-list {
            margin-top: 15px;
        }
        
        .header-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        
        .header-item input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .module-select {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .module-select select {
            width: 200px;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #555;
            position: sticky;
            top: 0;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-migrated {
            background: #d4edda;
            color: #155724;
        }
        
        .status-pending {
            background: #e2e3e5;
            color: #383d41;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        
        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-skipped {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        
        .pagination button {
            padding: 8px 16px;
        }
        
        .pagination span {
            font-size: 14px;
            color: #666;
        }
        
        .statistics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .stat-success .stat-value {
            color: #27ae60;
        }
        
        .stat-failed .stat-value {
            color: #e74c3c;
        }
        
        .stat-skipped .stat-value {
            color: #95a5a6;
        }
        
        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-time {
            color: #6a9955;
        }
        
        .log-success {
            color: #4ec9b0;
        }
        
        .log-error {
            color: #f48771;
        }
        
        .log-info {
            color: #9cdcfe;
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 4px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .message-success {
            background: #27ae60;
        }
        
        .message-error {
            background: #e74c3c;
        }
        
        .message-warning {
            background: #f39c12;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            fill: #ddd;
        }
        
        .result-section {
            margin-top: 20px;
        }
        
        .result-section h3 {
            margin-bottom: 15px;
            color: #555;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 22px;
            }
            
            .card-body {
                padding: 15px;
            }
            
            .form-row {
                flex-direction: column;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn-group .btn {
                width: 100%;
            }
            
            .statistics {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>数据迁移控制台</h1>
        
        <div class="card">
            <div class="card-header">配置区域</div>
            <div class="card-body">
                <div class="form-row">
                    <div class="form-group">
                        <label>API地址</label>
                        <input type="text" id="baseUrl" placeholder="http://localhost:8080">
                    </div>
                    <div class="form-group">
                        <label>上下文根</label>
                        <input type="text" id="contextRoot" placeholder="/api/v1" value="/api/v1">
                    </div>
                </div>
                
                <div class="header-list">
                    <label style="margin-bottom: 10px; display: block; font-weight: 500;">请求头</label>
                    <div id="headerList"></div>
                    <button class="btn btn-secondary btn-sm" onclick="addHeader()">+ 添加请求头</button>
                </div>
                
                <div style="margin-top: 15px;">
                    <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
                    <button class="btn btn-secondary" onclick="loadConfig()">加载配置</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">操作区域</div>
            <div class="card-body">
                <div class="module-select">
                    <label>选择模块:</label>
                    <select id="moduleSelect">
                        <option value="category">分类</option>
                        <option value="api">API</option>
                        <option value="event">事件</option>
                        <option value="permission">权限</option>
                        <option value="approval">审批</option>
                        <option value="subscription">订阅</option>
                    </select>
                    <button class="btn btn-primary" onclick="querySourceData()">查询旧数据</button>
                    <button class="btn btn-primary" onclick="queryTargetData()">查询新数据</button>
                    <button class="btn btn-warning" onclick="queryStatus()">查询迁移状态</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">数据列表</div>
            <div class="card-body">
                <div class="loading" id="dataLoading">
                    <div class="spinner"></div>
                    <p>正在加载数据...</p>
                </div>
                
                <div id="dataContent" style="display: none;">
                    <div class="toolbar">
                        <button class="btn btn-secondary btn-sm" onclick="selectAll()">全选</button>
                        <button class="btn btn-secondary btn-sm" onclick="selectNone()">取消选择</button>
                        <button class="btn btn-secondary btn-sm" onclick="selectInvert()">反选</button>
                        <button class="btn btn-secondary btn-sm" onclick="selectPending()">只选未迁移</button>
                    </div>
                    
                    <div class="table-container">
                        <table id="dataTable">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" class="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th>
                                    <th style="width: 80px;">状态</th>
                                    <th style="width: 100px;">ID</th>
                                    <th style="width: 200px;">名称</th>
                                    <th style="width: 150px;">编码</th>
                                    <th style="width: 100px;">数据状态</th>
                                    <th style="width: 150px;">创建时间</th>
                                </tr>
                            </thead>
                            <tbody id="dataBody"></tbody>
                        </table>
                    </div>
                    
                    <div class="pagination">
                        <button class="btn btn-secondary btn-sm" onclick="prevPage()">上一页</button>
                        <span id="pageInfo">第 1 页 / 共 1 页</span>
                        <button class="btn btn-secondary btn-sm" onclick="nextPage()">下一页</button>
                        <select id="pageSizeSelect" onchange="changePageSize()" style="padding: 6px;">
                            <option value="20">20条/页</option>
                            <option value="50" selected>50条/页</option>
                            <option value="100">100条/页</option>
                        </select>
                    </div>
                </div>
                
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                    <p>请选择模块并查询数据</p>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">操作按钮</div>
            <div class="card-body">
                <div class="btn-group">
                    <button class="btn btn-success" onclick="migrateBatch()">迁移勾选数据</button>
                    <button class="btn btn-success" onclick="migrateAll()">全量迁移</button>
                    <button class="btn btn-warning" onclick="validateBatch()">验证勾选数据</button>
                    <button class="btn btn-warning" onclick="validateAll()">全量验证</button>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">结果展示</div>
            <div class="card-body">
                <div class="statistics" id="statistics">
                    <div class="stat-item">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">总数</div>
                    </div>
                    <div class="stat-item stat-success">
                        <div class="stat-value" id="statSuccess">0</div>
                        <div class="stat-label">成功</div>
                    </div>
                    <div class="stat-item stat-failed">
                        <div class="stat-value" id="statFailed">0</div>
                        <div class="stat-label">失败</div>
                    </div>
                    <div class="stat-item stat-skipped">
                        <div class="stat-value" id="statSkipped">0</div>
                        <div class="stat-label">跳过</div>
                    </div>
                </div>
                
                <div class="result-section" id="failedSection" style="display: none;">
                    <h3>失败详情</h3>
                    <div class="table-container">
                        <table id="failedTable">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>名称</th>
                                    <th>错误信息</th>
                                </tr>
                            </thead>
                            <tbody id="failedBody"></tbody>
                        </table>
                    </div>
                </div>
                
                <div class="result-section">
                    <h3>实时日志</h3>
                    <div class="log-container" id="logContainer">
                        <div class="log-entry log-info">等待操作...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class MigrationConfig {
            constructor() {
                this.config = {
                    baseUrl: '',
                    contextRoot: '/api/v1',
                    headers: []
                };
                this.load();
            }
            
            load() {
                const saved = localStorage.getItem('migration_config');
                if (saved) {
                    try {
                        this.config = JSON.parse(saved);
                    } catch (e) {
                        console.error('加载配置失败:', e);
                    }
                }
            }
            
            save() {
                localStorage.setItem('migration_config', JSON.stringify(this.config));
            }
            
            addHeader(name, value) {
                this.config.headers.push({ name, value });
                this.save();
            }
            
            removeHeader(index) {
                this.config.headers.splice(index, 1);
                this.save();
            }
            
            updateConfig(baseUrl, contextRoot, headers) {
                this.config.baseUrl = baseUrl;
                this.config.contextRoot = contextRoot;
                this.config.headers = headers;
                this.save();
            }
        }
        
        class MigrationAPI {
            constructor(config) {
                this.config = config;
            }
            
            getFullUrl(path) {
                const baseUrl = this.config.config.baseUrl.replace(/\/$/, '');
                const contextRoot = this.config.config.contextRoot.replace(/\/$/, '');
                return `${baseUrl}${contextRoot}${path}`;
            }
            
            getHeaders() {
                const headers = {
                    'Content-Type': 'application/json'
                };
                this.config.config.headers.forEach(h => {
                    if (h.name && h.value) {
                        headers[h.name] = h.value;
                    }
                });
                return headers;
            }
            
            async request(method, path, body = null) {
                const url = this.getFullUrl(path);
                const options = {
                    method,
                    headers: this.getHeaders()
                };
                
                if (body) {
                    options.body = JSON.stringify(body);
                }
                
                const response = await fetch(url, options);
                const data = await response.json();
                
                if (data.code !== 0) {
                    throw new Error(data.message || '请求失败');
                }
                
                return data.data;
            }
            
            async getSourceData(module, page = 1, size = 50) {
                return this.request('GET', `/migration/${module}/source?page=${page}&size=${size}`);
            }
            
            async getTargetData(module, page = 1, size = 50) {
                return this.request('GET', `/migration/${module}/target?page=${page}&size=${size}`);
            }
            
            async getStatus(module) {
                return this.request('GET', `/migration/${module}/status`);
            }
            
            async migrateBatch(module, ids) {
                return this.request('POST', `/migration/${module}/batch`, { ids });
            }
            
            async migrateAll(module) {
                return this.request('POST', `/migration/${module}/all`);
            }
            
            async validateBatch(module, ids) {
                return this.request('POST', `/migration/${module}/batch/validate`, { ids });
            }
            
            async validateAll(module) {
                return this.request('POST', `/migration/${module}/all/validate`);
            }
        }
        
        const migrationConfig = new MigrationConfig();
        const migrationAPI = new MigrationAPI(migrationConfig);
        
        let currentPage = 1;
        let pageSize = 50;
        let totalPages = 1;
        let sourceData = [];
        let targetData = [];
        let mergedData = [];
        let selectedIds = new Set();
        let currentDataType = 'source';
        
        function showMessage(message, type = 'success') {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message message-${type}`;
            msgDiv.textContent = message;
            document.body.appendChild(msgDiv);
            
            setTimeout(() => {
                msgDiv.remove();
            }, 3000);
        }
        
        function addLog(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            
            const time = new Date().toLocaleString('zh-CN');
            logEntry.innerHTML = `<span class="log-time">[${time}]</span> ${message}`;
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
        }
        
        function initConfig() {
            document.getElementById('baseUrl').value = migrationConfig.config.baseUrl;
            document.getElementById('contextRoot').value = migrationConfig.config.contextRoot;
            
            const headerList = document.getElementById('headerList');
            headerList.innerHTML = '';
            
            migrationConfig.config.headers.forEach((header, index) => {
                addHeaderRow(header.name, header.value, index);
            });
        }
        
        function addHeaderRow(name = '', value = '', index = null) {
            const headerList = document.getElementById('headerList');
            const headerItem = document.createElement('div');
            headerItem.className = 'header-item';
            headerItem.innerHTML = `
                <input type="text" placeholder="Header Name" value="${name}" class="header-name">
                <input type="text" placeholder="Header Value" value="${value}" class="header-value">
                <button class="btn btn-danger btn-sm" onclick="removeHeaderRow(this)">删除</button>
            `;
            headerList.appendChild(headerItem);
        }
        
        function addHeader() {
            addHeaderRow();
        }
        
        function removeHeaderRow(button) {
            button.parentElement.remove();
        }
        
        function saveConfig() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const contextRoot = document.getElementById('contextRoot').value.trim();
            
            const headerItems = document.querySelectorAll('.header-item');
            const headers = [];
            
            headerItems.forEach(item => {
                const name = item.querySelector('.header-name').value.trim();
                const value = item.querySelector('.header-value').value.trim();
                if (name && value) {
                    headers.push({ name, value });
                }
            });
            
            migrationConfig.updateConfig(baseUrl, contextRoot, headers);
            showMessage('配置保存成功');
            addLog('配置已保存', 'success');
        }
        
        function loadConfig() {
            migrationConfig.load();
            initConfig();
            showMessage('配置加载成功');
            addLog('配置已加载', 'success');
        }
        
        function showLoading() {
            document.getElementById('dataLoading').classList.add('active');
            document.getElementById('dataContent').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';
        }
        
        function hideLoading() {
            document.getElementById('dataLoading').classList.remove('active');
        }
        
        function showDataContent() {
            document.getElementById('dataContent').style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
        }
        
        function showEmptyState() {
            document.getElementById('dataContent').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
        }
        
        function getModule() {
            return document.getElementById('moduleSelect').value;
        }
        
        async function querySourceData() {
            const module = getModule();
            if (!migrationConfig.config.baseUrl) {
                showMessage('请先配置API地址', 'error');
                return;
            }
            
            showLoading();
            currentDataType = 'source';
            addLog(`开始查询 ${module} 模块旧数据...`, 'info');
            
            try {
                const result = await migrationAPI.getSourceData(module, currentPage, pageSize);
                sourceData = result.records || [];
                totalPages = Math.ceil((result.total || 0) / pageSize);
                
                renderDataTable(sourceData, []);
                showDataContent();
                addLog(`查询成功，共 ${result.total || 0} 条数据`, 'success');
            } catch (error) {
                showEmptyState();
                showMessage('查询失败: ' + error.message, 'error');
                addLog(`查询失败: ${error.message}`, 'error');
            } finally {
                hideLoading();
            }
        }
        
        async function queryTargetData() {
            const module = getModule();
            if (!migrationConfig.config.baseUrl) {
                showMessage('请先配置API地址', 'error');
                return;
            }
            
            showLoading();
            currentDataType = 'target';
            addLog(`开始查询 ${module} 模块新数据...`, 'info');
            
            try {
                const result = await migrationAPI.getTargetData(module, currentPage, pageSize);
                targetData = result.records || [];
                totalPages = Math.ceil((result.total || 0) / pageSize);
                
                renderTargetDataTable(targetData);
                showDataContent();
                addLog(`查询成功，共 ${result.total || 0} 条数据`, 'success');
            } catch (error) {
                showEmptyState();
                showMessage('查询失败: ' + error.message, 'error');
                addLog(`查询失败: ${error.message}`, 'error');
            } finally {
                hideLoading();
            }
        }
        
        async function queryStatus() {
            const module = getModule();
            if (!migrationConfig.config.baseUrl) {
                showMessage('请先配置API地址', 'error');
                return;
            }
            
            addLog(`查询 ${module} 模块迁移状态...`, 'info');
            
            try {
                const result = await migrationAPI.getStatus(module);
                
                document.getElementById('statTotal').textContent = result.total || 0;
                document.getElementById('statSuccess').textContent = result.migrated || 0;
                document.getElementById('statFailed').textContent = result.failed || 0;
                document.getElementById('statSkipped').textContent = result.pending || 0;
                
                showMessage(`总数: ${result.total}, 已迁移: ${result.migrated}, 待迁移: ${result.pending}`);
                addLog(`状态: 总数 ${result.total}, 已迁移 ${result.migrated}, 待迁移 ${result.pending}, 失败 ${result.failed}`, 'success');
            } catch (error) {
                showMessage('查询失败: ' + error.message, 'error');
                addLog(`查询失败: ${error.message}`, 'error');
            }
        }
        
        function renderDataTable(records, targetRecords) {
            const targetIds = new Set(targetRecords.map(r => r.sourceId));
            mergedData = records.map(record => ({
                ...record,
                migrated: targetIds.has(record.id)
            }));
            
            const tbody = document.getElementById('dataBody');
            tbody.innerHTML = '';
            
            mergedData.forEach(record => {
                const tr = document.createElement('tr');
                const isChecked = selectedIds.has(record.id);
                
                tr.innerHTML = `
                    <td><input type="checkbox" class="checkbox row-checkbox" data-id="${record.id}" ${isChecked ? 'checked' : ''}></td>
                    <td><span class="status-badge ${record.migrated ? 'status-migrated' : 'status-pending'}">${record.migrated ? '已迁移' : '未迁移'}</span></td>
                    <td>${escapeHtml(record.id || '')}</td>
                    <td>${escapeHtml(record.name || '')}</td>
                    <td>${escapeHtml(record.code || '')}</td>
                    <td>${escapeHtml(record.status || '')}</td>
                    <td>${formatTime(record.createTime) || ''}</td>
                `;
                
                tbody.appendChild(tr);
            });
            
            document.querySelectorAll('.row-checkbox').forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const id = this.dataset.id;
                    if (this.checked) {
                        selectedIds.add(id);
                    } else {
                        selectedIds.delete(id);
                    }
                    updateSelectAllCheckbox();
                });
            });
            
            updatePageInfo();
        }
        
        function renderTargetDataTable(records) {
            const tbody = document.getElementById('dataBody');
            tbody.innerHTML = '';
            
            records.forEach(record => {
                const tr = document.createElement('tr');
                
                tr.innerHTML = `
                    <td><input type="checkbox" class="checkbox row-checkbox" data-id="${record.id}" disabled></td>
                    <td><span class="status-badge status-migrated">已迁移</span></td>
                    <td>${escapeHtml(record.id || '')}</td>
                    <td>${escapeHtml(record.name || '')}</td>
                    <td>${escapeHtml(record.code || '')}</td>
                    <td>${escapeHtml(record.status || '')}</td>
                    <td>${formatTime(record.createTime) || ''}</td>
                `;
                
                tbody.appendChild(tr);
            });
            
            updatePageInfo();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTime(time) {
            if (!time) return '';
            try {
                return new Date(time).toLocaleString('zh-CN');
            } catch (e) {
                return time;
            }
        }
        
        function toggleSelectAll() {
            const checkbox = document.getElementById('selectAllCheckbox');
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            
            rowCheckboxes.forEach(cb => {
                cb.checked = checkbox.checked;
                const id = cb.dataset.id;
                if (checkbox.checked) {
                    selectedIds.add(id);
                } else {
                    selectedIds.delete(id);
                }
            });
        }
        
        function updateSelectAllCheckbox() {
            const rowCheckboxes = document.querySelectorAll('.row-checkbox');
            const allChecked = Array.from(rowCheckboxes).every(cb => cb.checked);
            document.getElementById('selectAllCheckbox').checked = allChecked;
        }
        
        function selectAll() {
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.checked = true;
                selectedIds.add(cb.dataset.id);
            });
            updateSelectAllCheckbox();
        }
        
        function selectNone() {
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.checked = false;
            });
            selectedIds.clear();
            updateSelectAllCheckbox();
        }
        
        function selectInvert() {
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                cb.checked = !cb.checked;
                const id = cb.dataset.id;
                if (cb.checked) {
                    selectedIds.add(id);
                } else {
                    selectedIds.delete(id);
                }
            });
            updateSelectAllCheckbox();
        }
        
        function selectPending() {
            selectedIds.clear();
            mergedData.forEach(record => {
                if (!record.migrated) {
                    selectedIds.add(record.id);
                }
            });
            
            document.querySelectorAll('.row-checkbox').forEach(cb => {
                const id = cb.dataset.id;
                const record = mergedData.find(r => r.id === id);
                cb.checked = record && !record.migrated;
            });
            
            updateSelectAllCheckbox();
        }
        
        function getSelectedIds() {
            return Array.from(selectedIds);
        }
        
        function updatePageInfo() {
            document.getElementById('pageInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                if (currentDataType === 'source') {
                    querySourceData();
                } else {
                    queryTargetData();
                }
            }
        }
        
        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                if (currentDataType === 'source') {
                    querySourceData();
                } else {
                    queryTargetData();
                }
            }
        }
        
        function changePageSize() {
            pageSize = parseInt(document.getElementById('pageSizeSelect').value);
            currentPage = 1;
            if (currentDataType === 'source') {
                querySourceData();
            } else {
                queryTargetData();
            }
        }
        
        function updateStatistics(result) {
            document.getElementById('statTotal').textContent = result.total || 0;
            document.getElementById('statSuccess').textContent = result.success || result.valid || 0;
            document.getElementById('statFailed').textContent = result.failed || result.invalid || 0;
            document.getElementById('statSkipped').textContent = result.skipped || 0;
            
            if (result.details && result.details.length > 0) {
                const failedDetails = result.details.filter(d => d.status === 'failed' || d.status === 'invalid');
                if (failedDetails.length > 0) {
                    document.getElementById('failedSection').style.display = 'block';
                    const failedBody = document.getElementById('failedBody');
                    failedBody.innerHTML = '';
                    
                    failedDetails.forEach(detail => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${escapeHtml(detail.id || '')}</td>
                            <td>${escapeHtml(detail.name || '')}</td>
                            <td>${escapeHtml(detail.message || '')}</td>
                        `;
                        failedBody.appendChild(tr);
                    });
                } else {
                    document.getElementById('failedSection').style.display = 'none';
                }
            }
        }
        
        async function migrateBatch() {
            const module = getModule();
            const ids = getSelectedIds();
            
            if (ids.length === 0) {
                showMessage('请先选择要迁移的数据', 'warning');
                return;
            }
            
            addLog(`开始迁移 ${module} 模块的 ${ids.length} 条数据...`, 'info');
            
            try {
                const result = await migrationAPI.migrateBatch(module, ids);
                updateStatistics(result);
                
                showMessage(`迁移完成: 成功 ${result.success}, 失败 ${result.failed}`);
                addLog(`迁移完成: 成功 ${result.success}, 失败 ${result.failed}, 跳过 ${result.skipped}`, 'success');
                
                querySourceData();
            } catch (error) {
                showMessage('迁移失败: ' + error.message, 'error');
                addLog(`迁移失败: ${error.message}`, 'error');
            }
        }
        
        async function migrateAll() {
            const module = getModule();
            
            if (!confirm(`确定要全量迁移 ${module} 模块的所有数据吗？`)) {
                return;
            }
            
            addLog(`开始全量迁移 ${module} 模块数据...`, 'info');
            
            try {
                const result = await migrationAPI.migrateAll(module);
                updateStatistics(result);
                
                showMessage(`全量迁移完成: 成功 ${result.success}, 失败 ${result.failed}`);
                addLog(`全量迁移完成: 成功 ${result.success}, 失败 ${result.failed}, 跳过 ${result.skipped}`, 'success');
                
                querySourceData();
            } catch (error) {
                showMessage('迁移失败: ' + error.message, 'error');
                addLog(`迁移失败: ${error.message}`, 'error');
            }
        }
        
        async function validateBatch() {
            const module = getModule();
            const ids = getSelectedIds();
            
            if (ids.length === 0) {
                showMessage('请先选择要验证的数据', 'warning');
                return;
            }
            
            addLog(`开始验证 ${module} 模块的 ${ids.length} 条数据...`, 'info');
            
            try {
                const result = await migrationAPI.validateBatch(module, ids);
                updateStatistics(result);
                
                showMessage(`验证完成: 有效 ${result.valid}, 无效 ${result.invalid}`);
                addLog(`验证完成: 有效 ${result.valid}, 无效 ${result.invalid}`, 'success');
            } catch (error) {
                showMessage('验证失败: ' + error.message, 'error');
                addLog(`验证失败: ${error.message}`, 'error');
            }
        }
        
        async function validateAll() {
            const module = getModule();
            
            if (!confirm(`确定要全量验证 ${module} 模块的所有数据吗？`)) {
                return;
            }
            
            addLog(`开始全量验证 ${module} 模块数据...`, 'info');
            
            try {
                const result = await migrationAPI.validateAll(module);
                updateStatistics(result);
                
                showMessage(`全量验证完成: 有效 ${result.valid}, 无效 ${result.invalid}`);
                addLog(`全量验证完成: 有效 ${result.valid}, 无效 ${result.invalid}`, 'success');
            } catch (error) {
                showMessage('验证失败: ' + error.message, 'error');
                addLog(`验证失败: ${error.message}`, 'error');
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            initConfig();
            addLog('迁移控制台已初始化', 'info');
        });
    </script>
</body>
</html>
