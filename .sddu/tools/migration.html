<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据同步工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 15px; font-size: 18px; border-bottom: 2px solid #1890ff; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .radio-group { display: flex; gap: 20px; padding: 10px 0; }
        .radio-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; color: #333; }
        .radio-group input { width: auto; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-success { background: #52c41a; color: white; }
        .btn-success:hover { background: #73d13d; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .result.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .result.error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .result.info { background: #e6f7ff; border: 1px solid #91d5ff; color: #1890ff; }
        .stats { display: flex; gap: 20px; margin-bottom: 15px; }
        .stat-item { flex: 1; text-align: center; padding: 15px; background: #fafafa; border-radius: 4px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #1890ff; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .detail-list { max-height: 200px; overflow-y: auto; }
        .detail-item { padding: 8px; background: #fff1f0; border-left: 3px solid #ff4d4f; margin-bottom: 5px; font-size: 13px; }
        .loading { display: none; text-align: center; padding: 20px; color: #666; }
        .loading.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>配置区域</h2>
            <div class="form-group">
                <label>API地址</label>
                <input type="text" id="apiBase" value="http://localhost:8080/api/v1/sync" placeholder="输入API基础地址">
            </div>
            <div class="form-group">
                <label>Authorization</label>
                <input type="text" id="authHeader" value="" placeholder="输入Authorization请求头">
            </div>
        </div>

        <div class="card">
            <h2>同步操作</h2>
            <div class="form-group">
                <label>模块</label>
                <select id="module">
                    <option value="subscription">订阅关系 (subscription)</option>
                    <option value="approval">审批数据 (approval)</option>
                </select>
            </div>
            <div class="form-group">
                <label>ID列表（逗号分隔）</label>
                <input type="text" id="ids" placeholder="如：1,2,3">
            </div>
            <div class="form-group">
                <label>方向</label>
                <div class="radio-group">
                    <label><input type="radio" name="direction" value="migrate" checked> 迁移（旧→新）</label>
                    <label><input type="radio" name="direction" value="rollback"> 回退（新→旧）</label>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn-primary" onclick="queryStatus()">查询状态</button>
                <button class="btn-success" onclick="executeSync()">执行同步</button>
            </div>
        </div>

        <div class="card">
            <h2>同步结果</h2>
            <div class="loading" id="loading">处理中...</div>
            <div id="resultArea"></div>
        </div>
    </div>

    <script>
        function getHeaders() {
            const auth = document.getElementById('authHeader').value;
            const headers = { 'Content-Type': 'application/json' };
            if (auth) headers['Authorization'] = auth;
            return headers;
        }

        function getModule() {
            return document.getElementById('module').value;
        }

        function getIds() {
            const idsStr = document.getElementById('ids').value.trim();
            if (!idsStr) return [];
            return idsStr.split(',').map(id => parseInt(id.trim())).filter(id => !isNaN(id));
        }

        function getDirection() {
            return document.querySelector('input[name="direction"]:checked').value;
        }

        function showLoading() {
            document.getElementById('loading').classList.add('active');
            document.getElementById('resultArea').innerHTML = '';
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        function renderResult(data, type) {
            const resultArea = document.getElementById('resultArea');
            
            if (type === 'status') {
                const html = `
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value">${data.sourceCount || 0}</div>
                            <div class="stat-label">源数据量</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${data.targetCount || 0}</div>
                            <div class="stat-label">目标数据量</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="color: #faad14;">${data.pending || 0}</div>
                            <div class="stat-label">待同步</div>
                        </div>
                    </div>
                `;
                resultArea.innerHTML = `<div class="result info">${html}</div>`;
            } else if (type === 'sync') {
                const successCount = data.success || 0;
                const failedCount = data.failed || 0;
                const details = data.details || [];

                let detailsHtml = '';
                if (details.length > 0) {
                    detailsHtml = `<div class="detail-list">${details.map(d => 
                        `<div class="detail-item"><strong>ID:${d.id}</strong> ${d.error || '同步失败'}</div>`
                    ).join('')}</div>`;
                }

                const html = `
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value" style="color: #52c41a;">${successCount}</div>
                            <div class="stat-label">成功</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" style="color: #ff4d4f;">${failedCount}</div>
                            <div class="stat-label">失败</div>
                        </div>
                    </div>
                    ${detailsHtml}
                `;
                resultArea.innerHTML = `<div class="result ${failedCount > 0 ? 'error' : 'success'}">${html}</div>`;
            }
        }

        function showError(message) {
            document.getElementById('resultArea').innerHTML = `<div class="result error">${message}</div>`;
        }

        async function queryStatus() {
            showLoading();
            try {
                const response = await fetch(`${document.getElementById('apiBase').value}/${getModule()}/status`, {
                    method: 'GET',
                    headers: getHeaders()
                });
                const result = await response.json();
                hideLoading();
                if (result.code === 0 || result.success) {
                    renderResult(result.data || result, 'status');
                } else {
                    showError(result.message || '查询失败');
                }
            } catch (e) {
                hideLoading();
                showError('请求失败: ' + e.message);
            }
        }

        async function executeSync() {
            const ids = getIds();
            if (ids.length === 0) {
                showError('请输入ID列表');
                return;
            }
            
            showLoading();
            try {
                const response = await fetch(`${document.getElementById('apiBase').value}/${getModule()}/batch`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ ids: ids, direction: getDirection() })
                });
                const result = await response.json();
                hideLoading();
                if (result.code === 0 || result.success) {
                    renderResult(result.data || result, 'sync');
                } else {
                    showError(result.message || '同步失败');
                }
            } catch (e) {
                hideLoading();
                showError('请求失败: ' + e.message);
            }
        }
    </script>
</body>
</html>
