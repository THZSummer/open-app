spring:
  datasource:
    url: jdbc:mysql://localhost:3306/openplatform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      # 单机模式（开发环境）
      host: localhost
      port: 6379
      password: openapp
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
      
      # 集群模式（切换时取消注释，注释上方单机配置）
      # cluster:
      #   nodes:
      #     - 192.168.3.201:6379
      #     - 192.168.3.202:6379
      #     - 192.168.3.203:6379
      #     - 192.168.3.204:6379
      #     - 192.168.3.205:6379
      #   max-redirects: 3

server:
  port: 18081

logging:
  level:
    com.xxx.api: DEBUG
    org.springframework.web: DEBUG
