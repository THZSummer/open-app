spring:
  datasource:
    url: jdbc:mysql://192.168.3.155:3306/openapp?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: openapp
    password: openapp
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      cluster:
        nodes:
          - 192.168.3.201:6379
          - 192.168.3.202:6379
          - 192.168.3.203:6379
          - 192.168.3.204:6379
          - 192.168.3.205:6379
          - 192.168.3.206:6379
        max-redirects: 3
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

server:
  port: 18081

logging:
  level:
    com.xxx.api: DEBUG
    org.springframework.web: DEBUG

# --- 开发环境：内部凭证 bypass + Token 解析 + 白名单 ---
internal:
  auth:
    bypass: false
    allowed-accounts:
      - dev-token-001
      - dev-token-002

