server:
  port: 18180

spring:
  application:
    name: connector-api

  # R2DBC 数据源配置 (Reactive MySQL)
  r2dbc:
    url: r2dbc:mysql://localhost:3306/openapp?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: openapp
    password: openapp
    pool:
      max-size: 20
      initial-size: 5
      max-idle-time: 30m
      validation-query: SELECT 1

  # Reactive Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: openapp
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

# 健康检查配置（不检查数据库和 Redis，避免因外部依赖未就绪导致启动检测失败）
management:
  health:
    db:
      enabled: false
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always