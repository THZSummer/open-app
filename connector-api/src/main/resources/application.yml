server:
  port: 18180

spring:
  application:
    name: connector-api

  # R2DBC 数据源配置 (Reactive MySQL)
  r2dbc:
    url: r2dbc:mysql://localhost:3306/openplatform_v2?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: root
    password: root
    pool:
      max-size: 20
      initial-size: 5
      max-idle-time: 30m
      validation-query: SELECT 1

  # Reactive Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

# Actuator 健康检查
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always