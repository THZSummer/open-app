server:
  port: 18180

spring:
  application:
    name: connector-api

  # R2DBC 数据源配置 (Reactive MySQL) — 对齐 open-server 192.168.3.155
  r2dbc:
    url: r2dbc:mysql://192.168.3.155:3306/openapp?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: openapp
    password: openapp
    pool:
      max-size: 20
      initial-size: 5
      max-idle-time: 30m
      validation-query: SELECT 1

  # Reactive Redis 集群配置 — 对齐 open-server
  data:
    redis:
      cluster:
        nodes:
          - 192.168.3.201:6379
          - 192.168.3.202:6379
          - 192.168.3.203:6379
          - 192.168.3.204:6379
          - 192.168.3.205:6379
          - 192.168.3.206:6379
        max-redirects: 3
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# 健康检查配置（不检查数据库和 Redis，避免因外部依赖未就绪导致启动检测失败）
management:
  health:
    db:
      enabled: true
    redis:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Script HTTP client (default enabled, scripts can call ctx.http.get/post/put)
script.http.client.enabled: true
