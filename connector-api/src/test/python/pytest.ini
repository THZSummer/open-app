[pytest]
testpaths = .
python_files = test_*.py
norecursedirs = inspect .git __pycache__ .pytest_cache
markers =
    L0: 冒烟测试 — 基础连通性 (每次commit)
    L1: 核心功能 — 触发/测试运行/契约格式 (PR门禁)
    L2: 场景链路 — 认证/白名单/脚本/超时/缓存 (每日回归)
    L3: 端到端 — 全链路编排执行 (每周)
    L4: 边界反向 — 异常/校验/限流/极端场景 (发布前)
timeout = 120
addopts = -v --tb=short -m L0
