server:
  port: 18080
  servlet:
    context-path: /market-server

spring:
  profiles:
    active: dev
  application:
    name: market-server
  web:
    resources:
      static-locations: file:${java.io.tmpdir}/
# SpringDoc OpenAPI 配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 日志配置
logging:
  level:
    root: INFO
    com.xxx.it.works.wecode.v2: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"


# 平台配置
platform:
  approval-url-prefix: https://platform.example.com/approval/

# 通讯录 API 配置
wecontact:
  api-url: https://xxx.example.com   # 通讯录 API 基础 URL #ASSUMED
  tenant-id: <运维人工填入>           # x-welink-tenantid
  token: <人工通过工具类获取>          # Authorization（实际通过工具类动态获取）
