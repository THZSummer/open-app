spring:
  # Redis 配置（开发环境）
  data:
    redis:
      # 单机模式（开发环境）
      host: localhost
      port: 6379
      # password: unset  # 开发环境无密码
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
      
      # 集群模式（切换时取消注释，注释上方单机配置）
      # cluster:
      #   nodes:
      #     - 192.168.3.201:6379
      #     - 192.168.3.202:6379
      #     - 192.168.3.203:6379
      #     - 192.168.3.204:6379
      #     - 192.168.3.205:6379
      #   max-redirects: 3

# API Server 配置
api-server:
  url: http://localhost:18081/api-server

# 日志级别
logging:
  level:
    com.xxx.event: DEBUG
