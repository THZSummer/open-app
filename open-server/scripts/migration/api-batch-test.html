<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>接口批量执行工具</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; }
        .section { margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 4px; }
        .label { color: #666; margin-right: 10px; }
        .value { color: #333; word-break: break-all; }
        .config-row { margin: 5px 0; }
        .body-item { background: #fff; padding: 10px; margin: 5px 0; border-radius: 3px; border-left: 3px solid #1890ff; }
        button { margin: 5px; padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; background: #1890ff; color: #fff; }
        button:hover { background: #40a9ff; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result { background: #fff; padding: 10px; margin-top: 10px; border-radius: 3px; white-space: pre-wrap; word-break: break-all; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .success { border-left: 3px solid #52c41a; }
        .error { border-left: 3px solid #ff4d4f; }
    </style>
</head>
<body>
    <h2>接口批量执行工具</h2>
    
    <div class="section">
        <div class="config-row"><span class="label">URL:</span><span class="value" id="url"></span></div>
        <div class="config-row"><span class="label">Method:</span><span class="value" id="method"></span></div>
        <div class="config-row"><span class="label">Headers:</span><span class="value" id="headers"></span></div>
    </div>
    
    <div class="section">
        <span class="label">Body参数列表:</span>
        <div id="bodyList"></div>
    </div>
    
    <div class="section">
        <button onclick="executeSingle()">单个执行</button>
        <button onclick="executeBatch()">批量执行</button>
    </div>
    
    <div class="section">
        <h3>执行结果</h3>
        <div id="results"></div>
    </div>

    <script>
        const CONFIG = {
            url: 'http://localhost:18080/open-server/service/open/v2/sync/subscription/migrate',
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            bodies: [
                { ids: [6001] },
                { ids: [6002] },
                { ids: [6001, 6002] },
                { ids: null }
            ]
        };
        
        function init() {
            document.getElementById('url').textContent = CONFIG.url;
            document.getElementById('method').textContent = CONFIG.method;
            document.getElementById('headers').textContent = JSON.stringify(CONFIG.headers, null, 2);
            
            const bodyList = document.getElementById('bodyList');
            bodyList.innerHTML = CONFIG.bodies.map((body, index) => 
                `<div class="body-item">#${index + 1}: ${JSON.stringify(body)}</div>`
            ).join('');
        }
        
        async function executeRequest(body, index) {
            const resultId = Date.now();
            const results = document.getElementById('results');
            results.insertAdjacentHTML('afterbegin', 
                `<div class="result" id="result-${resultId}">执行 #${index + 1}: ${JSON.stringify(body)}\n请求中...</div>`
            );
            
            const resultEl = document.getElementById(`result-${resultId}`);
            
            try {
                const response = await fetch(CONFIG.url, {
                    method: CONFIG.method,
                    headers: CONFIG.headers,
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                resultEl.className = `result ${response.ok ? 'success' : 'error'}`;
                resultEl.textContent = `执行 #${index + 1}: ${JSON.stringify(body)}\n状态: ${response.status}\n响应:\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultEl.className = 'result error';
                resultEl.textContent = `执行 #${index + 1}: ${JSON.stringify(body)}\n错误: ${error.message}`;
            }
        }
        
        function executeSingle() {
            if (CONFIG.bodies.length > 0) {
                executeRequest(CONFIG.bodies[0], 0);
            }
        }
        
        async function executeBatch() {
            for (let i = 0; i < CONFIG.bodies.length; i++) {
                await executeRequest(CONFIG.bodies[i], i);
            }
        }
        
        init();
    </script>
</body>
</html>
