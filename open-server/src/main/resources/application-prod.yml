server:
  port: 18080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DATABASE:openapp}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:openapp}
    password: ${MYSQL_PASSWORD:openapp}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  redis:
    cluster:
      nodes:
        - 192.168.3.201:6379
        - 192.168.3.202:6379
        - 192.168.3.203:6379
        - 192.168.3.204:6379
        - 192.168.3.205:6379
      max-redirects: 3
    password: ${REDIS_PASSWORD:changeme}
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 20
        max-wait: -1ms
        max-idle: 10
        min-idle: 5

# Mock 配置（生产环境禁用）
mock:
  enabled: false

# 日志配置（生产环境）
logging:
  level:
    root: INFO
    com.xxx.open: INFO
