server:
  port: 18080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/openapp?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: openapp
    password: openapp
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  redis:
    host: localhost
    port: 6379
    password: openapp
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0

# Mock 配置（开发环境启用）
mock:
  enabled: true

# 健康检查配置（不检查数据库和 Redis）
management:
  health:
    db:
      enabled: false
    redis:
      enabled: false

# 日志配置（开发环境）
logging:
  level:
    root: INFO
    com.xxx.open: DEBUG
    org.springframework.web: DEBUG
