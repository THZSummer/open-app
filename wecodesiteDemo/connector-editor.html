                const childError = validateSchemaParamNames(param.children || [], `${location}-${param.paramName}`);
                if (childError) {
                    return childError;
                }
            }
            return '';
        }

        /**
         * 校验参数Schema层级是否超过上限
         * @param {Object} options - 层级校验配置对象
         * @returns {string} 校验失败文案，空字符串表示通过
         */
        function validateSchemaDepth(options) {
            const params = options.params;
            const location = options.location;
            const depth = options.depth;

            if (depth > MAX_SCHEMA_DEPTH) {
                return `${location}：参数层级最多支持${MAX_SCHEMA_DEPTH}层`;
            }

            for (const param of params) {
                const currentPath = `${location}-${param.paramName}`;
                const childError = validateSchemaDepth({
                    params: param.children || [],
                    location: currentPath,
                    depth: depth + 1
                });

                if (childError) {
                    return childError;
                }
            }

            return '';
        }

        /**
         * 判断复杂类型参数下是否存在基础类型子参数
         * @param {Array} children - 子参数列表
         * @returns {boolean} 是否存在基础类型子参数
         */
        function hasBasicTypeChild(children) {
            return children.some(child => {
                if (!isComplexType(child.paramType)) {
                    return true;
                }
                return hasBasicTypeChild(child.children || []);
            });
        }

        /**
         * 校验参数配置中的复杂类型子参数
         * @param {Object} options - 校验配置对象
         * @returns {string} 校验失败文案，空字符串表示通过
         */
        function validateSchemaParams(options) {
            const params = options.params;
            const location = options.location;

            for (const param of params) {
                const currentPath = `${location}-${param.paramName}`;
                if (isComplexType(param.paramType) && !hasBasicTypeChild(param.children || [])) {
                    return `${currentPath}：${param.paramType}类型参数必须包含基础类型子参数`;
                }

                const childError = validateSchemaParams({
                    params: param.children || [],
                    location: currentPath
                });
                if (childError) {
                    return childError;
                }
            }

            return '';
        }

        /**
         * 保存配置
         * 收集所有配置数据并进行验证
         */
        function handleSave() {
            if (!saveConnectorConfig()) {
                return;
            }

            // 退出编辑模式
            exitEditMode();
        }

        /**
         * 返回列表页
         */
        function handleBack() {
            // 如果正在编辑状态，先退出编辑
            if (isEditing) {
                exitEditMode();
            }
            window.location.href = 'connector-list.html';
        }

        /**
         * 导航到指定页面
         * @param {string} page - 目标页面路径
         */
        function navigateTo(page) {
            window.location.href = page;
        }

        // ========================================
        // 初始化
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            initProtocolTypeGroup();
            initAuthTypeGroup();
            renderAuthParams();
            // 渲染入参配置（header/body/query）
            renderParams('requestParams-header', connectorConfig.requestSchema?.header || [], true);
            renderParams('requestParams-body', connectorConfig.requestSchema?.body || [], true);
            renderParams('requestParams-query', connectorConfig.requestSchema?.query || [], true);
            // 渲染出参配置（header/body）
            renderParams('responseParams-header', connectorConfig.responseSchema?.header || [], false);
            renderParams('responseParams-body', connectorConfig.responseSchema?.body || [], false);
            // 初始化版本下拉框
            updateVersionSelect();
            // 初始化底部工具栏状态
            updateRequestToolbar();
            updateResponseToolbar();
            // 初始化按钮状态
            updateVersionButtons();
            // 初始化页面为禁用状态
            const editorPage = document.querySelector('.editor-page');
            if (editorPage) {
                editorPage.classList.add('editor-disabled');
            }
            // 隐藏添加按钮
            document.querySelectorAll('.request-add-btn, .response-add-btn').forEach(btn => {
                btn.style.display = 'none';
            });
            // 隐藏底部入参配置区域
            const requestTabWrapper = document.querySelector('.request-tab-wrapper');
            if (requestTabWrapper) {
                requestTabWrapper.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
