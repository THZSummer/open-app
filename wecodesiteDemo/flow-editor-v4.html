<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接流编辑器 V4 - 连接平台</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
    <style>
        /* ========================================
           全局样式变量
           ======================================== */
        :root {
            --primary-color: #1677ff;
            --primary-hover: #4096ff;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --error-color: #ff4d4f;
            --text-primary: #1f2329;
            --text-secondary: #4e5969;
            --text-tertiary: #86909c;
            --border-color: #d9dfe8;
            --bg-page: #f3f6fb;
            --bg-white: #ffffff;
            --bg-soft: #f8fbff;
            --shadow-sm: 0 4px 12px rgba(24, 39, 75, 0.05);
            --shadow-md: 0 12px 32px rgba(24, 39, 75, 0.12);
            --radius-lg: 14px;
            --radius-md: 10px;
        }

        /* ========================================
           基础页面样式
           ======================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            background: radial-gradient(circle at 18% 12%, rgba(22, 119, 255, 0.10), transparent 28%), var(--bg-page);
            font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
            font-size: 14px;
            line-height: 1.55;
        }

        /* ========================================
           页面布局
           ======================================== */
        .page-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.94);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(16px);
        }

        .sidebar-header {
            padding: 22px 24px;
            border-bottom: 1px solid var(--border-color);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            flex: 1;
            list-style: none;
            padding: 14px 0;
        }

        .sidebar-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sidebar-item:hover {
            color: var(--primary-color);
            background: #eef6ff;
        }

        .sidebar-item.active {
            color: var(--primary-color);
            background: linear-gradient(90deg, #e8f3ff 0%, #ffffff 100%);
            font-weight: 600;
        }

        .sidebar-item.active::after {
            content: "";
            position: absolute;
            right: 0;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 2px 0 0 2px;
            background: var(--primary-color);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========================================
           顶部区域
           ======================================== */
        .editor-header {
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
        }

        .header-left,
        .header-right,
        .version-selector,
        .version-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .header-left {
            flex: 1;
            min-width: 0;
        }

        .header-right {
            flex-shrink: 0;
        }

        .back-btn {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .back-btn:hover {
            color: var(--primary-color);
        }

        .flow-name {
            font-size: 16px;
            font-weight: 650;
            max-width: 240px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex-shrink: 1;
        }

        .version-selector .form-select {
            width: 240px !important;
            min-width: 0;
        }

        .version-actions .btn {
            white-space: nowrap;
        }

        .node-count {
            color: var(--text-tertiary);
            font-size: 12px;
        }

        /* ========================================
           通用控件
           ======================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 32px;
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 7px;
            color: var(--text-primary);
            background: var(--bg-white);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn:hover:not(:disabled) {
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: var(--shadow-sm);
        }

        .btn:disabled {
            color: #b8bec8;
            cursor: not-allowed;
            background: #f5f7fa;
        }

        .btn-primary {
            color: #fff;
            border-color: var(--primary-color);
            background: var(--primary-color);
        }

        .btn-primary:hover:not(:disabled) {
            color: #fff;
            border-color: var(--primary-hover);
            background: var(--primary-hover);
        }

        .btn-danger {
            color: var(--error-color);
            border-color: #ffccc7;
        }

        .btn-small {
            min-height: 28px;
            padding: 4px 10px;
            font-size: 12px;
        }

        .form-select,
        .form-input,
        .form-textarea {
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            background: #fff;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-select,
        .form-input {
            height: 34px;
            padding: 0 10px;
        }

        .form-textarea {
            min-height: 88px;
            padding: 8px 10px;
            resize: vertical;
        }

        .form-select:focus,
        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(22, 119, 255, 0.10);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 7px;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 650;
        }

        .form-help {
            margin-top: 6px;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        /* ========================================
           内容区域
           ======================================== */
        .editor-content {
            flex: 1;
            min-height: 0;
            overflow: auto;
            padding: 22px 26px 36px;
        }

        .workspace-shell {
            width: min(1180px, 100%);
            margin: 0 auto;
        }

        .flow-workspace.readonly .form-input,
        .flow-workspace.readonly .form-select,
        .flow-workspace.readonly .form-textarea,
        .flow-workspace.readonly .btn:not(.flow-step),
        .flow-workspace.readonly .flow-step-add,
        .flow-workspace.readonly .mode-card,
        .flow-workspace.readonly .node-action-btn {
            pointer-events: none;
            opacity: 0.7;
        }

        /* ========================================
           无版本状态
           ======================================== */
        .no-version-flow-state {
            display: none;
            min-height: 460px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 14px;
            border: 1px dashed #b7d8ff;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.72);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .no-version-flow-state.active {
            display: flex;
        }

        .no-version-flow-icon {
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            color: #0958d9;
            background: #e6f4ff;
            font-size: 36px;
        }

        .no-version-flow-text {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* ========================================
           编排模式选择
           ======================================== */
        .mode-panel {
            margin-bottom: 18px;
            padding: 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.88);
            box-shadow: var(--shadow-sm);
        }

        .mode-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .mode-title {
            font-size: 16px;
            font-weight: 700;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .mode-card {
            position: relative;
            min-height: 116px;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 13px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mode-card:hover {
            border-color: var(--primary-color);
            transform: translateY(-1px);
            box-shadow: var(--shadow-sm);
        }

        .mode-card.active {
            border-color: var(--primary-color);
            background: linear-gradient(135deg, #ffffff 0%, #eef7ff 100%);
            box-shadow: 0 10px 22px rgba(22, 119, 255, 0.12);
        }

        .mode-card-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 700;
        }

        .mode-card-desc {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .mode-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 9px;
            color: #fff;
            background: var(--primary-color);
            font-size: 13px;
        }

        /* ========================================
           节点卡片编排区域
           ======================================== */
        .flow-stage {
            display: none;
            padding-bottom: 24px;
        }

        .flow-stage.active {
            display: block;
        }

        /* ========================================
           步骤条
           ======================================== */
        .flow-stepper-wrap {
            position: relative;
            margin-bottom: 16px;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .flow-stepper {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
        }

        .flow-stepper::-webkit-scrollbar {
            height: 6px;
        }

        .flow-stepper::-webkit-scrollbar-thumb {
            background: #d9dfe8;
            border-radius: 999px;
        }

        .flow-stepper::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        .flow-step {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            color: var(--text-secondary);
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .flow-step:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .flow-step.active {
            border-color: var(--primary-color);
            color: #fff;
            background: var(--primary-color);
            box-shadow: 0 8px 18px rgba(22, 119, 255, 0.18);
            font-weight: 650;
        }

        .flow-step .step-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(22, 119, 255, 0.10);
            color: var(--primary-color);
            font-size: 12px;
            font-weight: 700;
        }

        .flow-step.active .step-index {
            background: rgba(255, 255, 255, 0.22);
            color: #fff;
        }

        .flow-step-link {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .flow-step-link::before {
            content: "";
            display: inline-block;
            width: 28px;
            height: 2px;
            border-radius: 2px;
            background: linear-gradient(90deg, #d9dfe8, #b6c4dc);
        }

        .flow-step-add {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: 1px dashed var(--primary-color);
            border-radius: 50%;
            background: rgba(22, 119, 255, 0.05);
            color: var(--primary-color);
            cursor: pointer;
            font-size: 16px;
        }

        .flow-step-add:hover {
            background: var(--primary-color);
            color: #fff;
        }

        .flow-active-node {
            margin-top: 4px;
        }

        .node-card {
            overflow: hidden;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-left-width: 4px;
            border-radius: var(--radius-lg);
            background: rgba(255, 255, 255, 0.94);
            box-shadow: var(--shadow-sm);
        }

        .node-card.trigger {
            border-left-color: #1677ff;
        }

        .node-card.connector {
            border-left-color: #52c41a;
        }

        .node-card.script {
            border-left-color: #fa8c16;
        }

        .node-card.parallel {
            border-left-color: #597ef7;
        }

        .node-card.output {
            border-left-color: #eb2f96;
        }

        .node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 13px 16px;
            border-bottom: 1px solid #eef1f6;
            background: linear-gradient(90deg, #fbfdff, #ffffff);
        }

        .node-title-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
        }

        .node-icon.trigger {
            background: #1677ff;
        }

        .node-icon.connector {
            background: #52c41a;
        }

        .node-icon.script {
            background: #fa8c16;
        }

        .node-icon.parallel {
            background: #597ef7;
        }

        .node-icon.output {
            background: #eb2f96;
        }

        .node-title {
            font-size: 15px;
            font-weight: 700;
        }

        .node-subtitle {
            margin-top: 1px;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        .node-body {
            padding: 16px;
        }

        .insert-row {
            display: flex;
            justify-content: center;
            margin: 0 0 12px;
        }

        .insert-btn {
            color: var(--primary-color);
            border-style: dashed;
            background: rgba(255, 255, 255, 0.86);
        }

        /* ========================================
           参数配置样式
           ======================================== */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .tab-btn {
            padding: 5px 12px;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            color: var(--text-secondary);
            background: #fff;
            cursor: pointer;
            font-size: 12px;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-color: var(--primary-color);
            background: #e6f4ff;
            font-weight: 650;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .schema-list,
        .mapping-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .schema-item,
        .mapping-item,
        .auth-item,
        .systoken-item {
            padding: 10px;
            border: 1px solid #edf0f5;
            border-radius: 10px;
            background: var(--bg-soft);
        }

        .schema-row,
        .mapping-row,
        .systoken-row {
            display: grid;
            grid-template-columns: 1.1fr 120px 1.5fr auto;
            gap: 8px;
            align-items: center;
        }

        .mapping-row {
            grid-template-columns: 1fr 120px 1.6fr;
        }

        .systoken-row {
            grid-template-columns: 1fr auto;
        }

        .add-param-btn {
            margin-top: 8px;
            border: none;
            color: var(--primary-color);
            background: transparent;
            cursor: pointer;
            font-size: 13px;
        }

        .param-pill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin: 2px 4px 2px 0;
            padding: 3px 8px;
            border-radius: 999px;
            color: #0958d9;
            background: #e6f4ff;
            font-size: 12px;
        }

        .empty-hint {
            padding: 12px;
            border: 1px dashed var(--border-color);
            border-radius: 10px;
            color: var(--text-tertiary);
            background: #fff;
            text-align: center;
            font-size: 13px;
        }

        /* ========================================
           脚本编辑器样式
           ======================================== */
        .script-editor {
            height: 260px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            border-radius: 10px;
        }

        .script-fallback {
            font-family: Consolas, Monaco, "Courier New", monospace;
            min-height: 230px;
        }

        .script-status {
            margin-top: 8px;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        .script-status.error {
            color: var(--error-color);
        }

        .script-status.success {
            color: var(--success-color);
        }

        /* ========================================
           并行节点样式
           ======================================== */
        .parallel-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .branch-panel {
            padding: 14px;
            border: 1px solid #c9d7ff;
            border-radius: 13px;
            background: #f8faff;
        }

        .branch-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        /* ========================================
           弹窗与提示
           ======================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(8, 15, 26, 0.42);
        }

        .modal-overlay.active {
            display: flex;
        }

        /* ========================================
           抽屉
           ======================================== */
        .drawer-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 999;
        }

        .drawer-overlay.active {
            display: block;
        }

        .drawer {
            position: absolute;
            background: #fff;
            box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.18);
            display: flex;
            flex-direction: column;
        }

        .drawer-right {
            top: 0;
            right: 0;
            bottom: 0;
            width: min(520px, 92vw);
        }

        .drawer-bottom {
            left: 0;
            right: 0;
            bottom: 0;
            height: min(560px, 86vh);
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .drawer-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .drawer-body {
            flex: 1;
            overflow: auto;
            padding: 18px 20px;
        }

        .drawer-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            padding: 12px 20px;
            border-top: 1px solid var(--border-color);
            background: #fafbfc;
        }

        .debug-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .debug-tab {
            padding: 8px 14px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            border-bottom: 2px solid transparent;
        }

        .debug-tab.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            font-weight: 600;
        }

        .debug-panel {
            display: none;
        }

        .debug-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-tip {
            margin-top: 4px;
            color: var(--text-tertiary);
            font-size: 12px;
        }

        .drawer-divider {
            height: 1px;
            background: var(--border-color);
            margin: 16px 0;
        }

        .cache-toggle-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 12px;
        }

        .cache-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .cache-key-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .cache-key-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .cache-key-item .form-select {
            flex: 1;
        }

        .add-param-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding: 6px 12px;
            border: 1px dashed var(--primary-color);
            border-radius: 6px;
            background: rgba(22, 119, 255, 0.05);
            color: var(--primary-color);
            font-size: 12px;
            cursor: pointer;
        }

        .add-param-btn:hover {
            background: var(--primary-color);
            color: #fff;
        }

        .cache-key-preview {
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            word-break: break-all;
        }

        /* 调试入参 tabs */
        .param-tabs {
            display: flex;
            gap: 6px;
            margin: 8px 0 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            padding: 8px 14px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            font-weight: 600;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .schema-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .schema-row {
            display: grid;
            grid-template-columns: 1fr 100px 1.4fr;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #fafbfc;
        }

        .schema-row .param-name {
            font-weight: 600;
        }

        .schema-row .param-type {
            color: var(--text-tertiary);
            font-size: 12px;
        }

        .schema-empty {
            padding: 14px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 12px;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
        }

        .debug-output {
            margin-top: 12px;
            padding: 16px;
            background: #1e1e1e;
            border-radius: 6px;
            color: #d4d4d4;
            font-family: monospace;
            font-size: 13px;
            min-height: 150px;
            white-space: pre-wrap;
            overflow: auto;
        }

        .modal {
            width: min(620px, 92vw);
            max-height: 88vh;
            overflow: hidden;
            border-radius: 14px;
            background: #fff;
            box-shadow: var(--shadow-md);
        }

        .modal-header,
        .modal-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-footer {
            justify-content: flex-end;
            border-top: 1px solid var(--border-color);
            border-bottom: none;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
        }

        .modal-close:hover {
            background: #f2f4f8;
        }

        .modal-body {
            max-height: 68vh;
            overflow: auto;
            padding: 18px;
        }

        .insert-node-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .insert-node-option {
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .insert-node-option:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-sm);
            transform: translateY(-1px);
        }

        .insert-node-option-title {
            margin-bottom: 6px;
            font-weight: 700;
        }

        .insert-node-option-desc {
            color: var(--text-secondary);
            font-size: 13px;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 32px;
            z-index: 200;
            transform: translateX(-50%) translateY(18px);
            min-width: 220px;
            padding: 10px 16px;
            border-radius: 999px;
            color: #fff;
            background: rgba(31, 35, 41, 0.92);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: var(--success-color);
        }

        .toast.error {
            background: var(--error-color);
        }

        /* ========================================
           响应式处理
           ======================================== */
        @media (max-width: 980px) {
            .sidebar {
                width: 184px;
            }

            .mode-grid {
                grid-template-columns: 1fr;
            }

            .editor-header {
                height: auto;
                min-height: 64px;
                align-items: flex-start;
                flex-direction: column;
                padding: 12px 18px;
            }

            .header-left,
            .header-right {
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <!-- 页面主容器 -->
    <div class="page-container">
        <!-- 左侧菜单栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">连接平台</div>
            <ul class="sidebar-menu" id="sidebarMenu">
                <li class="sidebar-item" data-menu="应用管理">应用管理</li>
                <li class="sidebar-item" data-menu="连接器管理">连接器管理</li>
                <li class="sidebar-item active" data-menu="连接流编排 V4">连接流编排 V4</li>
                <li class="sidebar-item" data-menu="运行日志">运行日志</li>
            </ul>
        </aside>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 编辑器顶部区域 -->
            <header class="editor-header">
                <div class="header-left">
                    <button class="back-btn" onclick="handleBack()">← 返回</button>
                    <span class="flow-name" id="flowName" title="订单同步连接流">订单同步连接流</span>
                    <div class="version-selector" id="versionSelectorContainer"></div>
                </div>
                <div class="header-right">
                    <div class="version-actions" id="versionActions"></div>
                </div>
            </header>

            <!-- 编辑器内容区域 -->
            <section class="editor-content">
                <div class="workspace-shell">
                    <!-- 无版本状态 -->
                    <div class="no-version-flow-state" id="noVersionFlowState">
                        <div class="no-version-flow-icon">＋</div>
                        <div class="no-version-flow-text">当前连接流暂无版本，请先添加版本后再配置编排</div>
                        <button class="btn btn-primary" onclick="handleAddVersion()">添加版本</button>
                    </div>

                    <!-- 编排配置区域 -->
                    <div id="flowWorkspace">
                        <section class="mode-panel">
                            <div class="mode-title-row">
                                <div>
                                    <div class="mode-title">选择编排类型</div>
                                    <div class="form-help">未选择前不展示后续节点，切换编排类型会重新初始化当前 demo 数据。</div>
                                </div>
                                <button class="btn btn-small" onclick="simulateNoVersion()">模拟无版本</button>
                            </div>
                            <div class="mode-grid" id="modeGrid"></div>
                        </section>
                        <section class="flow-stage" id="flowStage"></section>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 添加节点弹窗 -->
    <div class="modal-overlay" id="insertNodeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">选择要添加的节点</h3>
                <button class="modal-close" onclick="closeInsertNodeModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="insert-node-grid" id="insertNodeList"></div>
            </div>
        </div>
    </div>

    <!-- 更多配置抽屉 -->
    <div class="drawer-overlay" id="moreConfigDrawer">
        <div class="drawer drawer-right">
            <div class="drawer-header">
                <h3 class="drawer-title">更多配置</h3>
                <button class="modal-close" onclick="closeMoreConfigDrawer()">×</button>
            </div>
            <div class="drawer-body">
                <!-- 限流配置 -->
                <div class="form-group">
                    <label class="form-label">限流配置（默认上限1000，当前上限<span id="rateLimitMaxText">1000</span>）</label>
                    <input type="number" class="form-input" id="rateLimitInput" placeholder="请输入限流值" min="1" max="1000" value="10" />
                    <div class="form-tip">可通过应用级配置接口获取当前应用限流上限；接口无返回时使用默认上限1000。</div>
                </div>

                <div class="drawer-divider"></div>

                <!-- 缓存配置 -->
                <div class="form-group">
                    <label class="form-label">缓存配置</label>
                    <div class="cache-toggle-row">
                        <label class="cache-toggle">
                            <input type="checkbox" id="cacheEnabled" onchange="toggleCacheConfig(this.checked)" />
                            <span>开启缓存</span>
                        </label>
                    </div>
                    <div id="cacheConfig" style="display: none;">
                        <div class="form-group">
                            <label class="form-label">缓存时间（秒，最大1296000秒）</label>
                            <input type="number" class="form-input" id="cacheTime" placeholder="请输入缓存时间（整数）" min="1" max="1296000" step="1" value="60" />
                        </div>
                        <div class="form-group">
                            <label class="form-label">缓存Key</label>
                            <div class="cache-key-list" id="cacheKeyList"></div>
                            <button type="button" class="add-param-btn" id="cacheKeyAddButton" onclick="addCacheKeyItem()">+ 添加缓存Key</button>
                            <div class="cache-key-preview">拼接结果：<span id="cacheKeyPreview">-</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="drawer-footer">
                <button class="btn" onclick="closeMoreConfigDrawer()">取消</button>
                <button class="btn btn-primary" onclick="saveMoreConfig()">保存</button>
            </div>
        </div>
    </div>

    <!-- 调试抽屉 -->
    <div class="drawer-overlay" id="debugDrawer">
        <div class="drawer drawer-bottom">
            <div class="drawer-header">
                <h3 class="drawer-title">调试 - <span id="debugFlowName">订单同步连接流</span></h3>
                <button class="modal-close" onclick="closeDebugDrawer()">×</button>
            </div>
            <div class="drawer-body">
                <!-- 入参配置 -->
                <div class="form-group">
                    <label class="form-label" style="font-weight: 600;">入参配置</label>
                    <div class="param-tabs" id="debugInputTabs">
                        <button class="tab-btn active" onclick="switchDebugInputTab('header')">HTTP请求头</button>
                        <button class="tab-btn" onclick="switchDebugInputTab('body')">HTTP请求体</button>
                        <button class="tab-btn" onclick="switchDebugInputTab('query')">URL查询参数</button>
                    </div>
                    <div class="param-tab-content" id="debugInputContent">
                        <div class="tab-panel active" data-tab="header">
                            <div class="schema-list" id="debug-input-params-header"></div>
                        </div>
                        <div class="tab-panel" data-tab="body">
                            <div class="schema-list" id="debug-input-params-body"></div>
                        </div>
                        <div class="tab-panel" data-tab="query">
                            <div class="schema-list" id="debug-input-params-query"></div>
                        </div>
                    </div>
                </div>

                <!-- 执行输出 -->
                <div class="form-group" style="margin-top: 24px;">
                    <label class="form-label" style="font-weight: 600;">执行输出</label>
                    <div id="debugOutput" class="debug-output">
                        <span style="color: var(--text-tertiary);">点击"立即调试"查看执行结果...</span>
                    </div>
                </div>
            </div>
            <div class="drawer-footer">
                <button class="btn" onclick="closeDebugDrawer()">关闭</button>
                <button class="btn btn-primary" onclick="executeDebug()">立即调试</button>
            </div>
        </div>
    </div>

    <!-- 二次确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal" style="width: 360px;">
            <div class="modal-header">
                <h3 class="modal-title">操作确认</h3>
                <button class="modal-close" onclick="closeConfirmModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="confirmMessage" style="color: var(--text-secondary); line-height: 1.6;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-primary" id="confirmBtn">确定</button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // ========================================
        // 常量与模拟数据
        // ========================================

        /**
         * 应用级连接流配置限制。
         */
        const APP_FLOW_CONFIG_LIMITS = {
            connectorTimeoutMax: 3,
            connectorNodeMax: 3,
            parallelBranchMax: 8,
            rateLimitMax: 1000,
            cacheTimeMax: 1296000
        };

        /**
         * 编排类型可见性配置，可由接口下发控制。
         */
        const APP_FLOW_TYPE_VISIBILITY = {
            single: true,
            serial: true,
            parallel: true
        };

        /**
         * 编排模式配置。
         */
        const FLOW_MODES = [
            { key: 'single', title: '单节点', icon: '单', desc: '固定触发器、连接器和数据输出，适合一次连接器调用。' },
            { key: 'serial', title: '串行编排', icon: '串', desc: '按顺序添加连接器和脚本节点，连接器数量默认最多 3 个。' },
            { key: 'parallel', title: '并行编排', icon: '并', desc: '在并行节点内配置多个分支，每个分支固定一个连接器。' }
        ];

        /**
         * 连接器模拟数据。
         */
        const CONNECTOR_DATA = {
            http: {
                id: 'http',
                name: 'HTTP请求连接器',
                authMethods: [
                    { id: 'SOA', name: 'SOA认证', params: [{ name: 'X-Huawei-Auth', type: 'string', carrier: 'header' }] },
                    { id: 'APIG', name: 'APIG认证', params: [{ name: 'X-HW-ID', type: 'string', carrier: 'header' }, { name: 'X-HW-APPKEY', type: 'string', carrier: 'header' }] }
                ],
                versions: [
                    {
                        id: 'v1',
                        name: 'v1.0.0',
                        inputParams: {
                            header: [{ id: 'ih1', name: 'Authorization', type: 'string', desc: '认证信息' }],
                            body: [{ id: 'ib1', name: 'payload', type: 'object', desc: '请求体' }],
                            query: [{ id: 'iq1', name: 'pageNo', type: 'number', desc: '页码' }]
                        },
                        outputParams: [{ id: 'ho1', name: 'code', type: 'number' }, { id: 'ho2', name: 'data.id', type: 'number' }, { id: 'ho3', name: 'data.name', type: 'string' }]
                    },
                    {
                        id: 'v2',
                        name: 'v0.9.0',
                        inputParams: {
                            header: [],
                            body: [{ id: 'ib2', name: 'keyword', type: 'string', desc: '搜索关键词' }],
                            query: []
                        },
                        outputParams: [{ id: 'ho4', name: 'result', type: 'string' }]
                    }
                ]
            },
            database: {
                id: 'database',
                name: '数据库连接器',
                authMethods: [
                    { id: 'COOKIE', name: 'Cookie认证', params: [{ name: 'Cookie-Token', type: 'string', carrier: 'header' }] }
                ],
                versions: [
                    {
                        id: 'v1',
                        name: 'v1.0.0',
                        inputParams: {
                            header: [],
                            body: [{ id: 'dbi1', name: 'sql', type: 'string', desc: 'SQL语句' }, { id: 'dbi2', name: 'params', type: 'array', desc: 'SQL参数' }],
                            query: []
                        },
                        outputParams: [{ id: 'dbo1', name: 'rows', type: 'array' }, { id: 'dbo2', name: 'rowCount', type: 'number' }]
                    }
                ]
            },
            redis: {
                id: 'redis',
                name: 'Redis缓存连接器',
                authMethods: [
                    { id: 'SIGNATURE', name: '数字签名认证', params: [{ name: 'X-Signature', type: 'string', carrier: 'header' }] }
                ],
                versions: [
                    {
                        id: 'v1',
                        name: 'v1.0.0',
                        inputParams: {
                            header: [],
                            body: [{ id: 'ri1', name: 'key', type: 'string', desc: '缓存键' }, { id: 'ri2', name: 'ttl', type: 'number', desc: '过期时间' }],
                            query: []
                        },
                        outputParams: [{ id: 'ro1', name: 'value', type: 'string' }, { id: 'ro2', name: 'exists', type: 'boolean' }]
                    }
                ]
            }
        };

        /**
         * 版本状态常量。
         */
        const FLOW_VERSION_STATUS = {
            DRAFT: 'draft',
            PUBLISHED: 'published',
            INVALID: 'invalid',
            PENDING: 'pending',
            REJECTED: 'rejected',
            WITHDRAWN: 'withdrawn'
        };

        /**
         * 版本状态文案。
         */
        const FLOW_VERSION_STATUS_TEXT = {
            draft: '草稿',
            published: '已发布',
            invalid: '已失效',
            pending: '审批中',
            rejected: '已驳回',
            withdrawn: '已撤回'
        };

        /**
         * 连接流版本模拟数据。
         */
        let flowVersionData = {
            currentVersion: 'v1',
            versions: [
                { id: 'v1', name: 'v1.0.0', status: FLOW_VERSION_STATUS.DRAFT, createdAt: '2024-01-15' },
                { id: 'v2', name: 'v0.9.0', status: FLOW_VERSION_STATUS.PUBLISHED, createdAt: '2024-01-10' },
                { id: 'v3', name: 'v0.8.0', status: FLOW_VERSION_STATUS.INVALID, createdAt: '2024-01-05' },
                { id: 'v4', name: 'v0.7.0', status: FLOW_VERSION_STATUS.PENDING, createdAt: '2024-01-01' },
                { id: 'v5', name: 'v0.6.0', status: FLOW_VERSION_STATUS.REJECTED, createdAt: '2023-12-28' },
                { id: 'v6', name: 'v0.5.0', status: FLOW_VERSION_STATUS.WITHDRAWN, createdAt: '2023-12-25' }
            ]
        };

        /**
         * 当前连接流编排数据。
         */
        let flowData = createEmptyFlowData();

        /**
         * 当前添加节点上下文。
         */
        let insertContext = null;

        /**
         * 节点卡片收起状态缓存。
         */
        const collapsedNodeMap = {};

        /**
         * 当前激活的节点 ID，用于步骤条切换。
         */
        let activeNodeId = '';

        /**
         * Monaco 编辑器实例缓存。
         */
        const monacoEditors = {};

        /**
         * Monaco 加载状态。
         */
        let monacoLoadStarted = false;

        // ========================================
        // 初始化逻辑
        // ========================================

        /**
         * 初始化页面事件与首屏渲染。
         * @returns {void}
         */
        function initPage() {
            bindSidebarMenu();
            renderVersionArea();
            renderModeGrid();
            renderWorkspace();
        }

        /**
         * 创建空的连接流数据。
         * @returns {Object} 空连接流数据
         */
        function createEmptyFlowData() {
            return {
                mode: '',
                trigger: createTriggerNode(),
                steps: [],
                output: createOutputNode()
            };
        }

        /**
         * 绑定左侧菜单点击事件。
         * @returns {void}
         */
        function bindSidebarMenu() {
            document.querySelectorAll('.sidebar-item').forEach(item => {
                item.addEventListener('click', function () {
                    document.querySelectorAll('.sidebar-item').forEach(menuItem => menuItem.classList.remove('active'));
                    this.classList.add('active');
                    showToast({ message: `已跳转到${this.dataset.menu}` });
                });
            });
        }

        // ========================================
        // 顶部版本逻辑
        // ========================================

        /**
         * 渲染顶部版本选择与操作按钮。
         * @returns {void}
         */
        function renderVersionArea() {
            const selectorContainer = document.getElementById('versionSelectorContainer');
            const actionsContainer = document.getElementById('versionActions');
            const hasVersion = flowVersionData.versions.length > 0;

            selectorContainer.innerHTML = hasVersion ? renderVersionSelectorHtml() : '<span class="form-help">暂无版本</span>';
            actionsContainer.innerHTML = hasVersion ? renderVersionActionsHtml() : '<button class="btn btn-primary" onclick="handleAddVersion()">添加版本</button>';
        }

        /**
         * 渲染版本选择器 HTML。
         * @returns {string} 版本选择器 HTML
         */
        function renderVersionSelectorHtml() {
            const options = flowVersionData.versions.map(version => `
                <option value="${version.id}" ${flowVersionData.currentVersion === version.id ? 'selected' : ''}>
                    ${version.name} (${version.createdAt}) [${FLOW_VERSION_STATUS_TEXT[version.status]}]
                </option>
            `).join('');

            return `
                <label style="color: var(--text-secondary); font-size: 13px;">版本:</label>
                <select class="form-select" style="width: 240px;" onchange="handleVersionChange(this.value)">${options}</select>
            `;
        }

        /**
         * 渲染版本操作按钮 HTML。
         * @returns {string} 版本操作按钮 HTML
         */
        function renderVersionActionsHtml() {
            const version = getCurrentFlowVersion();

            if (!version) {
                return '';
            }

            switch (version.status) {
                case FLOW_VERSION_STATUS.DRAFT:
                    return `
                        <button class="btn" onclick="openMoreConfigDrawer()">更多配置</button>
                        <button class="btn" onclick="openDebugDrawer()">调试</button>
                        <button class="btn" onclick="saveFlow()">保存</button>
                        <button class="btn btn-primary" onclick="handlePublishVersion()">发布</button>
                        <button class="btn" style="color: var(--error-color);" onclick="handleDeleteVersion()">删除</button>
                    `;
                case FLOW_VERSION_STATUS.PUBLISHED:
                    return `
                        <button class="btn" onclick="handleCopyToDraft()">新增草稿</button>
                        <button class="btn" onclick="openMoreConfigDrawer()">更多配置</button>
                        <button class="btn" onclick="openDebugDrawer()">调试</button>
                        <button class="btn" style="color: var(--warning-color);" onclick="handleInvalidateVersion()">失效</button>
                    `;
                case FLOW_VERSION_STATUS.INVALID:
                    return `
                        <button class="btn" onclick="handleCopyToDraft()">新增草稿</button>
                        <button class="btn" onclick="openMoreConfigDrawer()">更多配置</button>
                        <button class="btn" style="color: var(--error-color);" onclick="handleDeleteVersion()">删除</button>
                    `;
                case FLOW_VERSION_STATUS.PENDING:
                    return `
                        <button class="btn" onclick="openMoreConfigDrawer()">更多配置</button>
                        <button class="btn" style="color: var(--warning-color);" onclick="handleWithdrawVersion()">撤回</button>
                    `;
                case FLOW_VERSION_STATUS.REJECTED:
                    return `
                        <button class="btn" onclick="handleCopyToDraft()">新增草稿</button>
                        <button class="btn" onclick="openMoreConfigDrawer()">更多配置</button>
                        <button class="btn" style="color: var(--error-color);" onclick="handleDeleteVersion()">删除</button>
                    `;
                case FLOW_VERSION_STATUS.WITHDRAWN:
                    return `
                        <button class="btn" onclick="handleCopyToDraft()">新增草稿</button>
                        <button class="btn" onclick="openMoreConfigDrawer()">更多配置</button>
                        <button class="btn" style="color: var(--error-color);" onclick="handleDeleteVersion()">删除</button>
                    `;
                default:
                    return '';
            }
        }

        /**
         * 获取当前版本。
         * @returns {Object|null} 当前版本
         */
        function getCurrentFlowVersion() {
            return flowVersionData.versions.find(version => version.id === flowVersionData.currentVersion) || null;
        }

        /**
         * 判断当前版本是否可编辑。
         * @returns {boolean} 当前版本是否可编辑
         */
        function isCurrentDraftVersion() {
            const version = getCurrentFlowVersion();
            return Boolean(version && version.status === FLOW_VERSION_STATUS.DRAFT);
        }

        /**
         * 弹出二次确认。
         * @param {Object} params - 确认弹窗参数
         * @returns {void}
         */
        function showConfirm(params) {
            const message = params.message;
            const onConfirm = params.onConfirm;

            document.getElementById('confirmMessage').textContent = message;
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.onclick = function () {
                closeConfirmModal();
                onConfirm();
            };
            document.getElementById('confirmModal').classList.add('active');
        }

        /**
         * 关闭确认弹窗。
         * @returns {void}
         */
        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        /**
         * 发布当前版本。
         * @returns {void}
         */
        function handlePublishVersion() {
            showConfirm({
                message: '确定发布当前草稿版本？发布后将进入审批中状态。',
                onConfirm: function () {
                    const version = getCurrentFlowVersion();
                    version.status = FLOW_VERSION_STATUS.PENDING;
                    showToast({ message: '已提交发布，进入审批中' });
                    renderVersionArea();
                    renderWorkspace();
                }
            });
        }

        /**
         * 撤回审批中的版本。
         * @returns {void}
         */
        function handleWithdrawVersion() {
            showConfirm({
                message: '确定撤回当前审批中的版本？',
                onConfirm: function () {
                    const version = getCurrentFlowVersion();
                    version.status = FLOW_VERSION_STATUS.WITHDRAWN;
                    showToast({ message: '已撤回审批' });
                    renderVersionArea();
                    renderWorkspace();
                }
            });
        }

        /**
         * 失效已发布的版本。
         * @returns {void}
         */
        function handleInvalidateVersion() {
            showConfirm({
                message: '确定将当前已发布版本设置为已失效？',
                onConfirm: function () {
                    const version = getCurrentFlowVersion();
                    version.status = FLOW_VERSION_STATUS.INVALID;
                    showToast({ message: '已将当前版本置为已失效' });
                    renderVersionArea();
                    renderWorkspace();
                }
            });
        }

        /**
         * 删除当前版本。
         * @returns {void}
         */
        function handleDeleteVersion() {
            showConfirm({
                message: '确定删除当前版本？删除后无法恢复。',
                onConfirm: function () {
                    const versionId = flowVersionData.currentVersion;
                    flowVersionData.versions = flowVersionData.versions.filter(item => item.id !== versionId);
                    flowVersionData.currentVersion = flowVersionData.versions[0] ? flowVersionData.versions[0].id : '';

                    if (!flowVersionData.currentVersion) {
                        flowData = createEmptyFlowData();
                        activeNodeId = '';
                    }

                    showToast({ message: '已删除版本' });
                    renderVersionArea();
                    renderWorkspace();
                }
            });
        }

        /**
         * 基于当前版本新增草稿。
         * @returns {void}
         */
        function handleCopyToDraft() {
            showConfirm({
                message: '基于当前版本新增草稿版本？',
                onConfirm: function () {
                    const newId = `v${Date.now()}`;
                    flowVersionData.versions.unshift({ id: newId, name: 'v1.0.0-draft', status: FLOW_VERSION_STATUS.DRAFT, createdAt: '2024-01-20' });
                    flowVersionData.currentVersion = newId;
                    showToast({ message: '已新增草稿版本' });
                    renderVersionArea();
                    renderWorkspace();
                }
            });
        }

        /**
         * 处理版本切换。
         * @param {string} versionId - 版本 ID
         * @returns {void}
         */
        function handleVersionChange(versionId) {
            flowVersionData.currentVersion = versionId;
            showToast({ message: '已切换连接流版本' });
            renderVersionArea();
            renderWorkspace();
        }

        /**
         * 添加连接流版本。
         * @returns {void}
         */
        function handleAddVersion() {
            const versionId = `v${Date.now()}`;
            flowVersionData.versions = [{ id: versionId, name: 'v1.0.0', status: FLOW_VERSION_STATUS.DRAFT, createdAt: '2024-01-18' }];
            flowVersionData.currentVersion = versionId;
            activeNodeId = '';
            showToast({ message: '已添加草稿版本' });
            renderVersionArea();
            renderWorkspace();
        }

        /**
         * 模拟无版本状态。
         * @returns {void}
         */
        function simulateNoVersion() {
            flowVersionData.versions = [];
            flowVersionData.currentVersion = '';
            flowData = createEmptyFlowData();
            activeNodeId = '';
            showToast({ message: '已切换为无版本状态' });
            renderVersionArea();
            renderWorkspace();
        }

        /**
         * 返回上一页模拟逻辑。
         * @returns {void}
         */
        function handleBack() {
            showToast({ message: '返回连接流列表' });
        }

        // ========================================
        // 模式与工作区渲染
        // ========================================

        /**
         * 渲染编排模式选择卡片。
         * @returns {void}
         */
        function renderModeGrid() {
            const modeGrid = document.getElementById('modeGrid');
            const visibleModes = FLOW_MODES.filter(mode => APP_FLOW_TYPE_VISIBILITY[mode.key]);

            modeGrid.innerHTML = visibleModes.length === 0
                ? '<div class="empty-hint">当前应用未启用任何编排类型，请联系管理员调整接口配置。</div>'
                : visibleModes.map(mode => `
                    <div class="mode-card ${flowData.mode === mode.key ? 'active' : ''}" onclick="selectFlowMode('${mode.key}')">
                        <div class="mode-card-title"><span class="mode-badge">${mode.icon}</span>${mode.title}</div>
                        <div class="mode-card-desc">${mode.desc}</div>
                    </div>
                `).join('');
        }

        /**
         * 选择编排模式并初始化节点。
         * @param {string} mode - 编排模式
         * @returns {void}
         */
        function selectFlowMode(mode) {
            flowData = createEmptyFlowData();
            flowData.mode = mode;

            if (mode === 'single') {
                flowData.steps = [createConnectorNode()];
            }

            if (mode === 'serial') {
                flowData.steps = [createConnectorNode()];
            }

            if (mode === 'parallel') {
                flowData.steps = [createParallelNode()];
            }

            activeNodeId = flowData.trigger.id;
            showToast({ message: '已切换编排模式' });
            renderModeGrid();
            renderWorkspace();
        }

        /**
         * 渲染工作区内容。
         * @returns {void}
         */
        function renderWorkspace() {
            const hasVersion = flowVersionData.versions.length > 0;
            const noVersionState = document.getElementById('noVersionFlowState');
            const flowWorkspace = document.getElementById('flowWorkspace');
            const flowStage = document.getElementById('flowStage');

            noVersionState.classList.toggle('active', !hasVersion);
            flowWorkspace.style.display = hasVersion ? 'block' : 'none';
            flowWorkspace.classList.toggle('readonly', hasVersion && !isCurrentDraftVersion());

            if (!hasVersion) {
                updateNodeCount();
                return;
            }

            renderModeGrid();
            flowStage.classList.toggle('active', Boolean(flowData.mode));
            disposeMonacoEditors();

            if (flowData.mode) {
                ensureActiveNode();
            }

            flowStage.innerHTML = flowData.mode ? renderFlowStageHtml() : '';
            updateNodeCount();
            scheduleMonacoEditors();
        }

        /**
         * 渲染节点舞台 HTML。
         * @returns {string} 节点舞台 HTML
         */
        function renderFlowStageHtml() {
            const nodes = getVisibleNodes();
            const titleCounter = createNodeTitleCounter();
            const nodeMeta = nodes.map(node => ({ node, title: computeNodeTitle({ node, titleCounter }) }));
            const activeMeta = nodeMeta.find(item => item.node.id === activeNodeId) || nodeMeta[0];

            return `
                ${renderFlowStepper({ nodeMeta, activeId: activeMeta.node.id })}
                <div class="flow-active-node">
                    ${renderNodeCard({ node: activeMeta.node, index: nodes.indexOf(activeMeta.node), titleCounter: null, overrideTitle: activeMeta.title })}
                </div>
            `;
        }

        /**
         * 获取当前可见节点列表。
         * @returns {Array} 可见节点列表
         */
        function getVisibleNodes() {
            return [flowData.trigger].concat(flowData.steps, flowData.output);
        }

        /**
         * 确保当前激活节点有效，否则回退到第一个节点。
         * @returns {void}
         */
        function ensureActiveNode() {
            const nodes = getVisibleNodes();
            const exists = nodes.some(node => node.id === activeNodeId);

            if (!exists) {
                activeNodeId = nodes[0] ? nodes[0].id : '';
            }
        }

        /**
         * 创建节点标题计数器。
         * @returns {Object} 节点标题计数器
         */
        function createNodeTitleCounter() {
            return {
                trigger: 0,
                connector: 0,
                script: 0,
                parallel: 0,
                output: 0
            };
        }

        /**
         * 获取带序号的节点标题。
         * @param {Object} params - 标题参数
         * @returns {string} 节点标题
         */
        function getNumberedNodeTitle(params) {
            const type = params.type;
            const baseTitle = params.baseTitle;
            const titleCounter = params.titleCounter;
            const skipNumbering = !titleCounter || flowData.mode === 'single' || type === 'trigger' || type === 'output';

            if (skipNumbering) {
                if (titleCounter && (type === 'trigger' || type === 'output')) {
                    titleCounter[type] += 1;
                }

                return baseTitle;
            }

            titleCounter[type] += 1;
            return `${baseTitle} ${titleCounter[type]}`;
        }

        /**
         * 计算节点标题。
         * @param {Object} params - 节点参数
         * @returns {string} 节点标题
         */
        function computeNodeTitle(params) {
            const node = params.node;
            const titleCounter = params.titleCounter;
            const titleMap = { trigger: '触发器', connector: '连接器', script: '脚本处理', parallel: '并行节点', output: '数据输出' };

            return getNumberedNodeTitle({ type: node.type, baseTitle: titleMap[node.type], titleCounter });
        }

        /**
         * 获取分支内连接器标题。
         * @returns {string} 分支连接器标题
         */
        function getBranchConnectorTitle() {
            return flowData.mode === 'single' ? '连接器' : '连接器 1';
        }

        /**
         * 更新顶部节点数量文案。
         * @returns {void}
         */
        function updateNodeCount() {
            return;
        }

        // ========================================
        // 节点创建方法
        // ========================================

        /**
         * 生成唯一 ID。
         * @returns {string} 唯一 ID
         */
        function generateId() {
            return `node_${Date.now()}_${Math.random().toString(16).slice(2)}`;
        }

        /**
         * 创建触发器节点。
         * @returns {Object} 触发器节点
         */
        function createTriggerNode() {
            return {
                id: 'trigger',
                type: 'trigger',
                triggerType: 'http',
                systokens: ['SYSACCOUNT_ORDER'],
                inputParams: {
                    header: [{ id: generateId(), name: 'X-Request-Id', type: 'string', desc: '请求ID' }],
                    body: [{ id: generateId(), name: 'orderId', type: 'string', desc: '订单ID' }],
                    query: []
                }
            };
        }

        /**
         * 创建连接器节点。
         * @returns {Object} 连接器节点
         */
        function createConnectorNode() {
            return {
                id: generateId(),
                type: 'connector',
                connectorId: '',
                versionId: '',
                authMethodId: '',
                timeout: APP_FLOW_CONFIG_LIMITS.connectorTimeoutMax,
                inputMappings: {}
            };
        }

        /**
         * 创建脚本处理节点。
         * @returns {Object} 脚本处理节点
         */
        function createScriptNode() {
            return {
                id: generateId(),
                type: 'script',
                script: 'type Input = Record<string, unknown>;\n\nexport function transform(input: Input) {\n  return {\n    result: input\n  };\n}',
                outputParams: [{ id: generateId(), name: 'result', type: 'object', desc: '脚本处理结果' }]
            };
        }

        /**
         * 创建并行节点。
         * @returns {Object} 并行节点
         */
        function createParallelNode() {
            return {
                id: generateId(),
                type: 'parallel',
                activeBranchId: '',
                branches: [createParallelBranch(1), createParallelBranch(2)]
            };
        }

        /**
         * 创建并行分支。
         * @param {number} index - 分支序号
         * @returns {Object} 并行分支
         */
        function createParallelBranch(index) {
            const branchId = generateId();
            return {
                id: branchId,
                label: `分支${index}`,
                connector: createConnectorNode()
            };
        }

        /**
         * 创建数据输出节点。
         * @returns {Object} 数据输出节点
         */
        function createOutputNode() {
            return {
                id: 'output',
                type: 'output',
                assembleParams: {
                    body: [{ id: generateId(), name: 'data', type: 'object', source: '' }],
                    header: []
                }
            };
        }

        // ========================================
        // 节点卡片渲染
        // ========================================

        /**
         * 渲染节点卡片。
         * @param {Object} params - 渲染参数
         * @returns {string} 节点卡片 HTML
         */
        function renderNodeCard(params) {
            const node = params.node;
            const index = params.index;
            const titleCounter = params.titleCounter;
            const overrideTitle = params.overrideTitle;

            if (node.type === 'trigger') {
                return renderTriggerCard({ node, titleCounter, overrideTitle });
            }

            if (node.type === 'connector') {
                return renderConnectorCard({ node, index, scope: 'main', titleCounter, overrideTitle });
            }

            if (node.type === 'script') {
                return renderScriptCard({ node, index, titleCounter, overrideTitle });
            }

            if (node.type === 'parallel') {
                return renderParallelCard({ node, index, titleCounter, overrideTitle });
            }

            return renderOutputCard({ node, titleCounter, overrideTitle });
        }

        /**
         * 渲染节点头部。
         * @param {Object} params - 头部参数
         * @returns {string} 节点头部 HTML
         */
        function renderCardHeader(params) {
            const nodeId = params.nodeId;
            const title = params.title;
            const subtitle = params.subtitle;
            const type = params.type;
            const icon = params.icon;
            const actions = params.actions || '';
            const isCollapsed = Boolean(collapsedNodeMap[nodeId]);

            return `
                <div class="node-header">
                    <div class="node-title-wrap">
                        <span class="node-icon ${type}">${icon}</span>
                        <div>
                            <div class="node-title">${title}</div>
                            <div class="node-subtitle">${subtitle}</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        ${actions}
                        <button class="btn btn-small" onclick="toggleNodeCollapse('${nodeId}')">${isCollapsed ? '展开' : '收起'}</button>
                    </div>
                </div>
            `;
        }

        /**
         * 渲染节点卡片内容区域。
         * @param {Object} params - 内容区域参数
         * @returns {string} 内容区域 HTML
         */
        function renderCollapsibleBody(params) {
            const nodeId = params.nodeId;
            const content = params.content;

            if (collapsedNodeMap[nodeId]) {
                return '';
            }

            return `<div class="node-body">${content}</div>`;
        }

        /**
         * 切换节点卡片收起状态。
         * @param {string} nodeId - 节点 ID
         * @returns {void}
         */
        function toggleNodeCollapse(nodeId) {
            collapsedNodeMap[nodeId] = !collapsedNodeMap[nodeId];
            renderWorkspace();
        }

        /**
         * 渲染触发器卡片。
         * @param {Object} node - 触发器节点
         * @returns {string} 触发器卡片 HTML
         */
        function renderTriggerCard(params) {
            const node = params.node;
            const title = params.overrideTitle || getNumberedNodeTitle({ type: 'trigger', baseTitle: '触发器', titleCounter: params.titleCounter });
            const body = `
                <div class="form-group">
                    <label class="form-label">触发方式</label>
                    <select class="form-select" onchange="updateTriggerType(this.value)">
                        <option value="http" ${node.triggerType === 'http' ? 'selected' : ''}>HTTP触发</option>
                        <option value="schedule" ${node.triggerType === 'schedule' ? 'selected' : ''}>定时触发</option>
                        <option value="event" ${node.triggerType === 'event' ? 'selected' : ''}>事件触发</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">SYSACCOUNT白名单</label>
                    <div id="systokenList">${renderSystokenList()}</div>
                    <button class="add-param-btn" onclick="addSystokenItem()">+ 添加账号</button>
                </div>
                <div class="form-group">
                    <label class="form-label">入参配置</label>
                    ${renderSchemaTabs({ ownerId: node.id, group: 'triggerInput', schema: node.inputParams })}
                </div>
            `;

            return `
                <section class="node-card trigger">
                    ${renderCardHeader({ nodeId: node.id, type: 'trigger', title, subtitle: '配置连接流入口参数', icon: '触' })}
                    ${renderCollapsibleBody({ nodeId: node.id, content: body })}
                </section>
            `;
        }

        /**
         * 渲染连接器卡片。
         * @param {Object} params - 连接器卡片参数
         * @returns {string} 连接器卡片 HTML
         */
        function renderConnectorCard(params) {
            const node = params.node;
            const index = params.index;
            const scope = params.scope;
            const title = params.overrideTitle || (scope === 'branch'
                ? getBranchConnectorTitle()
                : getNumberedNodeTitle({ type: 'connector', baseTitle: '连接器', titleCounter: params.titleCounter }));
            const connector = CONNECTOR_DATA[node.connectorId];
            const version = getConnectorVersion(node);
            const connectorOptions = Object.values(CONNECTOR_DATA).map(connectorItem => `
                <option value="${connectorItem.id}" ${node.connectorId === connectorItem.id ? 'selected' : ''}>${connectorItem.name}</option>
            `).join('');
            const versionOptions = connector ? connector.versions.map(versionItem => `
                <option value="${versionItem.id}" ${node.versionId === versionItem.id ? 'selected' : ''}>${versionItem.name}</option>
            `).join('') : '';

            const body = `
                <div class="form-group">
                    <label class="form-label">选择连接器</label>
                    <select class="form-select" onchange="updateConnectorField({ nodeId: '${node.id}', field: 'connectorId', value: this.value, resetVersion: true })">
                        <option value="">请选择连接器</option>
                        ${connectorOptions}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">选择连接器版本</label>
                    <select class="form-select" onchange="updateConnectorField({ nodeId: '${node.id}', field: 'versionId', value: this.value })" ${connector ? '' : 'disabled'}>
                        <option value="">请选择版本</option>
                        ${versionOptions}
                    </select>
                </div>
                ${version ? renderConnectorConfigAfterVersion({ node, connector, version }) : '<div class="empty-hint">选择连接器和版本后展示认证方式、超时时间和入参配置。</div>'}
            `;

            return `
                <section class="node-card connector">
                    ${renderCardHeader({ nodeId: node.id, type: 'connector', title, subtitle: '选择连接器版本并配置入参映射', icon: '连', actions: renderRemoveAction({ node, index, scope }) })}
                    ${renderCollapsibleBody({ nodeId: node.id, content: body })}
                </section>
            `;
        }

        /**
         * 渲染连接器版本选择后的配置区域。
         * @param {Object} params - 配置区域参数
         * @returns {string} 配置区域 HTML
         */
        function renderConnectorConfigAfterVersion(params) {
            const node = params.node;
            const connector = params.connector;
            const version = params.version;

            return `
                <div class="form-group">
                    <label class="form-label">认证方式</label>
                    ${renderAuthMethods({ node, connector })}
                </div>
                <div class="form-group">
                    <label class="form-label">超时时间（秒，当前上限${APP_FLOW_CONFIG_LIMITS.connectorTimeoutMax}秒）</label>
                    <input class="form-input" type="number" min="1" max="${APP_FLOW_CONFIG_LIMITS.connectorTimeoutMax}" value="${node.timeout}" onchange="updateConnectorField({ nodeId: '${node.id}', field: 'timeout', value: this.value })">
                    <div class="form-help">默认上限为 3 秒，可通过应用级配置接口调整。</div>
                </div>
                <div class="form-group">
                    <label class="form-label">入参配置</label>
                    <div class="form-help" style="margin-bottom: 8px;">只展示该连接器版本对应的入参，参数值可选择上游节点数据。</div>
                    ${renderMappingTabs({ node, inputParams: version.inputParams })}
                </div>
            `;
        }

        /**
         * 渲染脚本节点卡片。
         * @param {Object} params - 脚本节点参数
         * @returns {string} 脚本节点 HTML
         */
        function renderScriptCard(params) {
            const node = params.node;
            const index = params.index;
            const title = params.overrideTitle || getNumberedNodeTitle({ type: 'script', baseTitle: '脚本处理', titleCounter: params.titleCounter });
            const body = `
                <div class="form-group">
                    <label class="form-label">TS脚本输入框</label>
                    <div class="script-editor" id="editor-${node.id}"></div>
                    <textarea class="form-textarea script-fallback" id="fallback-${node.id}" style="display: none;" onchange="updateScriptContent({ nodeId: '${node.id}', value: this.value })">${escapeHtml(node.script)}</textarea>
                    <div class="script-status" id="status-${node.id}">Monaco Editor 将进行 TypeScript 基础校验。</div>
                </div>
                <div class="form-group">
                    <label class="form-label">节点出参配置</label>
                    <div class="form-help" style="margin-bottom: 8px;">仅配置数据结构，不需要选择参数位置。</div>
                    ${renderFlatSchemaList({ ownerId: node.id, schema: node.outputParams })}
                </div>
            `;

            return `
                <section class="node-card script">
                    ${renderCardHeader({ nodeId: node.id, type: 'script', title, subtitle: '使用 TypeScript 处理上游数据', icon: '脚', actions: renderRemoveAction({ node, index, scope: 'main' }) })}
                    ${renderCollapsibleBody({ nodeId: node.id, content: body })}
                </section>
            `;
        }

        /**
         * 渲染并行节点卡片。
         * @param {Object} params - 并行节点参数
         * @returns {string} 并行节点 HTML
         */
        function renderParallelCard(params) {
            const node = params.node;
            const title = params.overrideTitle || getNumberedNodeTitle({ type: 'parallel', baseTitle: '并行节点', titleCounter: params.titleCounter });
            const activeBranch = getActiveBranch(node);
            const tabsHtml = node.branches.map(branch => `
                <button class="tab-btn ${branch.id === activeBranch.id ? 'active' : ''}" onclick="switchParallelBranch({ nodeId: '${node.id}', branchId: '${branch.id}' })">${escapeHtml(branch.label)}</button>
            `).join('');
            const body = `
                <div class="parallel-toolbar">
                    <div>
                        <label class="form-label" style="margin-bottom: 0;">并行分支</label>
                        <div class="form-help">每个分支默认包含一个连接器，不能删除，也不能继续添加其他节点。</div>
                    </div>
                    <button class="btn btn-small" onclick="addParallelBranchToNode('${node.id}')" ${node.branches.length >= APP_FLOW_CONFIG_LIMITS.parallelBranchMax ? 'disabled' : ''}>+ 添加分支</button>
                </div>
                <div class="tabs">${tabsHtml}</div>
                <div class="branch-panel">
                    <div class="branch-title-row">
                        <input class="form-input" style="max-width: 260px;" value="${escapeHtml(activeBranch.label)}" onchange="updateBranchLabel({ nodeId: '${node.id}', branchId: '${activeBranch.id}', value: this.value })">
                        ${node.branches.length > 1 ? `<button class="btn btn-danger btn-small" onclick="removeParallelBranch({ nodeId: '${node.id}', branchId: '${activeBranch.id}' })">删除分支</button>` : ''}
                    </div>
                    ${renderConnectorCard({ node: activeBranch.connector, index: -1, scope: 'branch' })}
                </div>
            `;

            return `
                <section class="node-card parallel">
