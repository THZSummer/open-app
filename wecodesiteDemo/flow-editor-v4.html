                    ${renderCardHeader({ nodeId: node.id, type: 'parallel', title, subtitle: '每个分支固定一个连接器节点', icon: '并' })}
                    ${renderCollapsibleBody({ nodeId: node.id, content: body })}
                </section>
            `;
        }

        /**
         * 渲染数据输出卡片。
         * @param {Object} node - 数据输出节点
         * @returns {string} 数据输出卡片 HTML
         */
        function renderOutputCard(params) {
            const node = params.node;
            const title = params.overrideTitle || getNumberedNodeTitle({ type: 'output', baseTitle: '数据输出', titleCounter: params.titleCounter });
            const body = `
                <div class="form-group">
                    <label class="form-label">参数组装配置</label>
                    ${renderOutputMappingTabs(node)}
                </div>
            `;

            return `
                <section class="node-card output">
                    ${renderCardHeader({ nodeId: node.id, type: 'output', title, subtitle: '配置最终响应参数组装', icon: '出' })}
                    ${renderCollapsibleBody({ nodeId: node.id, content: body })}
                </section>
            `;
        }

        /**
         * 渲染删除按钮。
         * @param {Object} params - 删除按钮参数
         * @returns {string} 删除按钮 HTML
         */
        function renderRemoveAction(params) {
            const node = params.node;
            const index = params.index;
            const scope = params.scope;

            if (scope === 'branch' || flowData.mode === 'single') {
                return '';
            }

            if (node.type === 'connector' && flowData.mode === 'serial') {
                const connectorCount = flowData.steps.filter(step => step.type === 'connector').length;

                if (connectorCount <= 1) {
                    return '';
                }

                return `<button class="btn btn-danger btn-small" onclick="removeStep(${index - 1})">删除</button>`;
            }

            if (node.type === 'script') {
                return `<button class="btn btn-danger btn-small" onclick="removeStep(${index - 1})">删除</button>`;
            }

            return '';
        }

        // ========================================
        // 插入节点逻辑
        // ========================================

        /**
         * 渲染节点间添加按钮。
         * @param {Object} params - 添加按钮参数
         * @returns {string} 添加按钮 HTML
         */
        function renderInsertButton(params) {
            const nodes = params.nodes;
            const index = params.index;
            const options = getInsertableNodeTypes({ nodes, index });

            if (options.length === 0) {
                return '';
            }

            return `
                <button class="flow-step-add" title="添加节点" onclick="handleAddButtonClick(${index})">+</button>
            `;
        }

        /**
         * 渲染步骤条。
         * @param {Object} params - 步骤条参数
         * @returns {string} 步骤条 HTML
         */
        function renderFlowStepper(params) {
            const nodeMeta = params.nodeMeta;
            const activeId = params.activeId;
            const nodes = nodeMeta.map(item => item.node);
            const iconMap = { trigger: '触', connector: '连', script: '脚', parallel: '并', output: '出' };
            const parts = [];

            nodeMeta.forEach((meta, index) => {
                const stepHtml = `
                    <button class="flow-step ${meta.node.id === activeId ? 'active' : ''}" onclick="selectActiveNode('${meta.node.id}')">
                        <span class="step-index">${iconMap[meta.node.type] || index + 1}</span>
                        <span>${escapeHtml(meta.title)}</span>
                    </button>
                `;
                parts.push(stepHtml);

                if (index < nodeMeta.length - 1) {
                    const insertBtn = renderInsertButton({ nodes, index });

                    if (insertBtn) {
                        parts.push(insertBtn);
                    } else {
                        parts.push('<span class="flow-step-link"></span>');
                    }
                }
            });

            return `
                <div class="flow-stepper-wrap">
                    <div class="flow-stepper">${parts.join('')}</div>
                </div>
            `;
        }

        /**
         * 切换当前激活节点。
         * @param {string} nodeId - 节点 ID
         * @returns {void}
         */
        function selectActiveNode(nodeId) {
            activeNodeId = nodeId;
            renderWorkspace();
        }

        /**
         * 获取当前位置可添加的节点类型。
         * @param {Object} params - 插入位置参数
         * @returns {Array} 可添加节点类型
         */
        function getInsertableNodeTypes(params) {
            const nodes = params.nodes;
            const index = params.index;
            const prevNode = nodes[index];
            const nextNode = nodes[index + 1];

            if (!nextNode || flowData.mode === 'single') {
                return [];
            }

            if (flowData.mode === 'serial') {
                return getSerialInsertableTypes({ prevNode, nextNode });
            }

            if (flowData.mode === 'parallel') {
                return getParallelInsertableTypes({ prevNode, nextNode });
            }

            return [];
        }

        /**
         * 获取串行编排可添加节点类型。
         * @param {Object} params - 相邻节点参数
         * @returns {Array} 可添加节点类型
         */
        function getSerialInsertableTypes(params) {
            const prevNode = params.prevNode;
            const nextNode = params.nextNode;
            const types = [];
            const connectorCount = flowData.steps.filter(step => step.type === 'connector').length;

            if (connectorCount < APP_FLOW_CONFIG_LIMITS.connectorNodeMax) {
                types.push('connector');
            }

            if (prevNode.type !== 'script' && nextNode.type !== 'script') {
                types.push('script');
            }

            return types;
        }

        /**
         * 获取并行编排可添加节点类型。
         * @param {Object} params - 相邻节点参数
         * @returns {Array} 可添加节点类型
         */
        function getParallelInsertableTypes(params) {
            const prevNode = params.prevNode;
            const nextNode = params.nextNode;
            const isBeforeParallel = prevNode.type === 'trigger' && nextNode.type === 'parallel';
            const isAfterParallel = prevNode.type === 'parallel' && nextNode.type === 'output';

            if ((isBeforeParallel || isAfterParallel) && prevNode.type !== 'script' && nextNode.type !== 'script') {
                return ['script'];
            }

            return [];
        }

        /**
         * 处理添加按钮点击。
         * @param {number} index - 可见节点插入位置索引
         * @returns {void}
         */
        function handleAddButtonClick(index) {
            const nodes = getVisibleNodes();
            const options = getInsertableNodeTypes({ nodes, index });

            if (options.length === 1) {
                insertContext = { visibleIndex: index };
                handleInsertNode(options[0]);
                return;
            }

            openInsertNodeModal(index);
        }

        /**
         * 打开添加节点弹窗。
         * @param {number} index - 可见节点插入位置索引
         * @returns {void}
         */
        function openInsertNodeModal(index) {
            const nodes = getVisibleNodes();
            const options = getInsertableNodeTypes({ nodes, index });
            insertContext = { visibleIndex: index };

            document.getElementById('insertNodeList').innerHTML = options.map(type => renderInsertOption(type)).join('') || '<div class="empty-hint">当前位置暂无可添加节点</div>';
            document.getElementById('insertNodeModal').classList.add('active');
        }

        /**
         * 渲染添加节点选项。
         * @param {string} type - 节点类型
         * @returns {string} 添加节点选项 HTML
         */
        function renderInsertOption(type) {
            const config = {
                connector: { title: '连接器节点', desc: '调用连接器并配置版本入参映射' },
                script: { title: '脚本处理节点', desc: '使用 TypeScript 处理上游数据并声明出参结构' }
            };
            const item = config[type];

            return `
                <div class="insert-node-option" onclick="handleInsertNode('${type}')">
                    <div class="insert-node-option-title">${item.title}</div>
                    <div class="insert-node-option-desc">${item.desc}</div>
                </div>
            `;
        }

        /**
         * 关闭添加节点弹窗。
         * @returns {void}
         */
        function closeInsertNodeModal() {
            insertContext = null;
            document.getElementById('insertNodeModal').classList.remove('active');
        }

        /**
         * 处理插入节点操作。
         * @param {string} type - 节点类型
         * @returns {void}
         */
        function handleInsertNode(type) {
            if (!insertContext) {
                return;
            }

            const visibleIndex = insertContext.visibleIndex;
            const stepIndex = visibleIndex;
            const node = type === 'connector' ? createConnectorNode() : createScriptNode();

            flowData.steps.splice(stepIndex, 0, node);
            activeNodeId = node.id;
            closeInsertNodeModal();
            showToast({ message: '已添加节点' });
            renderWorkspace();
        }

        /**
         * 删除编排步骤。
         * @param {number} stepIndex - 步骤索引
         * @returns {void}
         */
        function removeStep(stepIndex) {
            const removingNode = flowData.steps[stepIndex];
            flowData.steps.splice(stepIndex, 1);

            if (activeNodeId === removingNode.id) {
                const visibleNodes = getVisibleNodes();
                const fallback = visibleNodes[Math.max(0, stepIndex)] || visibleNodes[0];
                activeNodeId = fallback ? fallback.id : '';
            }

            showToast({ message: '已删除节点' });
            renderWorkspace();
        }

        // ========================================
        // 触发器配置逻辑
        // ========================================

        /**
         * 更新触发方式。
         * @param {string} value - 触发方式
         * @returns {void}
         */
        function updateTriggerType(value) {
            flowData.trigger.triggerType = value;
            showToast({ message: '已更新触发方式' });
        }

        /**
         * 渲染 SYSACCOUNT 白名单。
         * @returns {string} 白名单 HTML
         */
        function renderSystokenList() {
            return flowData.trigger.systokens.map((token, index) => `
                <div class="systoken-item" style="margin-bottom: 8px;">
                    <div class="systoken-row">
                        <input class="form-input" value="${escapeHtml(token)}" onchange="updateSystoken({ index: ${index}, value: this.value })">
                        <button class="btn btn-danger btn-small" onclick="removeSystokenItem(${index})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        /**
         * 添加白名单账号。
         * @returns {void}
         */
        function addSystokenItem() {
            flowData.trigger.systokens.push('');
            renderWorkspace();
        }

        /**
         * 更新白名单账号。
         * @param {Object} params - 更新参数
         * @returns {void}
         */
        function updateSystoken(params) {
            const index = params.index;
            const value = params.value;
            flowData.trigger.systokens[index] = value;
        }

        /**
         * 删除白名单账号。
         * @param {number} index - 白名单索引
         * @returns {void}
         */
        function removeSystokenItem(index) {
            flowData.trigger.systokens.splice(index, 1);
            renderWorkspace();
        }

        // ========================================
        // 参数结构配置渲染
        // ========================================

        /**
         * 渲染结构配置 Tabs。
         * @param {Object} params - 结构配置参数
         * @returns {string} 结构配置 HTML
         */
        function renderSchemaTabs(params) {
            const ownerId = params.ownerId;
            const group = params.group;
            const schema = params.schema;
            const tabs = [
                { key: 'header', label: 'HTTP请求头' },
                { key: 'body', label: 'HTTP请求体' },
                { key: 'query', label: 'URL查询参数' }
            ];

            return renderTabs({
                ownerId,
                group,
                tabs,
                panelRenderer: tab => renderSchemaList({ ownerId, group, tabKey: tab.key, schema: schema[tab.key] || [] })
            });
        }

        /**
         * 渲染结构参数列表。
         * @param {Object} params - 参数列表配置
         * @returns {string} 参数列表 HTML
         */
        function renderSchemaList(params) {
            const ownerId = params.ownerId;
            const group = params.group;
            const tabKey = params.tabKey;
            const schema = params.schema;
            const itemsHtml = schema.map((param, index) => renderSchemaItem({ param, ownerId, group, tabKey, index })).join('');

            return `
                <div class="schema-list">${itemsHtml || '<div class="empty-hint">暂无参数</div>'}</div>
                <button class="add-param-btn" onclick="addSchemaParam({ ownerId: '${ownerId}', group: '${group}', tabKey: '${tabKey}' })">+ 添加参数</button>
            `;
        }

        /**
         * 渲染结构参数项。
         * @param {Object} params - 参数项配置
         * @returns {string} 参数项 HTML
         */
        function renderSchemaItem(params) {
            const param = params.param;
            const ownerId = params.ownerId;
            const group = params.group;
            const tabKey = params.tabKey;
            const index = params.index;

            return `
                <div class="schema-item">
                    <div class="schema-row">
                        <input class="form-input" placeholder="参数名" value="${escapeHtml(param.name)}" onchange="updateSchemaParam({ ownerId: '${ownerId}', group: '${group}', tabKey: '${tabKey}', index: ${index}, field: 'name', value: this.value })">
                        <select class="form-select" onchange="updateSchemaParam({ ownerId: '${ownerId}', group: '${group}', tabKey: '${tabKey}', index: ${index}, field: 'type', value: this.value })">
                            ${renderTypeOptions(param.type)}
                        </select>
                        <input class="form-input" placeholder="描述" value="${escapeHtml(param.desc || '')}" onchange="updateSchemaParam({ ownerId: '${ownerId}', group: '${group}', tabKey: '${tabKey}', index: ${index}, field: 'desc', value: this.value })">
                        <button class="btn btn-danger btn-small" onclick="removeSchemaParam({ ownerId: '${ownerId}', group: '${group}', tabKey: '${tabKey}', index: ${index} })">删除</button>
                    </div>
                </div>
            `;
        }

        /**
         * 渲染扁平结构列表。
         * @param {Object} params - 扁平结构参数
         * @returns {string} 扁平结构 HTML
         */
        function renderFlatSchemaList(params) {
            const ownerId = params.ownerId;
            const schema = params.schema;
            const itemsHtml = schema.map((param, index) => `
                <div class="schema-item">
                    <div class="schema-row">
                        <input class="form-input" value="${escapeHtml(param.name)}" onchange="updateFlatSchemaParam({ ownerId: '${ownerId}', index: ${index}, field: 'name', value: this.value })">
                        <select class="form-select" onchange="updateFlatSchemaParam({ ownerId: '${ownerId}', index: ${index}, field: 'type', value: this.value })">${renderTypeOptions(param.type)}</select>
                        <input class="form-input" value="${escapeHtml(param.desc || '')}" onchange="updateFlatSchemaParam({ ownerId: '${ownerId}', index: ${index}, field: 'desc', value: this.value })">
                        <button class="btn btn-danger btn-small" onclick="removeFlatSchemaParam({ ownerId: '${ownerId}', index: ${index} })">删除</button>
                    </div>
                </div>
            `).join('');

            return `
                <div class="schema-list">${itemsHtml || '<div class="empty-hint">暂无出参结构</div>'}</div>
                <button class="add-param-btn" onclick="addFlatSchemaParam('${ownerId}')">+ 添加出参</button>
            `;
        }

        /**
         * 渲染类型下拉选项。
         * @param {string} selectedType - 当前类型
         * @returns {string} 类型选项 HTML
         */
        function renderTypeOptions(selectedType) {
            return ['string', 'number', 'boolean', 'object', 'array'].map(type => `
                <option value="${type}" ${selectedType === type ? 'selected' : ''}>${type}</option>
            `).join('');
        }

        /**
         * 渲染通用 Tabs。
         * @param {Object} params - Tabs 参数
         * @returns {string} Tabs HTML
         */
        function renderTabs(params) {
            const ownerId = params.ownerId;
            const group = params.group;
            const tabs = params.tabs;
            const panelRenderer = params.panelRenderer;
            const buttonsHtml = tabs.map((tab, index) => `
                <button class="tab-btn ${index === 0 ? 'active' : ''}" onclick="switchLocalTab(this, '${ownerId}-${group}-${tab.key}')">${tab.label}</button>
            `).join('');
            const panelsHtml = tabs.map((tab, index) => `
                <div class="tab-panel ${index === 0 ? 'active' : ''}" id="${ownerId}-${group}-${tab.key}">${panelRenderer(tab)}</div>
            `).join('');

            return `<div class="tabs">${buttonsHtml}</div>${panelsHtml}`;
        }

        /**
         * 切换当前卡片内的 Tab。
         * @param {HTMLElement} button - 当前按钮
         * @param {string} panelId - 面板 ID
         * @returns {void}
         */
        function switchLocalTab(button, panelId) {
            const container = button.closest('.node-body') || button.closest('.branch-panel');
            container.querySelectorAll('.tab-btn').forEach(tab => tab.classList.remove('active'));
            container.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
            button.classList.add('active');
            document.getElementById(panelId).classList.add('active');
        }

        /**
         * 获取结构参数数组。
         * @param {Object} params - 定位参数
         * @returns {Array} 参数数组
         */
        function getSchemaByParams(params) {
            const ownerId = params.ownerId;
            const group = params.group;
            const tabKey = params.tabKey;

            if (ownerId === 'trigger') {
                return flowData.trigger.inputParams[tabKey];
            }

            if (group === 'outputAssemble') {
                return flowData.output.assembleParams[tabKey];
            }

            return [];
        }

        /**
         * 添加结构参数。
         * @param {Object} params - 添加参数
         * @returns {void}
         */
        function addSchemaParam(params) {
            getSchemaByParams(params).push(createParam());
            renderWorkspace();
        }

        /**
         * 更新结构参数。
         * @param {Object} params - 更新参数
         * @returns {void}
         */
        function updateSchemaParam(params) {
            const schema = getSchemaByParams(params);
            schema[params.index][params.field] = params.value;
        }

        /**
         * 删除结构参数。
         * @param {Object} params - 删除参数
         * @returns {void}
         */
        function removeSchemaParam(params) {
            getSchemaByParams(params).splice(params.index, 1);
            renderWorkspace();
        }

        /**
         * 创建默认参数。
         * @returns {Object} 默认参数
         */
        function createParam() {
            return { id: generateId(), name: '', type: 'string', desc: '' };
        }

        /**
         * 查找脚本节点。
         * @param {string} ownerId - 节点 ID
         * @returns {Object|null} 脚本节点
         */
        function findScriptNode(ownerId) {
            return flowData.steps.find(step => step.id === ownerId && step.type === 'script') || null;
        }

        /**
         * 添加脚本出参。
         * @param {string} ownerId - 节点 ID
         * @returns {void}
         */
        function addFlatSchemaParam(ownerId) {
            const node = findScriptNode(ownerId);
            node.outputParams.push(createParam());
            renderWorkspace();
        }

        /**
         * 更新脚本出参。
         * @param {Object} params - 更新参数
         * @returns {void}
         */
        function updateFlatSchemaParam(params) {
            const node = findScriptNode(params.ownerId);
            node.outputParams[params.index][params.field] = params.value;
        }

        /**
         * 删除脚本出参。
         * @param {Object} params - 删除参数
         * @returns {void}
         */
        function removeFlatSchemaParam(params) {
            const node = findScriptNode(params.ownerId);
            node.outputParams.splice(params.index, 1);
            renderWorkspace();
        }

        // ========================================
        // 连接器配置逻辑
        // ========================================

        /**
         * 获取连接器版本。
         * @param {Object} node - 连接器节点
         * @returns {Object|null} 连接器版本
         */
        function getConnectorVersion(node) {
            const connector = CONNECTOR_DATA[node.connectorId];
            return connector ? connector.versions.find(version => version.id === node.versionId) || null : null;
        }

        /**
         * 查找连接器节点。
         * @param {string} nodeId - 节点 ID
         * @returns {Object|null} 连接器节点
         */
        function findConnectorNode(nodeId) {
            for (const step of flowData.steps) {
                if (step.id === nodeId && step.type === 'connector') {
                    return step;
                }

                if (step.type === 'parallel') {
                    const branch = step.branches.find(item => item.connector.id === nodeId);
                    if (branch) {
                        return branch.connector;
                    }
                }
            }

            return null;
        }

        /**
         * 更新连接器字段。
         * @param {Object} params - 更新参数
         * @returns {void}
         */
        function updateConnectorField(params) {
            const node = findConnectorNode(params.nodeId);
            node[params.field] = params.value;

            if (params.resetVersion) {
                node.versionId = '';
                node.authMethodId = '';
                node.inputMappings = {};
            }

            renderWorkspace();
        }

        /**
         * 渲染认证方式配置。
         * @param {Object} params - 认证参数
         * @returns {string} 认证方式 HTML
         */
        function renderAuthMethods(params) {
            const node = params.node;
            const connector = params.connector;

            return connector.authMethods.map(method => `
                <label class="auth-item" style="display: block; margin-bottom: 8px; cursor: pointer;">
                    <input type="radio" name="auth-${node.id}" value="${method.id}" ${node.authMethodId === method.id ? 'checked' : ''} onchange="updateConnectorField({ nodeId: '${node.id}', field: 'authMethodId', value: this.value })">
                    <strong>${method.name}</strong>
                    <div class="form-help">${method.params.map(param => `${param.carrier}.${param.name}: ${param.type}`).join('，')}</div>
                </label>
            `).join('');
        }

        /**
         * 渲染连接器入参映射 Tabs。
         * @param {Object} params - 入参映射参数
         * @returns {string} 入参映射 HTML
         */
        function renderMappingTabs(params) {
            const node = params.node;
            const inputParams = params.inputParams;
            const tabs = [
                { key: 'header', label: 'HTTP请求头' },
                { key: 'body', label: 'HTTP请求体' },
                { key: 'query', label: 'URL查询参数' }
            ];

            return renderTabs({
                ownerId: node.id,
                group: 'connectorInput',
                tabs,
                panelRenderer: tab => renderMappingList({ node, tabKey: tab.key, params: inputParams[tab.key] || [] })
            });
        }

        /**
         * 渲染入参映射列表。
         * @param {Object} params - 映射列表参数
         * @returns {string} 映射列表 HTML
         */
        function renderMappingList(params) {
            const node = params.node;
            const tabKey = params.tabKey;
            const paramList = params.params;
            const upstreamOptions = getUpstreamOptions(node.id);
            const itemsHtml = paramList.map(param => renderMappingItem({ node, tabKey, param, upstreamOptions })).join('');

            return `<div class="mapping-list">${itemsHtml || '<div class="empty-hint">当前版本无该位置入参</div>'}</div>`;
        }

        /**
         * 渲染入参映射项。
         * @param {Object} params - 映射项参数
         * @returns {string} 映射项 HTML
         */
        function renderMappingItem(params) {
            const node = params.node;
            const tabKey = params.tabKey;
            const param = params.param;
            const upstreamOptions = params.upstreamOptions;
            const mappingKey = `${tabKey}.${param.name}`;
            const value = node.inputMappings[mappingKey] || '';
            const optionsHtml = upstreamOptions.map(option => `
                <option value="${escapeHtml(option.value)}" ${value === option.value ? 'selected' : ''}>${escapeHtml(option.label)}</option>
            `).join('');

            return `
                <div class="mapping-item">
                    <div class="mapping-row">
                        <input class="form-input" value="${escapeHtml(param.name)}" readonly>
                        <input class="form-input" value="${escapeHtml(param.type)}" readonly>
                        <select class="form-select" onchange="updateInputMapping({ nodeId: '${node.id}', mappingKey: '${mappingKey}', value: this.value })">
                            <option value="">请选择上游节点数据</option>
                            ${optionsHtml}
                        </select>
                    </div>
                    <div class="form-help">${escapeHtml(param.desc || '')}</div>
                </div>
            `;
        }

        /**
         * 更新入参映射。
         * @param {Object} params - 映射参数
         * @returns {void}
         */
        function updateInputMapping(params) {
            const node = findConnectorNode(params.nodeId);
            node.inputMappings[params.mappingKey] = params.value;
        }

        /**
         * 获取上游节点可引用参数。
         * @param {string} nodeId - 当前节点 ID
         * @returns {Array} 上游选项
         */
        function getUpstreamOptions(nodeId) {
            const options = [];
            const nodes = getVisibleNodes();
            const currentIndex = findVisibleNodeIndex(nodeId);
            const upstreamNodes = currentIndex >= 0 ? nodes.slice(0, currentIndex) : nodes;

            collectTriggerOptions(options);
            upstreamNodes.forEach(node => collectNodeOutputOptions({ options, node }));

            return options;
        }

        /**
         * 查找可见节点索引。
         * @param {string} nodeId - 节点 ID
         * @returns {number} 可见节点索引
         */
        function findVisibleNodeIndex(nodeId) {
            const nodes = getVisibleNodes();
            const directIndex = nodes.findIndex(node => node.id === nodeId);

            if (directIndex >= 0) {
                return directIndex;
            }

            const parallelIndex = nodes.findIndex(node => node.type === 'parallel' && node.branches.some(branch => branch.connector.id === nodeId));
            return parallelIndex;
        }

        /**
         * 收集触发器入参选项。
         * @param {Array} options - 选项数组
         * @returns {void}
         */
        function collectTriggerOptions(options) {
            Object.keys(flowData.trigger.inputParams).forEach(position => {
                flowData.trigger.inputParams[position].forEach(param => {
                    options.push({ label: `触发器.${position}.${param.name}`, value: `trigger.${position}.${param.name}` });
                });
            });
        }

        /**
         * 收集节点出参选项。
         * @param {Object} params - 收集参数
         * @returns {void}
         */
        function collectNodeOutputOptions(params) {
            const options = params.options;
            const node = params.node;

            if (node.type === 'connector') {
                collectConnectorOutputOptions({ options, node, prefix: '连接器' });
            }

            if (node.type === 'script') {
                node.outputParams.forEach(param => options.push({ label: `脚本.${param.name}`, value: `${node.id}.${param.name}` }));
            }

            if (node.type === 'parallel') {
                node.branches.forEach(branch => collectConnectorOutputOptions({ options, node: branch.connector, prefix: `并行.${branch.label}` }));
            }
        }

        /**
         * 收集连接器版本出参选项。
         * @param {Object} params - 收集参数
         * @returns {void}
         */
        function collectConnectorOutputOptions(params) {
            const options = params.options;
            const node = params.node;
            const prefix = params.prefix;
            const version = getConnectorVersion(node);

            if (!version) {
                return;
            }

            version.outputParams.forEach(param => {
                options.push({ label: `${prefix}.${param.name}`, value: `${node.id}.${param.name}` });
            });
        }

        /**
         * 渲染数据输出映射 Tabs。
         * @param {Object} node - 数据输出节点
         * @returns {string} 输出映射 HTML
         */
        function renderOutputMappingTabs(node) {
            const tabs = [
                { key: 'body', label: 'HTTP响应体' },
                { key: 'header', label: 'HTTP响应头' }
            ];

            return renderTabs({
                ownerId: node.id,
                group: 'outputAssemble',
                tabs,
                panelRenderer: tab => renderOutputMappingList({ node, tabKey: tab.key, schema: node.assembleParams[tab.key] || [] })
            });
        }

        /**
         * 渲染输出组装列表。
         * @param {Object} params - 输出组装参数
         * @returns {string} 输出组装 HTML
         */
        function renderOutputMappingList(params) {
            const node = params.node;
            const tabKey = params.tabKey;
            const schema = params.schema;
            const upstreamOptions = getUpstreamOptions(node.id);
            const itemsHtml = schema.map((param, index) => renderOutputMappingItem({ tabKey, param, index, upstreamOptions })).join('');

            return `
                <div class="mapping-list">${itemsHtml || '<div class="empty-hint">暂无响应参数</div>'}</div>
                <button class="add-param-btn" onclick="addSchemaParam({ ownerId: 'output', group: 'outputAssemble', tabKey: '${tabKey}' })">+ 添加响应参数</button>
            `;
        }

        /**
         * 渲染输出组装项。
         * @param {Object} params - 输出组装项参数
         * @returns {string} 输出组装项 HTML
         */
        function renderOutputMappingItem(params) {
            const tabKey = params.tabKey;
            const param = params.param;
            const index = params.index;
            const upstreamOptions = params.upstreamOptions;
            const optionsHtml = upstreamOptions.map(option => `<option value="${escapeHtml(option.value)}" ${param.source === option.value ? 'selected' : ''}>${escapeHtml(option.label)}</option>`).join('');

            return `
                <div class="mapping-item">
                    <div class="mapping-row">
                        <input class="form-input" value="${escapeHtml(param.name)}" onchange="updateSchemaParam({ ownerId: 'output', group: 'outputAssemble', tabKey: '${tabKey}', index: ${index}, field: 'name', value: this.value })">
                        <select class="form-select" onchange="updateSchemaParam({ ownerId: 'output', group: 'outputAssemble', tabKey: '${tabKey}', index: ${index}, field: 'type', value: this.value })">${renderTypeOptions(param.type)}</select>
                        <select class="form-select" onchange="updateSchemaParam({ ownerId: 'output', group: 'outputAssemble', tabKey: '${tabKey}', index: ${index}, field: 'source', value: this.value })">
                            <option value="">请选择上游节点数据</option>
                            ${optionsHtml}
                        </select>
                    </div>
                </div>
            `;
        }

        // ========================================
        // 并行节点交互
        // ========================================

        /**
         * 获取当前激活分支。
         * @param {Object} node - 并行节点
         * @returns {Object} 当前分支
         */
        function getActiveBranch(node) {
            const activeBranch = node.branches.find(branch => branch.id === node.activeBranchId);
            return activeBranch || node.branches[0];
        }

        /**
         * 查找并行节点。
         * @param {string} nodeId - 并行节点 ID
         * @returns {Object|null} 并行节点
         */
        function findParallelNode(nodeId) {
            return flowData.steps.find(step => step.id === nodeId && step.type === 'parallel') || null;
        }

        /**
         * 切换并行分支。
         * @param {Object} params - 分支参数
         * @returns {void}
         */
        function switchParallelBranch(params) {
            const node = findParallelNode(params.nodeId);
            node.activeBranchId = params.branchId;
            renderWorkspace();
        }

        /**
         * 添加并行分支。
         * @param {string} nodeId - 并行节点 ID
         * @returns {void}
         */
        function addParallelBranchToNode(nodeId) {
            const node = findParallelNode(nodeId);
            node.branches.push(createParallelBranch(node.branches.length + 1));
            node.activeBranchId = node.branches[node.branches.length - 1].id;
            showToast({ message: '已添加并行分支' });
            renderWorkspace();
        }

        /**
         * 更新分支名称。
         * @param {Object} params - 分支名称参数
         * @returns {void}
         */
        function updateBranchLabel(params) {
            const node = findParallelNode(params.nodeId);
            const branch = node.branches.find(item => item.id === params.branchId);
            branch.label = params.value;
        }

        /**
         * 删除并行分支。
         * @param {Object} params - 删除分支参数
         * @returns {void}
         */
        function removeParallelBranch(params) {
            const node = findParallelNode(params.nodeId);
            node.branches = node.branches.filter(branch => branch.id !== params.branchId);
            node.activeBranchId = node.branches[0].id;
            renderWorkspace();
        }

        // ========================================
        // Monaco Editor 逻辑
        // ========================================

        /**
         * 调度脚本编辑器初始化。
         * @returns {void}
         */
        function scheduleMonacoEditors() {
            setTimeout(initMonacoEditors, 0);
        }

        /**
         * 释放旧的 Monaco 编辑器实例。
         * @returns {void}
         */
        function disposeMonacoEditors() {
            Object.keys(monacoEditors).forEach(nodeId => {
                monacoEditors[nodeId].dispose();
                delete monacoEditors[nodeId];
            });
        }

        /**
         * 初始化 Monaco 编辑器。
         * @returns {void}
         */
        function initMonacoEditors() {
            const scriptNodes = flowData.steps.filter(step => step.type === 'script');

            if (scriptNodes.length === 0) {
                return;
            }

            if (!window.require) {
                showScriptFallback(scriptNodes, 'Monaco Editor 加载失败，请使用备用输入框。');
                return;
            }

            if (!monacoLoadStarted) {
                monacoLoadStarted = true;
                window.require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
            }

            window.require(['vs/editor/editor.main'], function () {
                scriptNodes.forEach(node => createMonacoEditor(node));
            }, function () {
                showScriptFallback(scriptNodes, 'Monaco Editor 加载失败，请使用备用输入框。');
            });
        }

        /**
         * 创建单个 Monaco 编辑器。
         * @param {Object} node - 脚本节点
         * @returns {void}
         */
        function createMonacoEditor(node) {
            const container = document.getElementById(`editor-${node.id}`);
            const status = document.getElementById(`status-${node.id}`);

            if (!container || monacoEditors[node.id]) {
                return;
            }

            monacoEditors[node.id] = monaco.editor.create(container, {
                value: node.script,
                language: 'typescript',
                theme: 'vs',
                minimap: { enabled: false },
                automaticLayout: true
            });

            monacoEditors[node.id].onDidChangeModelContent(function () {
                node.script = monacoEditors[node.id].getValue();
                validateTypeScript({ editor: monacoEditors[node.id], status });
            });

            validateTypeScript({ editor: monacoEditors[node.id], status });
        }

        /**
         * 校验 TypeScript 脚本。
         * @param {Object} params - 校验参数
         * @returns {void}
         */
        function validateTypeScript(params) {
            const editor = params.editor;
            const status = params.status;
            const model = editor.getModel();
            const markers = monaco.editor.getModelMarkers({ resource: model.uri });

            if (markers.length > 0) {
                status.className = 'script-status error';
                status.textContent = `TS校验发现 ${markers.length} 个问题，请检查脚本。`;
                return;
            }

            status.className = 'script-status success';
            status.textContent = 'TS脚本校验通过。';
        }

        /**
         * 展示脚本备用输入框。
         * @param {Array} scriptNodes - 脚本节点列表
         * @param {string} message - 状态文案
         * @returns {void}
         */
        function showScriptFallback(scriptNodes, message) {
            scriptNodes.forEach(node => {
                const editor = document.getElementById(`editor-${node.id}`);
                const fallback = document.getElementById(`fallback-${node.id}`);
                const status = document.getElementById(`status-${node.id}`);

                if (editor) {
                    editor.style.display = 'none';
                }

                if (fallback) {
                    fallback.style.display = 'block';
                }

                if (status) {
                    status.className = 'script-status error';
                    status.textContent = message;
                }
            });
        }

        /**
         * 更新脚本内容。
         * @param {Object} params - 脚本参数
         * @returns {void}
         */
        function updateScriptContent(params) {
            const node = findScriptNode(params.nodeId);
            node.script = params.value;
        }

        /**
         * 切换缓存配置显示。
         * @param {boolean} enabled - 是否开启缓存
         * @returns {void}
         */
        function toggleCacheConfig(enabled) {
            document.getElementById('cacheConfig').style.display = enabled ? 'block' : 'none';
        }

        /**
         * 渲染缓存 Key 列表。
         * @returns {void}
         */
        function renderCacheKeyList() {
            const cacheKeyList = document.getElementById('cacheKeyList');

            if (cacheKeyList.children.length === 0) {
                cacheKeyList.innerHTML = createCacheKeyItemHtml('');
            }
        }

        /**
         * 生成缓存 Key 单项 HTML。
         * @param {string} selectedValue - 已选择的值
         * @returns {string} 缓存 Key 单项 HTML
         */
        function createCacheKeyItemHtml(selectedValue) {
            return `
                <div class="cache-key-item">
                    <select class="form-select cache-key-select" onchange="updateCacheKeyState()">
                        ${getCacheKeyOptionsHtml(selectedValue)}
                    </select>
                    <button type="button" class="btn" onclick="removeCacheKeyItem(this)">删除</button>
                </div>
            `;
        }

        /**
         * 获取缓存 Key 下拉选项 HTML。
         * @param {string} selectedValue - 已选择的值
         * @returns {string} 选项 HTML
         */
        function getCacheKeyOptionsHtml(selectedValue) {
            const options = getCacheKeyOptions();
            const optionHtml = options.map(option => `
                <option value="${option}" ${option === selectedValue ? 'selected' : ''}>${option}</option>
            `).join('');

            return `<option value="">从触发器入参中选择</option>${optionHtml}`;
        }

        /**
         * 获取缓存 Key 可选值列表。
         * @returns {Array<string>} 可选值列表
         */
        function getCacheKeyOptions() {
            const params = flowData.trigger.inputParams;
            const list = [];

            ['header', 'body', 'query'].forEach(position => {
                (params[position] || []).forEach(item => {
                    if (item.name && list.indexOf(item.name) === -1) {
                        list.push(item.name);
                    }
                });
            });

            return list;
        }

        /**
         * 新增缓存 Key 配置项。
         * @returns {void}
         */
        function addCacheKeyItem() {
            const cacheKeyList = document.getElementById('cacheKeyList');
            cacheKeyList.insertAdjacentHTML('beforeend', createCacheKeyItemHtml(''));
            updateCacheKeyState();
        }

        /**
         * 删除缓存 Key 配置项。
         * @param {HTMLElement} btn - 删除按钮
         * @returns {void}
         */
        function removeCacheKeyItem(btn) {
            const item = btn.closest('.cache-key-item');

            if (item) {
                item.remove();
            }

            updateCacheKeyState();
        }

        /**
         * 更新缓存 Key 选项禁用与拼接预览。
         * @returns {void}
         */
        function updateCacheKeyState() {
            const selects = document.querySelectorAll('#cacheKeyList .cache-key-select');
            const selectedValues = Array.from(selects).map(select => select.value).filter(value => value !== '');

            selects.forEach(select => {
                Array.from(select.options).forEach(option => {
                    const taken = option.value !== '' && option.value !== select.value && selectedValues.indexOf(option.value) !== -1;
                    option.disabled = taken;
                });
            });

            const options = getCacheKeyOptions();
            const addButton = document.getElementById('cacheKeyAddButton');
            addButton.style.display = selectedValues.length >= options.length && options.length > 0 ? 'none' : 'inline-flex';

            const preview = document.getElementById('cacheKeyPreview');
            preview.textContent = selectedValues.length === 0 ? '-' : selectedValues.join('_');
        }

        /**
         * 校验并保存更多配置。
         * @returns {void}
         */
        function saveMoreConfig() {
            const rateLimit = parseInt(document.getElementById('rateLimitInput').value, 10);
            const cacheEnabled = document.getElementById('cacheEnabled').checked;
            const cacheTime = parseInt(document.getElementById('cacheTime').value, 10);
            const cacheKeySelects = document.querySelectorAll('#cacheKeyList .cache-key-select');
            const cacheKeys = Array.from(cacheKeySelects).map(select => select.value).filter(value => value !== '');

            if (!Number.isInteger(rateLimit) || rateLimit < 1) {
                showToast({ message: '请输入大于0的限流值', type: 'error' });
                return;
            }

            if (rateLimit > APP_FLOW_CONFIG_LIMITS.rateLimitMax) {
                showToast({ message: `限流值不能超过当前应用上限${APP_FLOW_CONFIG_LIMITS.rateLimitMax}`, type: 'error' });
                return;
            }

            if (cacheEnabled) {
                if (!Number.isInteger(cacheTime) || cacheTime < 1 || cacheTime > APP_FLOW_CONFIG_LIMITS.cacheTimeMax) {
                    showToast({ message: '开启缓存后需要配置有效缓存时间', type: 'error' });
                    return;
                }

                if (cacheKeys.length === 0) {
                    showToast({ message: '开启缓存后至少选择一个缓存Key', type: 'error' });
                    return;
                }

                if (new Set(cacheKeys).size !== cacheKeys.length) {
                    showToast({ message: '缓存Key每个只能选择一次', type: 'error' });
                    return;
                }
            }

            closeMoreConfigDrawer();
            showToast({ message: '更多配置已保存' });
        }

         * 打开调试抽屉。
         * @returns {void}
         */
        function openDebugDrawer() {
            document.getElementById('debugFlowName').textContent = document.getElementById('flowName').textContent;
            renderDebugInputs();
            document.getElementById('debugOutput').innerHTML = '<span style="color: var(--text-tertiary);">点击"立即调试"查看执行结果...</span>';
            document.getElementById('debugDrawer').classList.add('active');
        }

        /**
         * 关闭调试抽屉。
         * @returns {void}
         */
        function closeDebugDrawer() {
            document.getElementById('debugDrawer').classList.remove('active');
        }

        /**
         * 渲染调试入参 schema 列表。
         * @returns {void}
         */
        function renderDebugInputs() {
            ['header', 'body', 'query'].forEach(position => {
                const container = document.getElementById(`debug-input-params-${position}`);
                const params = (flowData.trigger.inputParams[position] || []);

                if (params.length === 0) {
                    container.innerHTML = '<div class="schema-empty">暂无入参</div>';
                    return;
                }

                container.innerHTML = params.map(param => `
                    <div class="schema-row">
                        <span class="param-name">${escapeHtml(param.name || '-')}</span>
                        <span class="param-type">${escapeHtml(param.type || '')}</span>
                        <input class="form-input" data-param="${escapeHtml(param.name || '')}" placeholder="请输入${escapeHtml(param.name || '参数值')}" />
                    </div>
                `).join('');
            });
        }

        /**
         * 切换调试入参 tab。
         * @param {string} tabKey - tab 键
         * @returns {void}
         */
        function switchDebugInputTab(tabKey) {
            const tabs = document.querySelectorAll('#debugInputTabs .tab-btn');
            const panels = document.querySelectorAll('#debugInputContent .tab-panel');

            tabs.forEach(btn => {
                const matched = btn.textContent.indexOf(tabKey === 'header' ? 'HTTP请求头' : tabKey === 'body' ? 'HTTP请求体' : 'URL查询参数') !== -1;
                btn.classList.toggle('active', matched);
            });

            panels.forEach(panel => {
                panel.classList.toggle('active', panel.getAttribute('data-tab') === tabKey);
            });
        }

        /**
         * 执行调试。
         * @returns {void}
         */
        function executeDebug() {
            const output = document.getElementById('debugOutput');
            const inputs = document.querySelectorAll('#debugInputContent .form-input');
            const params = {};
            inputs.forEach(input => {
                const key = input.getAttribute('data-param');
                if (key) {
                    params[key] = input.value;
                }
            });

            output.innerHTML = '<span style="color: var(--primary-color);">正在执行调试...</span>';

            setTimeout(function () {
                const result = {
                    success: true,
                    params,
                    result: '这是调试执行的输出结果',
                    executedAt: new Date().toISOString()
                };
                output.textContent = JSON.stringify(result, null, 2);
                showToast({ message: '调试执行成功' });
            }, 800);
        }

        /**
         * 展示提示。
         * @param {Object} params - 提示参数
         * @returns {void}
         */
        function showToast(params) {
            const toast = document.getElementById('toast');
            toast.textContent = params.message;
            toast.className = `toast show ${params.type || 'success'}`;
            setTimeout(function () {
                toast.className = 'toast';
            }, 1800);
        }

        /**
         * 转义 HTML 字符。
         * @param {string} value - 原始文本
         * @returns {string} 转义文本
         */
        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        /**
         * 页面加载完成后初始化。
         */
        initPage();
    </script>
</body>

</html>
