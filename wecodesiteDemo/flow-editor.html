<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接流编辑器 - 连接平台</title>
    <style>
        /* ========================================
           全局样式变量
           ======================================== */
        :root {
            --primary-color: #1890ff;
            --primary-hover: #40a9ff;
            --success-color: #52c41a;
            --warning-color: #faad14;
            --error-color: #ff4d4f;
            --text-primary: #262626;
            --text-secondary: #595959;
            --text-tertiary: #8c8c8c;
            --border-color: #d9d9d9;
            --bg-light: #fafafa;
            --bg-white: #ffffff;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 6px 16px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5715;
            color: var(--text-primary);
            background: var(--bg-light);
            overflow: hidden;
        }

        /* ========================================
           页面布局
           ======================================== */
        .page-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ========================================
           左侧导航栏
           ======================================== */
        .sidebar {
            width: 220px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 24px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-menu {
            list-style: none;
            padding: 12px 0;
            flex: 1;
        }

        .sidebar-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-item:hover {
            background: var(--bg-light);
            color: var(--primary-color);
        }

        .sidebar-item.active {
            background: #e6f7ff;
            color: var(--primary-color);
            font-weight: 500;
            border-right: 3px solid var(--primary-color);
        }

        /* ========================================
           主内容区域
           ======================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ========================================
           编辑器头部
           ======================================== */
        .editor-header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            background-color: #fff;
            border-bottom: 1px solid #e8e8e8;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--primary-color);
        }

        .flow-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .node-count {
            color: var(--text-tertiary);
            font-size: 12px;
        }

        /* ========================================
           按钮样式
           ======================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 16px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-white);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            gap: 6px;
        }

        .btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-primary {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            color: #fff;
        }

        /* ========================================
           编辑器主体
           ======================================== */
        .editor-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ========================================
           节点库面板
           ======================================== */
        .node-library {
            width: 260px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .node-library-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .node-library-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .node-library-desc {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .node-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .node-card {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: grab;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .node-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow-sm);
        }

        .node-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .node-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #fff;
            flex-shrink: 0;
        }

        .node-icon.trigger { background: linear-gradient(135deg, #1890ff, #096dd9); }
        .node-icon.action { background: linear-gradient(135deg, #52c41a, #389e0d); }
        .node-icon.condition { background: linear-gradient(135deg, #fa8c16, #d46b08); }
        .node-icon.data { background: linear-gradient(135deg, #722ed1, #531dab); }
        .node-icon.output { background: linear-gradient(135deg, #eb2f96, #c41d7f); }
        .node-icon.error { background: linear-gradient(135deg, #ff4d4f, #cf1322); }
        .node-icon.forLoop { background: linear-gradient(135deg, #13c2c2, #08979c); }
        .node-icon.parallel { background: linear-gradient(135deg, #597ef7, #4030a8); }

        /* ========================================
           参数配置样式
           ======================================== */
        .schema-list {
            margin-bottom: 12px;
        }

        .param-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            border-radius: 4px;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: var(--primary-color);
            background: var(--bg-light);
        }

        .tab-btn.active {
            color: var(--primary-color);
            background: #e6f7ff;
            font-weight: 500;
        }

        .param-tab-content .tab-panel {
            display: none;
        }

        .param-tab-content .tab-panel.active {
            display: block;
        }

        .param-item .param-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .add-param-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: 1px dashed var(--border-color);
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .add-param-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .add-item-btn {
            padding: 4px 8px;
            border: 1px dashed var(--border-color);
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .add-item-btn:hover {
            border-color: var(--primary-color);
            background: #e6f7ff;
        }

        .param-remove-btn {
            padding: 4px 8px;
            border: none;
            background: transparent;
            color: var(--error-color);
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            transition: all 0.3s;
        }

        .param-remove-btn:hover {
            background: #fff1f0;
        }

        /* 配置按钮样式 */
        .param-config-btn {
            border: none;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .param-config-btn:hover {
            border-color: var(--primary-color);
            background: #e6f7ff;
        }

        /* ========================================
           SYSTOKEN凭证白名单样式
           ======================================== */
        .systoken-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .systoken-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .systoken-item input {
            flex: 1;
        }

        .systoken-add-btn {
            margin-top: 8px;
        }

        .node-info {
            flex: 1;
            min-width: 0;
        }

        .node-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .node-desc {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        .node-added {
            font-size: 10px;
            color: var(--text-tertiary);
            margin-left: 4px;
        }

        /* ========================================
           画布区域
           ======================================== */
        .canvas-area {
            flex: 1;
            position: relative;
            background: var(--bg-light);
            background-image:
                radial-gradient(circle, #d9d9d9 1px, transparent 1px);
            background-size: 20px 20px;
            overflow: hidden;
        }

        .canvas-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 流程节点 */
        .flow-node {
            position: absolute;
            min-width: 160px;
            background: var(--bg-white);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            cursor: move;
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .flow-node:hover {
            box-shadow: var(--shadow-md);
        }

        .flow-node.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .flow-node.trigger {
            border-color: #1890ff;
        }

        .flow-node.action {
            border-color: #52c41a;
        }

        .flow-node.condition {
            border-color: #faad14;
        }

        .flow-node.data {
            border-color: #722ed1;
        }

        .flow-node.output {
            border-color: #eb2f96;
        }

        /* 循环节点 */
        .flow-node.forLoop {
            border-color: #13c2c2;
        }

        .flow-node.forLoop .node-header-icon {
            background: linear-gradient(135deg, #13c2c2, #08979c);
        }

        /* 条件分支节点 */
        .flow-node.condition {
            border-color: #fa8c16;
        }

        .flow-node.condition .node-header-icon {
            background: linear-gradient(135deg, #fa8c16, #d46b08);
        }

        /* 并行节点 */
        .flow-node.parallel {
            border-color: #597ef7;
        }

        .flow-node.parallel .node-header-icon {
            background: linear-gradient(135deg, #597ef7, #4030a8);
        }

        /* 异常处理节点 */
        .flow-node.error .node-header-icon {
            background: linear-gradient(135deg, #ff4d4f, #cf1322);
        }

        .node-header {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .node-header-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #fff;
        }

        .node-header-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            flex: 1;
        }

        .node-body {
            padding: 10px 12px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* 节点内容区域 */
        .node-content {
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            border-top: 1px dashed var(--border-color);
        }

        /* 连接点 */
        .node-port {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--bg-white);
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            cursor: crosshair;
            z-index: 10;
        }

        .node-port.top {
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
        }

        .node-port.bottom {
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* 右侧 Handle（用于循环和异常处理的子节点入口） */
        .node-port.right {
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* 多出口 Handle（用于条件分支和并行，放置在底部） */
        .node-port.multi-output {
            width: 10px;
            height: 10px;
            bottom: -5px;
            border-radius: 2px;
            background: var(--bg-white);
        }

        .node-port:hover {
            background: var(--primary-color);
        }

        /* 连接线 */
        .flow-edge {
            position: absolute;
            pointer-events: none;
        }

        .flow-edge path {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 2;
        }

        .flow-edge.animated path {
            stroke-dasharray: 5;
            animation: dash 0.5s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -10;
            }
        }

        /* ========================================
           节点配置抽屉
           ======================================== */
        .config-drawer {
            position: fixed;
            top: 0;
            right: 0;
            width: 600px;
            height: 100vh;
            background: var(--bg-white);
            box-shadow: -4px 0 16px rgba(0, 0, 0, 0.1);
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .config-drawer.active {
            transform: translateX(0);
        }

        .drawer-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .drawer-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .drawer-close {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .drawer-close:hover {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .drawer-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .form-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            resize: vertical;
            min-height: 60px;
            transition: all 0.3s;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .form-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: var(--bg-white);
            cursor: pointer;
        }

        /* ========================================
           Toast消息
           ======================================== */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 6px;
            box-shadow: var(--shadow-md);
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s;
            color: #fff;
            font-size: 14px;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: var(--success-color);
        }

        .toast.error {
            background: var(--error-color);
        }

        /* ========================================
           空状态
           ======================================== */
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--text-tertiary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* ========================================
           弹窗样式
           ======================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-white);
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--bg-light);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* 引用参数项样式 */
        .reference-param-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .reference-param-item:hover {
            background: var(--bg-light);
        }

        .reference-param-item.selected {
            background: #e6f7ff;
            border: 1px solid var(--primary-color);
        }

        .reference-param-item .param-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .reference-param-item .param-type {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <!-- 页面主容器 -->
    <div class="page-container">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <div class="sidebar-header">连接平台</div>
            <ul class="sidebar-menu">
                <li class="sidebar-item" onclick="navigateTo('connector-list.html')">
                    <span>⚡</span>
                    <span>连接器管理</span>
                </li>
                <li class="sidebar-item active">
                    <span>🔗</span>
                    <span>连接流管理</span>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 编辑器头部 -->
            <div class="editor-header">
                <div class="header-left">
                    <button class="back-btn" onclick="handleBack()">
                        ← 返回
                    </button>
                    <span class="flow-name" id="flowName">未命名流程</span>
                    <div class="version-selector" style="margin-left: 16px;">
                        <label style="font-size: 13px; color: var(--text-secondary); margin-right: 8px;">版本:</label>
                        <select id="flowVersionSelect" onchange="handleVersionChange(this.value)" style="padding: 6px 12px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; cursor: pointer;">
                            <option value="v1">v1.0.0 (2024-01-15) [草稿]</option>
                            <option value="v2">v0.9.0 (2024-01-10) [已发布]</option>
                            <option value="v3">v0.8.0 (2024-01-05) [已失效]</option>
                            <option value="v4">v0.7.0 (2024-01-01) [审批中]</option>

    <!-- 参数配置弹窗（用于连接器节点和数据输出节点） -->
    <div class="modal-overlay" id="paramConfigModal">
        <div class="modal" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title">参数配置</h3>

            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">参数名称</label>
                    <input type="text" class="form-input" id="paramConfigName" readonly style="background: var(--bg-light);">
                </div>
                <div class="form-group">
                    <label class="form-label">参数类型</label>
                    <input type="text" class="form-input" id="paramConfigType" readonly style="background: var(--bg-light);">
                </div>
                <div class="form-group">
                    <label class="form-label">配置方式</label>

                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="paramConfigType" value="fixed" id="configTypeFixed" onchange="handleParamConfigTypeChange()">
                            <span>固定值</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer;">
                            <input type="radio" name="paramConfigType" value="reference" id="configTypeReference" onchange="handleParamConfigTypeChange()">
                            <span>引用参数</span>
                        </label>
                    </div>

                <!-- 固定值输入区域 -->
                <div class="form-group" id="paramConfigFixedArea" style="display: none;">
                    <label class="form-label">固定值</label>
                    <input type="text" class="form-input" id="paramConfigFixedValue" placeholder="请输入固定值">
                </div>
                <!-- 引用参数选择区域 -->
                <div class="form-group" id="paramConfigReferenceArea" style="display: none;">
                    <label class="form-label">选择引用参数</label>
                    <div id="paramConfigReferenceList" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 6px; padding: 8px;">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeParamConfigModal()">取消</button>
                <button class="btn btn-primary" onclick="saveParamConfig()">确定</button>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // 参数配置辅助函数（从connector-editor.html复用）
        // ========================================

        /**
         * 判断参数类型是否为复杂类型（object 或 array）
         * @param {string} paramType - 参数类型
         * @returns {boolean} 是否为复杂类型
         */
        function isComplexType(paramType) {
            return paramType === 'object' || paramType === 'array';
        }

        /**
         * 递归渲染参数项（支持无限层级嵌套）
         * @param {Object} param - 参数配置对象
         * @param {number} depth - 当前层级深度
         * @returns {string} 参数项HTML字符串
         */
        function renderParamItem(param, depth = 0) {
            const id = param.id || generateId();
            const paramType = param.paramType || 'string';
            const isComplex = isComplexType(paramType);
            const childrenParams = param.children || [];

            const indent = 24 + (depth * 16);
            const rowPadding = depth === 0 ? '6px 10px' : '4px 8px';

            const childrenHtml = isComplex && childrenParams.length > 0
                ? childrenParams.map(child => renderParamItem(child, depth + 1)).join('')
                : '';

            const childrenContainerHtml = isComplex
                ? `<div class="children-container" style="margin-left: ${indent}px;">
                    ${childrenHtml}
                   </div>`
                : '';

            // 复杂类型（object/array）显示下拉菜单添加按钮，简单类型显示普通添加按钮
            const addButtonHtml = isComplex
                ? `<div class="dropdown-menu" style="position: relative; display: inline-block;">
                    <button type="button" class="add-item-btn" onclick="toggleItemDropdown(this)" style="padding: ${rowPadding}; border: none; background: transparent;">
                        添加
                    </button>
                    <div class="dropdown-content" style="display: none; position: absolute; background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 4px; box-shadow: var(--shadow-md); z-index: 10; min-width: 120px;">
                        <button type="button" onclick="addChildParam(this, 'child')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                            添加子节点
                        </button>
                        <button type="button" onclick="addChildParam(this, 'sibling')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                            添加兄弟节点
                        </button>
                    </div>
                   </div>`
                : `<button type="button" class="add-item-btn" onclick="addSiblingParam(this)" style="padding: ${rowPadding}; border: none; background: transparent;">添加</button>`;

            return `
                <div class="param-item" data-id="${id}" data-param-type="${paramType}" data-depth="${depth}">
                    <div class="param-row" style="display: flex; align-items: center; gap: 8px;">
                        <input type="text" class="param-name" placeholder="参数名称" value="${param.paramName || ''}"
                            style="width: 100px; padding: ${rowPadding}; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px;">
                        <select class="param-type" style="padding: ${rowPadding}; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; width: 80px;" onchange="handleParamTypeChange(this)">
                            <option value="string" ${paramType === 'string' ? 'selected' : ''}>string</option>
                            <option value="number" ${paramType === 'number' ? 'selected' : ''}>number</option>
                            <option value="boolean" ${paramType === 'boolean' ? 'selected' : ''}>boolean</option>
                            <option value="object" ${paramType === 'object' ? 'selected' : ''}>object</option>
                            <option value="array" ${paramType === 'array' ? 'selected' : ''}>array</option>
                        </select>
                        <input type="text" class="param-desc" placeholder="描述" value="${param.description || ''}"
                            style="flex: 1; min-width: 80px; padding: ${rowPadding}; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px;">
                        ${addButtonHtml}
                        <button type="button" class="param-remove-btn" onclick="removeParamItem(this)">删除</button>
                    </div>
                    ${childrenContainerHtml}
                </div>
            `;
        }

        /**
         * 切换添加按钮下拉菜单
         * @param {HTMLElement} btn - 按钮元素
         */
        function toggleItemDropdown(btn) {
            const dropdown = btn.closest('.dropdown-menu').querySelector('.dropdown-content');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        }

        /**
         * 添加子参数或同级参数
         * @param {HTMLElement} btn - 添加按钮元素
         * @param {string} type - 添加类型（'child' 或 'sibling'）
         */
        function addChildParam(btn, type) {
            btn.closest('.dropdown-content').style.display = 'none';
            const paramItem = btn.closest('.param-item');
            const depth = parseInt(paramItem.dataset.depth) || 0;
            const tabPanel = btn.closest('.tab-panel');

            if (type === 'child') {
                const childrenContainer = paramItem.querySelector('.children-container');
                if (childrenContainer) {
                    const childHtml = renderParamItem({}, depth + 1);
                    childrenContainer.insertAdjacentHTML('beforeend', childHtml);
                }
            } else {
                // 添加兄弟节点：找到参数列表容器并添加
                const parent = paramItem.parentElement;
                let targetContainer;

                if (parent.classList.contains('children-container')) {
                    // 在children-container中，添加同级的兄弟节点
                    targetContainer = parent;
                } else if (parent.classList.contains('param-row')) {
                    // 上一级是param-row，继续向上找
                    const grandParent = parent.parentElement;
                    if (grandParent?.classList.contains('children-container')) {
                        targetContainer = grandParent;
                    }
                }

                if (targetContainer) {
                    const siblingHtml = renderParamItem({}, depth);
                    targetContainer.insertAdjacentHTML('beforeend', siblingHtml);
                } else {
                    // 兜底：使用schema-list容器
                    const schemaList = btn.closest('.schema-list');
                    if (schemaList) {
                        const siblingHtml = renderParamItem({}, 0);
                        schemaList.insertAdjacentHTML('beforeend', siblingHtml);
                    }
                }
            }

            // 更新触发器节点添加按钮的显示状态
            if (tabPanel?.closest('#triggerInputContent')) {
                const tabName = tabPanel?.dataset.tab || 'header';
                updateTriggerAddParamBtnVisibility(tabName);
            }
        }

        /**
         * 添加同级参数
         * @param {HTMLElement} btn - 添加按钮元素
         */
        function addSiblingParam(btn) {
            const paramItem = btn.closest('.param-item');
            const parent = paramItem.parentElement;
            const tabPanel = btn.closest('.tab-panel');
            const tabName = tabPanel?.dataset.tab || 'header';

            if (parent.classList.contains('children-container')) {
                const newParam = renderParamItem({}, parseInt(paramItem.dataset.depth) || 0);
                parent.insertAdjacentHTML('beforeend', newParam);
            } else {
                const schemaList = btn.closest('.schema-list');
                if (schemaList) {
                    const newParam = renderParamItem({}, 0);
                    schemaList.insertAdjacentHTML('beforeend', newParam);
                }
            }

            // 更新触发器节点添加按钮的显示状态
            if (tabPanel?.closest('#triggerInputContent')) {
                updateTriggerAddParamBtnVisibility(tabName);
            }
        }

        /**
         * 移除参数项
         * @param {HTMLElement} btn - 移除按钮元素
         */
        function removeParamItem(btn) {
            // 获取当前激活的tab
            const tabPanel = btn.closest('.tab-panel');
            const tabName = tabPanel?.dataset.tab || 'header';

            btn.closest('.param-item').remove();

            // 更新触发器节点添加按钮的显示状态
            if (tabPanel?.closest('#triggerInputContent')) {
                updateTriggerAddParamBtnVisibility(tabName);
            }
        }

        /**
         * 处理参数类型变更
         * @param {HTMLElement} selectElement - 类型选择器元素
         */
        function handleParamTypeChange(selectElement) {
            const paramItem = selectElement.closest('.param-item');
            const newType = selectElement.value;
            const isComplex = isComplexType(newType);
            const depth = parseInt(paramItem.dataset.depth) || 0;
            const rowPadding = depth === 0 ? '6px 10px' : '4px 8px';

            const existingChildren = paramItem.querySelector('.children-container');
            if (existingChildren) existingChildren.remove();

            const existingAddBtn = paramItem.querySelector('.add-item-btn');
            const parentDropdown = existingAddBtn?.closest('.dropdown-menu');

            if (isComplex) {
                if (!parentDropdown) {
                    const newAddBtn = document.createElement('div');
                    newAddBtn.className = 'dropdown-menu';
                    newAddBtn.style.cssText = 'position: relative; display: inline-block;';
                    newAddBtn.innerHTML = `
                        <button type="button" class="add-item-btn" onclick="toggleItemDropdown(this)" style="padding: ${rowPadding}; border: none; background: transparent;">
                            添加
                        </button>
                        <div class="dropdown-content" style="display: none; position: absolute; background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 4px; box-shadow: var(--shadow-md); z-index: 10; min-width: 120px;">
                            <button type="button" onclick="addChildParam(this, 'child')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                                添加子节点
                            </button>
                            <button type="button" onclick="addChildParam(this, 'sibling')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                                添加兄弟节点
                            </button>
                        </div>
                    `;
                    existingAddBtn.replaceWith(newAddBtn);
                }
            } else {
                if (parentDropdown) {
                    const newAddBtn = document.createElement('button');
                    newAddBtn.type = 'button';
                    newAddBtn.className = 'add-item-btn';
                    newAddBtn.onclick = function() { addSiblingParam(this); };
                    newAddBtn.style.cssText = `padding: ${rowPadding}; border: none; background: transparent;`;
                    newAddBtn.textContent = '添加';
                    parentDropdown.replaceWith(newAddBtn);
                }
            }

            if (isComplex) {
                const indent = 24 + (depth * 16);
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'children-container';
                childrenContainer.style.cssText = `margin-left: ${indent}px;`;
                paramItem.appendChild(childrenContainer);
            }

            paramItem.dataset.paramType = newType;
        }

        /**
         * 递归收集参数数据
         * @param {HTMLElement} container - 容器元素
         * @returns {Array} 参数字数组
         */
        function collectParams(container) {
            if (!container) return [];

            const paramItems = container.querySelectorAll(':scope > .param-item');
            const params = [];

            paramItems.forEach(item => {
                const name = item.querySelector('.param-name').value.trim();
                const paramType = item.querySelector('.param-type').value;
                const isComplex = isComplexType(paramType);

                if (name) {
                    const paramData = {
                        id: item.dataset.id,
                        paramName: name,
                        paramType: paramType,
                        description: item.querySelector('.param-desc').value.trim(),
                        children: []
                    };

                    if (isComplex) {
                        const childrenContainer = item.querySelector('.children-container');
                        if (childrenContainer) {
                            paramData.children = collectParams(childrenContainer);
                        }
                    }

                    params.push(paramData);
                }
            });

            return params;
        }

        /**
         * 渲染参数列表
         * @param {string} containerId - 容器ID
         * @param {Array} params - 参数数组
         */
        function renderParams(containerId, params) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (params.length === 0) {
                container.innerHTML = '';
            } else {
                container.innerHTML = params.map(p => renderParamItem(p, 0)).join('');
            }
        }

        /**
         * 渲染连接器出参配置（只读模式，有配置按钮）
         * @param {string} containerId - 容器ID
         * @param {Array} params - 参数数组
         */
        function renderConnectorOutputParams(containerId, params) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (params.length === 0) {
                container.innerHTML = '<div style="color: var(--text-tertiary); font-size: 13px; padding: 8px 0;">暂无出参配置</div>';
            } else {
                container.innerHTML = params.map(p => renderConnectorOutputParamItem(p, 0)).join('');
            }
        }

        /**
         * 渲染单个连接器出参配置项（只读模式）
         * @param {Object} param - 参数配置对象
         * @param {number} depth - 当前层级深度
         * @returns {string} 参数项HTML字符串
         */
        function renderConnectorOutputParamItem(param, depth = 0) {
            const id = param.id || generateId();
            const paramType = param.paramType || 'string';
            const isComplex = isComplexType(paramType);
            const childrenParams = param.children || [];
            const config = param.config || {};

            const indent = 24 + (depth * 16);
            const paddingLeft = depth === 0 ? '0' : `${indent}px`;

            const childrenHtml = isComplex && childrenParams.length > 0
                ? childrenParams.map(child => renderConnectorOutputParamItem(child, depth + 1)).join('')
                : '';

            const childrenContainerHtml = isComplex
                ? `<div class="children-container" style="margin-left: ${indent}px;">
                    ${childrenHtml}
                   </div>`
                : '';

            // 获取配置显示文本
            let configText = '配置';
            if (config.type === 'fixed') {
                configText = `固定值: ${config.value || '-'}`;
            } else if (config.type === 'reference') {
                configText = `引用: ${config.refName || '-'}`;
            }

            return `
                <div class="param-item" data-id="${id}" data-param-type="${paramType}" data-depth="${depth}" style="margin-bottom: 8px;">
                    <div class="param-row" style="display: flex; align-items: center; gap: 8px; padding-left: ${paddingLeft};">
                        <input type="text" class="param-name" placeholder="参数名称" value="${param.paramName || ''}" readonly
                            style="width: 100px; padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; background: var(--bg-light);">
                        <select class="param-type" style="padding: 6px 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; width: 80px; background: var(--bg-light);" disabled>
                            <option value="string" ${paramType === 'string' ? 'selected' : ''}>string</option>
                            <option value="number" ${paramType === 'number' ? 'selected' : ''}>number</option>
                            <option value="boolean" ${paramType === 'boolean' ? 'selected' : ''}>boolean</option>
                            <option value="object" ${paramType === 'object' ? 'selected' : ''}>object</option>
                            <option value="array" ${paramType === 'array' ? 'selected' : ''}>array</option>
                        </select>
                        <button type="button" class="param-config-btn" onclick="openParamConfigModal('${id}', '${param.paramName || ''}', '${paramType}', 'connector')"
                            style="padding: 4px 8px; background: transparent; color: var(--primary-color); cursor: pointer; font-size: 13px;">
                            ${configText}
                        </button>
                    </div>
                    ${childrenContainerHtml}
                </div>
            `;
        }

        /**
         * 渲染数据输出节点参数组装配置（带配置按钮）
         * @param {string} containerId - 容器ID
         * @param {Array} params - 参数数组
         */
        function renderOutputAssembleParams(containerId, params) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (params.length === 0) {
                container.innerHTML = '';
            } else {
                container.innerHTML = params.map(p => renderOutputAssembleParamItem(p, 0, containerId)).join('');
            }

            // 更新添加按钮显示状态
            updateOutputAddParamBtnVisibility(containerId);
        }

        /**
         * 渲染单个数据输出节点参数组装项（带配置按钮）
         * @param {Object} param - 参数配置对象
         * @param {number} depth - 当前层级深度
         * @param {string} containerId - 容器ID
         * @returns {string} 参数项HTML字符串
         */
        function renderOutputAssembleParamItem(param, depth = 0, containerId = '') {
            const id = param.id || generateId();
            const paramType = param.paramType || 'string';
            const isComplex = isComplexType(paramType);
            const childrenParams = param.children || [];
            const config = param.config || {};

            const indent = 24 + (depth * 16);
            const rowPadding = depth === 0 ? '6px 10px' : '4px 8px';

            const childrenHtml = isComplex && childrenParams.length > 0
                ? childrenParams.map(child => renderOutputAssembleParamItem(child, depth + 1, containerId)).join('')
                : '';

            const childrenContainerHtml = isComplex
                ? `<div class="children-container" style="margin-left: ${indent}px;">
                    ${childrenHtml}
                   </div>`
                : '';

            // 获取配置显示文本
            let configText = '配置';
            if (config.type === 'fixed') {
                configText = `固定值: ${config.value || '-'}`;
            } else if (config.type === 'reference') {
                configText = `引用: ${config.refName || '-'}`;
            }

            // 添加按钮HTML（复杂类型显示下拉菜单）
            const addButtonHtml = isComplex
                ? `<div class="dropdown-menu" style="position: relative; display: inline-block;">
                    <button type="button" class="add-item-btn" onclick="toggleItemDropdown(this)" style="padding: ${rowPadding}; border: none; background: transparent;">
                        添加
                    </button>
                    <div class="dropdown-content" style="display: none; position: absolute; background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 4px; box-shadow: var(--shadow-md); z-index: 10; min-width: 120px;">
                        <button type="button" onclick="addOutputAssembleChildParam(this, 'child', '${containerId}')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                            添加子节点
                        </button>
                        <button type="button" onclick="addOutputAssembleChildParam(this, 'sibling', '${containerId}')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                            添加兄弟节点
                        </button>
                    </div>
                   </div>`
                : `<button type="button" class="add-item-btn" onclick="addOutputAssembleSiblingParam(this, '${containerId}')" style="padding: ${rowPadding}; border: none; background: transparent;">添加</button>`;

            return `
                <div class="param-item" data-id="${id}" data-param-type="${paramType}" data-depth="${depth}">
                    <div class="param-row" style="display: flex; align-items: center; gap: 8px;">
                        <input type="text" class="param-name" placeholder="参数名称" value="${param.paramName || ''}"
                            style="width: 100px; padding: ${rowPadding}; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px;">
                        <select class="param-type" style="padding: ${rowPadding}; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px; width: 80px;" onchange="handleOutputAssembleParamTypeChange(this, '${containerId}')">
                            <option value="string" ${paramType === 'string' ? 'selected' : ''}>string</option>
                            <option value="number" ${paramType === 'number' ? 'selected' : ''}>number</option>
                            <option value="boolean" ${paramType === 'boolean' ? 'selected' : ''}>boolean</option>
                            <option value="object" ${paramType === 'object' ? 'selected' : ''}>object</option>
                            <option value="array" ${paramType === 'array' ? 'selected' : ''}>array</option>
                        </select>
                        <input type="text" class="param-desc" placeholder="描述" value="${param.description || ''}"
                            style="flex: 1; min-width: 80px; padding: ${rowPadding}; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px;">
                        <button type="button" class="param-config-btn" onclick="openParamConfigModal('${id}', '${param.paramName || ''}', '${paramType}', 'output')"
                            style="padding: ${rowPadding}; background: transparent; color: var(--primary-color); cursor: pointer; border-radius: 4px; font-size: 13px;">
                            ${configText}
                        </button>
                        ${addButtonHtml}
                        <button type="button" class="param-remove-btn" onclick="removeOutputAssembleParamItem(this, '${containerId}')">删除</button>
                    </div>
                    ${childrenContainerHtml}
                </div>
            `;
        }

        /**
         * 更新数据输出节点添加参数按钮的显示状态
         * @param {string} containerId - 容器ID
         */
        function updateOutputAddParamBtnVisibility(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;

            const addBtn = container.closest('.tab-panel').querySelector('.output-add-param-btn');
            if (!addBtn) return;

            const hasParams = container.querySelectorAll('.param-item').length > 0;
            addBtn.style.display = hasParams ? 'none' : 'inline-flex';
        }

        /**
         * 添加数据输出节点参数组装子参数
         * @param {HTMLElement} btn - 添加按钮元素
         * @param {string} type - 添加类型（'child' 或 'sibling'）
         * @param {string} containerId - 容器ID
         */
        function addOutputAssembleChildParam(btn, type, containerId) {
            btn.closest('.dropdown-content').style.display = 'none';
            const paramItem = btn.closest('.param-item');
            const paramType = paramItem.dataset.paramType;
            const isComplex = isComplexType(paramType);
            const depth = parseInt(paramItem.dataset.depth) || 0;

            if (type === 'child' && isComplex) {
                const childrenContainer = paramItem.querySelector('.children-container');
                if (childrenContainer) {
                    const childHtml = renderOutputAssembleParamItem({}, depth + 1);
                    childrenContainer.insertAdjacentHTML('beforeend', childHtml);
                }
            } else {
                // 添加兄弟节点：找到参数列表容器并添加
                const parent = paramItem.parentElement;
                let targetContainer;

                if (parent.classList.contains('children-container')) {
                    // 在children-container中，添加同级的兄弟节点
                    targetContainer = parent;
                } else if (parent.classList.contains('param-row')) {
                    // 上一级是param-row，继续向上找
                    const grandParent = parent.parentElement;
                    if (grandParent?.classList.contains('children-container')) {
                        targetContainer = grandParent;
                    }
                }

                if (targetContainer) {
                    const siblingHtml = renderOutputAssembleParamItem({}, depth);
                    targetContainer.insertAdjacentHTML('beforeend', siblingHtml);
                } else {
                    // 兜底：使用schema-list容器
                    const container = document.getElementById(containerId);
                    if (container) {
                        const siblingHtml = renderOutputAssembleParamItem({}, 0);
                        container.insertAdjacentHTML('beforeend', siblingHtml);
                    }
                }
            }

            updateOutputAddParamBtnVisibility(containerId);
        }

        /**
         * 添加数据输出节点参数组装同级参数
         * @param {HTMLElement} btn - 添加按钮元素
         * @param {string} containerId - 容器ID
         */
        function addOutputAssembleSiblingParam(btn, containerId) {
            const paramItem = btn.closest('.param-item');
            const parent = paramItem.parentElement;

            if (parent.classList.contains('children-container')) {
                const depth = parseInt(paramItem.dataset.depth) || 0;
                const newParam = renderOutputAssembleParamItem({}, depth);
                parent.insertAdjacentHTML('beforeend', newParam);
            } else {
                const container = document.getElementById(containerId);
                if (container) {
                    const newParam = renderOutputAssembleParamItem({}, 0);
                    container.insertAdjacentHTML('beforeend', newParam);
                }
            }

            updateOutputAddParamBtnVisibility(containerId);
        }

        /**
         * 移除数据输出节点参数组装项
         * @param {HTMLElement} btn - 移除按钮元素
         * @param {string} containerId - 容器ID
         */
        function removeOutputAssembleParamItem(btn, containerId) {
            btn.closest('.param-item').remove();
            updateOutputAddParamBtnVisibility(containerId);
        }

        /**
         * 处理数据输出节点参数类型变更
         * @param {HTMLElement} selectElement - 类型选择器元素
         * @param {string} containerId - 容器ID
         */
        function handleOutputAssembleParamTypeChange(selectElement, containerId) {
            const paramItem = selectElement.closest('.param-item');
            const newType = selectElement.value;
            const isComplex = isComplexType(newType);
            const depth = parseInt(paramItem.dataset.depth) || 0;
            const rowPadding = depth === 0 ? '6px 10px' : '4px 8px';

            const existingChildren = paramItem.querySelector('.children-container');
            if (existingChildren) existingChildren.remove();

            const existingAddBtn = paramItem.querySelector('.add-item-btn');
            const parentDropdown = existingAddBtn?.closest('.dropdown-menu');

            if (isComplex) {
                if (!parentDropdown) {
                    const newAddBtn = document.createElement('div');
                    newAddBtn.className = 'dropdown-menu';
                    newAddBtn.style.cssText = 'position: relative; display: inline-block;';
                    newAddBtn.innerHTML = `
                        <button type="button" class="add-item-btn" onclick="toggleItemDropdown(this)" style="padding: ${rowPadding}; border: none; background: transparent;">
                            添加
                        </button>
                        <div class="dropdown-content" style="display: none; position: absolute; background: var(--bg-white); border: 1px solid var(--border-color); border-radius: 4px; box-shadow: var(--shadow-md); z-index: 10; min-width: 120px;">
                            <button type="button" onclick="addOutputAssembleChildParam(this, 'child', '${containerId}')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                                添加子节点
                            </button>
                            <button type="button" onclick="addOutputAssembleChildParam(this, 'sibling', '${containerId}')" style="display: block; width: 100%; padding: 8px 12px; border: none; background: transparent; text-align: left; cursor: pointer; font-size: 13px;">
                                添加兄弟节点
                            </button>
                        </div>
                    `;
                    existingAddBtn.replaceWith(newAddBtn);
                }

                // 添加子容器
                const indent = 24 + (depth * 16);
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'children-container';
                childrenContainer.style.cssText = `margin-left: ${indent}px;`;
                paramItem.appendChild(childrenContainer);
            } else {
                if (parentDropdown) {
                    const newAddBtn = document.createElement('button');
                    newAddBtn.type = 'button';
                    newAddBtn.className = 'add-item-btn';
                    newAddBtn.onclick = function() { addOutputAssembleSiblingParam(this, containerId); };
                    newAddBtn.style.cssText = `padding: ${rowPadding}; border: none; background: transparent;`;
                    newAddBtn.textContent = '添加';
                    parentDropdown.replaceWith(newAddBtn);
                }
            }

            paramItem.dataset.paramType = newType;
        }

        /**
         * 打开参数配置弹窗
         * @param {string} paramId - 参数ID
         * @param {string} paramName - 参数名称
         * @param {string} paramType - 参数类型
         * @param {string} sourceType - 来源类型（'connector' 或 'output'）
         */
        function openParamConfigModal(paramId, paramName, paramType, sourceType) {
            const modal = document.getElementById('paramConfigModal');
            const nameInput = document.getElementById('paramConfigName');
            const typeInput = document.getElementById('paramConfigType');
            const fixedRadio = document.getElementById('configTypeFixed');
            const referenceRadio = document.getElementById('configTypeReference');
            const fixedArea = document.getElementById('paramConfigFixedArea');
            const referenceArea = document.getElementById('paramConfigReferenceArea');
            const fixedValueInput = document.getElementById('paramConfigFixedValue');

            // 保存当前配置参数信息
            window.currentParamConfig = { paramId, paramName, paramType, sourceType };

            // 设置基本信息
            nameInput.value = paramName;
            typeInput.value = paramType;

            // 获取当前参数配置
            let currentConfig = { type: '', value: '', refName: '' };
            if (sourceType === 'connector') {
                // 从连接器出参中获取配置
                const paramItem = document.querySelector(`.param-item[data-id="${paramId}"]`);
                if (paramItem) {
                    const param = findParamById(getConnectorOutputParams(), paramId);
                    if (param && param.config) {
                        currentConfig = param.config;
                    }
                }
            } else if (sourceType === 'output') {
                // 从数据输出节点参数中获取配置
                const paramItem = document.querySelector(`.param-item[data-id="${paramId}"]`);
                if (paramItem) {
                    const param = findParamById(getOutputAssembleParams(), paramId);
                    if (param && param.config) {
                        currentConfig = param.config;
                    }
                }
            }

            // 重置选择
            fixedRadio.checked = false;
            referenceRadio.checked = false;
            fixedArea.style.display = 'none';
            referenceArea.style.display = 'none';
            fixedValueInput.value = '';

            // 如果有配置，恢复配置
            if (currentConfig.type === 'fixed') {
                fixedRadio.checked = true;
                fixedArea.style.display = 'block';
                fixedValueInput.value = currentConfig.value || '';
            } else if (currentConfig.type === 'reference') {
                referenceRadio.checked = true;
                referenceArea.style.display = 'block';
                // 高亮选中的引用参数
                setTimeout(() => {
                    const refItems = document.querySelectorAll('.reference-param-item');
                    refItems.forEach(item => {
                        item.classList.toggle('selected', item.dataset.paramName === currentConfig.refName);
                    });
                }, 0);
            }

            // 渲染引用参数列表
            renderReferenceParamList(sourceType);

            modal.classList.add('active');
        }

        /**
         * 关闭参数配置弹窗
         */
        function closeParamConfigModal() {
            document.getElementById('paramConfigModal').classList.remove('active');
            window.currentParamConfig = null;
        }

        /**
         * 处理参数配置类型变更
         */
        function handleParamConfigTypeChange() {
            const fixedRadio = document.getElementById('configTypeFixed');
            const fixedArea = document.getElementById('paramConfigFixedArea');
            const referenceArea = document.getElementById('paramConfigReferenceArea');

            if (fixedRadio.checked) {
                fixedArea.style.display = 'block';
                referenceArea.style.display = 'none';
            } else {
                fixedArea.style.display = 'none';
                referenceArea.style.display = 'block';
            }
        }

        /**
         * 渲染引用参数列表
         * @param {string} sourceType - 来源类型
         */
        function renderReferenceParamList(sourceType) {
            const container = document.getElementById('paramConfigReferenceList');
            let params = [];

            // 获取可引用的参数列表
            if (sourceType === 'output') {
                // 数据输出节点：引用连接器节点的出参
                params = getConnectorOutputParams();
            }

            if (params.length === 0) {
                container.innerHTML = '<div style="color: var(--text-tertiary); font-size: 13px; text-align: center; padding: 16px;">暂无可引用的参数</div>';
            } else {
                container.innerHTML = params.map(p => `
                    <div class="reference-param-item" data-param-name="${p.paramName}" data-param-type="${p.paramType}"
                         onclick="selectReferenceParam(this)">
                        <span class="param-name">${p.paramName}</span>
                        <span class="param-type">(${p.paramType})</span>
                    </div>
                `).join('');
            }
        }

        /**
         * 选择引用参数
         * @param {HTMLElement} item - 参数项元素
         */
        function selectReferenceParam(item) {
            const items = document.querySelectorAll('.reference-param-item');
            items.forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
        }

        /**
         * 保存参数配置
         */
        function saveParamConfig() {
            const { paramId, sourceType } = window.currentParamConfig;
            if (!paramId) return;

            const fixedRadio = document.getElementById('configTypeFixed');
            const fixedValueInput = document.getElementById('paramConfigFixedValue');

            let config = { type: '', value: '', refName: '' };

            if (fixedRadio.checked) {
                config.type = 'fixed';
                config.value = fixedValueInput.value;
            } else {
                config.type = 'reference';
                const selectedItem = document.querySelector('.reference-param-item.selected');
                if (selectedItem) {
                    config.refName = selectedItem.dataset.paramName;
                }
            }

            // 更新参数配置
            if (sourceType === 'connector') {
                updateConnectorOutputParamConfig(paramId, config);
            } else if (sourceType === 'output') {
                updateOutputAssembleParamConfig(paramId, config);
            }

            closeParamConfigModal();
        }

        /**
         * 获取连接器节点出参配置
         * @returns {Array} 参数数组
         */
        function getConnectorOutputParams() {
            const headerParams = collectConnectorOutputParams(document.getElementById('connector-output-params-header'));
            const bodyParams = collectConnectorOutputParams(document.getElementById('connector-output-params-body'));
            return [...headerParams, ...bodyParams];
        }

        /**
         * 递归收集连接器出参配置（包含config）
         * @param {HTMLElement} container - 容器元素
         * @returns {Array} 参数字数组
         */
        function collectConnectorOutputParams(container) {
            if (!container) return [];

            const paramItems = container.querySelectorAll(':scope > .param-item');
            const params = [];

            paramItems.forEach(item => {
                const name = item.querySelector('.param-name').value.trim();
                const paramType = item.querySelector('.param-type').value;
                const isComplex = isComplexType(paramType);
                const configBtn = item.querySelector('.btn');

                // 获取配置信息
                let config = { type: '', value: '', refName: '' };
                if (configBtn) {
                    const btnText = configBtn.textContent;
                    if (btnText.includes('固定值:')) {
                        config.type = 'fixed';
                        config.value = btnText.replace('固定值:', '').trim();
                    } else if (btnText.includes('引用:')) {
                        config.type = 'reference';
                        config.refName = btnText.replace('引用:', '').trim();
                    }
                }

                if (name) {
                    const paramData = {
                        id: item.dataset.id,
                        paramName: name,
                        paramType: paramType,
                        config: config,
                        children: []
                    };

                    if (isComplex) {
                        const childrenContainer = item.querySelector('.children-container');
                        if (childrenContainer) {
                            paramData.children = collectConnectorOutputParams(childrenContainer);
                        }
                    }

                    params.push(paramData);
                }
            });

            return params;
        }

        /**
         * 获取数据输出节点参数组装配置
         * @returns {Array} 参数数组
         */
        function getOutputAssembleParams() {
            const headerParams = collectOutputAssembleParams(document.getElementById('output-assemble-params-header'));
            const bodyParams = collectOutputAssembleParams(document.getElementById('output-assemble-params-body'));
            return [...headerParams, ...bodyParams];
        }

        /**
         * 递归收集数据输出节点参数配置（包含config）
         * @param {HTMLElement} container - 容器元素
         * @returns {Array} 参数字数组
         */
        function collectOutputAssembleParams(container) {
            if (!container) return [];

            const paramItems = container.querySelectorAll(':scope > .param-item');
            const params = [];

            paramItems.forEach(item => {
                const name = item.querySelector('.param-name').value.trim();
                const paramType = item.querySelector('.param-type').value;
                const isComplex = isComplexType(paramType);
                const desc = item.querySelector('.param-desc').value.trim();
                const configBtn = item.querySelector('.btn');

                // 获取配置信息
                let config = { type: '', value: '', refName: '' };
                if (configBtn) {
                    const btnText = configBtn.textContent;
                    if (btnText.includes('固定值:')) {
                        config.type = 'fixed';
                        config.value = btnText.replace('固定值:', '').trim();
                    } else if (btnText.includes('引用:')) {
                        config.type = 'reference';
                        config.refName = btnText.replace('引用:', '').trim();
                    }
                }

                if (name) {
                    const paramData = {
                        id: item.dataset.id,
                        paramName: name,
                        paramType: paramType,
                        description: desc,
                        config: config,
                        children: []
                    };

                    if (isComplex) {
                        const childrenContainer = item.querySelector('.children-container');
                        if (childrenContainer) {
                            paramData.children = collectOutputAssembleParams(childrenContainer);
                        }
                    }

                    params.push(paramData);
                }
            });

            return params;
        }

        /**
         * 根据ID查找参数
         * @param {Array} params - 参数数组
         * @param {string} paramId - 参数ID
         * @returns {Object|null} 找到的参数或null
         */
        function findParamById(params, paramId) {
            for (const param of params) {
                if (param.id === paramId) return param;
                if (param.children && param.children.length > 0) {
                    const found = findParamById(param.children, paramId);
                    if (found) return found;
                }
            }
            return null;
        }

        /**
         * 更新连接器出参配置
         * @param {string} paramId - 参数ID
         * @param {Object} config - 配置对象
         */
        function updateConnectorOutputParamConfig(paramId, config) {
            const paramItem = document.querySelector(`#connector-output-params-header .param-item[data-id="${paramId}"], #connector-output-params-body .param-item[data-id="${paramId}"]`);
            if (!paramItem) return;

            let configText = '配置';
            if (config.type === 'fixed') {
                configText = `固定值: ${config.value || '-'}`;
            } else if (config.type === 'reference') {
                configText = `引用: ${config.refName || '-'}`;
            }

            const configBtn = paramItem.querySelector('.btn');
            if (configBtn) {
                configBtn.textContent = configText;
                // 更新onclick以保存新的配置
                configBtn.onclick = function() {
                    openParamConfigModal(paramId, paramItem.querySelector('.param-name').value, paramItem.querySelector('.param-type').value, 'connector');
                };
            }
        }

        /**
         * 更新数据输出节点参数配置
         * @param {string} paramId - 参数ID
         * @param {Object} config - 配置对象
         */
        function updateOutputAssembleParamConfig(paramId, config) {
            const paramItem = document.querySelector(`#output-assemble-params-header .param-item[data-id="${paramId}"], #output-assemble-params-body .param-item[data-id="${paramId}"]`);
            if (!paramItem) return;

            let configText = '配置';
            if (config.type === 'fixed') {
                configText = `固定值: ${config.value || '-'}`;
            } else if (config.type === 'reference') {
                configText = `引用: ${config.refName || '-'}`;
            }

            const configBtn = paramItem.querySelector('.btn');
            if (configBtn) {
                configBtn.textContent = configText;
                // 更新onclick以保存新的配置
                configBtn.onclick = function() {
                    openParamConfigModal(paramId, paramItem.querySelector('.param-name').value, paramItem.querySelector('.param-type').value, 'output');
                };
            }
        }

        function updateCanvasState(status) {
            const canvas = document.getElementById('canvas');
            const isEditable = status === FLOW_VERSION_STATUS.DRAFT;

            // 禁用/启用节点拖拽

                canvas.style.pointerEvents = 'none';

                // 添加只读提示

                if (!existingMsg) {

                    msg.className = 'canvas-readonly-msg';
                    msg.style.cssText = 'position: absolute; top: 10px; right: 10px; background: var(--warning-color); color: white; padding: 8px 12px; border-radius: 4px; font-size: 12px; z-index: 50;';
                    msg.textContent = '当前版本只读，不可编辑';
                    canvas.appendChild(msg);

            } else {
                canvas.style.pointerEvents = 'auto';
                canvas.style.opacity = '1';

                // 移除只读提示
                const existingMsg = document.querySelector('.canvas-readonly-msg');
                if (existingMsg) existingMsg.remove();
            }
        }

            option.value = newVersion.id;
            option.textContent = `${newVersion.name} (${newVersion.createdAt}) [草稿]`;
            select.insertBefore(option, select.firstChild);

            updateVersionActions(FLOW_VERSION_STATUS.DRAFT);
            updateCanvasState(FLOW_VERSION_STATUS.DRAFT);

        // ========================================
