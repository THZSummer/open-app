        /**
         * 生成节点的 Handle HTML
         * @param {Object} node - 节点对象
         * @param {Object} nodeType - 节点类型定义
         * @returns {string} Handle HTML 字符串
         */
        function generateNodeHandles(node, nodeType) {
            let handles = '';

            // 上 Handle（主流程入口）
            handles += `<div class="node-port top" onmouseup="handlePortMouseUp(event, '${node.id}', 'top')"></div>`;

            // 右侧 Handle（循环/异常处理的子节点入口）
            if (nodeType.hasBodyHandle) {
                handles += `<div class="node-port right" onmouseup="handlePortMouseUp(event, '${node.id}', 'body')"></div>`;
            }

            // 多出口 Handle（条件分支/并行）- 放在底部
            if (nodeType.multiOutput) {
                const branches = node.data.conditions || node.data.branches || [];
                const spacing = 30; // 分支间距
                const startX = 40; // 第一个分支的左偏移

                branches.forEach((branch, index) => {
                    const leftOffset = startX + (index * spacing);
                    const handleId = branch.id;
                    handles += `<div class="node-port multi-output"
                        style="left: ${leftOffset}px;"
                        onmouseup="handlePortMouseUp(event, '${node.id}', '${handleId}')"
                        title="${branch.label || '分支' + (index + 1)}"></div>`;
                });
            }

            // 下 Handle（主流程出口）
            // 条件分支和并行节点没有单一的下 Handle（用多出口）
            if (!nodeType.multiOutput) {
                handles += `<div class="node-port bottom" onmouseup="handlePortMouseUp(event, '${node.id}', 'bottom')"></div>`;
            }

            return handles;
        }

        /**
         * 生成节点内容区域
         * @param {Object} node - 节点对象
         * @param {Object} nodeType - 节点类型定义
         * @returns {string} 节点内容 HTML 字符串
         */
        function generateNodeContent(node, nodeType) {
            let content = '';

            // 循环节点显示迭代配置
            if (node.type === 'forLoop') {
                const iterable = node.data.iterable || '';
                const itemName = node.data.itemName || 'item';
                content += `<div class="node-content">迭代: ${iterable || '未配置'} | 变量: ${itemName}</div>`;
            }

            // 异常处理节点显示策略
            if (node.type === 'error') {
                const strategy = node.data.strategy || 'ignore';
                const strategyText = strategy === 'retry' ? '重试' : '忽略';
                content += `<div class="node-content">策略: ${strategyText}</div>`;
            }

            // 条件分支节点显示条件
            if (node.type === 'condition') {
                const conditions = node.data.conditions || [];
                const conditionTexts = conditions.map(c => c.label || '条件').join(', ');
                content += `<div class="node-content">分支: ${conditionTexts || '未配置'}</div>`;
            }

            // 并行节点显示分支
            if (node.type === 'parallel') {
                const branches = node.data.branches || [];
                const branchTexts = branches.map(b => b.label || '分支').join(', ');
                content += `<div class="node-content">分支: ${branchTexts || '未配置'}</div>`;
            }

            return content;
        }

        /**
         * 生成多出口节点的高度（条件分支/并行）
         * @param {Object} node - 节点对象
         * @param {Object} nodeType - 节点类型定义
         * @returns {number} 节点高度
         */
        function getMultiOutputNodeHeight(node, nodeType) {
            if (!nodeType.multiOutput) {
                return 0;
            }
            const branches = node.data.conditions || node.data.branches || [];
            const baseHeight = 80; // 基础高度
            const branchHeight = 30; // 每个分支增加的高度
            return baseHeight + (branches.length * branchHeight);
        }

        /**
         * 获取节点底部 Y 坐标（用于主流程连线）
         * @param {Object} node - 节点对象
         * @param {Object} nodeType - 节点类型定义
         * @returns {number} 底部 Y 坐标
         */
        function getNodeBottomY(node, nodeType) {
            const nodeHeight = 80;
            if (nodeType.multiOutput) {
                return node.y + getMultiOutputNodeHeight(node, nodeType);
            }
            return node.y + nodeHeight;
        }

        function renderCanvas() {
            const canvas = document.getElementById('canvas');

            // 渲染节点
            let nodesHtml = nodes.map(node => {
                const nodeType = NODE_TYPES.find(t => t.type === node.type);
                if (!nodeType) return '';

                const nodeHeight = nodeType.multiOutput
                    ? getMultiOutputNodeHeight(node, nodeType)
                    : 80;

                const handles = generateNodeHandles(node, nodeType);
                const content = generateNodeContent(node, nodeType);

                return `
                    <div class="flow-node ${node.type} ${selectedNode?.id === node.id ? 'selected' : ''}"
                         id="node-${node.id}"
                         style="left: ${node.x}px; top: ${node.y}px; height: ${nodeHeight}px;"
                         onmousedown="handleNodeMouseDown(event, '${node.id}')"
                         onclick="handleNodeClick('${node.id}')">
                        ${handles}
                        <div class="node-header">
                            <div class="node-header-icon" style="background: ${getNodeColor(node.type)}">${nodeType?.icon || '?'}</div>
                            <div class="node-header-title">${node.data.label || nodeType?.name || '未命名'}</div>
                        </div>
                        <div class="node-body">${node.data.description || nodeType?.desc || ''}</div>
                        ${content}
                    </div>
                `;
            }).join('');

            // 渲染连线
            let edgesHtml = edges.map(edge => {
                const sourceNode = nodes.find(n => n.id === edge.source);
                const targetNode = nodes.find(n => n.id === edge.target);
                if (!sourceNode || !targetNode) return '';

                const sourceType = NODE_TYPES.find(t => t.type === sourceNode.type);
                const targetType = NODE_TYPES.find(t => t.type === targetNode.type);

                // 计算起点和终点坐标
                let startX, startY, endX, endY;

                // 起点：从源节点的指定 Handle 出发
                if (edge.sourceHandle === 'body') {
                    // 从右侧 Handle 出发（循环/异常处理的子节点入口）
                    startX = sourceNode.x + 160;
                    startY = sourceNode.y + 40;
                } else if (sourceType?.multiOutput && edge.sourceHandle) {
                    // 从多出口节点的分支出发（handle 在底部）
                    const branches = sourceNode.data.conditions || sourceNode.data.branches || [];
                    const branchIndex = branches.findIndex(b => b.id === edge.sourceHandle);
                    const nodeHeight = getMultiOutputNodeHeight(sourceNode, sourceType);
                    // 底部分支 handle 左偏移: 40 + index * 30
                    startX = sourceNode.x + 40 + (branchIndex >= 0 ? branchIndex * 30 : 0);
                    startY = sourceNode.y + nodeHeight;
                } else {
                    // 从底部 Handle 出发
                    startX = sourceNode.x + 80;
                    startY = sourceNode.y + (sourceType?.multiOutput
                        ? getMultiOutputNodeHeight(sourceNode, sourceType)
                        : 80);
                }

                // 终点：连接到目标节点的指定 Handle
                if (edge.targetHandle === 'body') {
                    // 连接到目标节点的右侧 Handle（循环/异常处理的子节点入口）
                    endX = targetNode.x;
                    endY = targetNode.y + 40;
                } else {
                    // 连接到顶部 Handle
                    endX = targetNode.x + 80;
                    endY = targetNode.y;
                }

                const path = generateBezierPath(startX, startY, endX, endY);

                // 根据 Handle 类型设置连线颜色
                const edgeColor = edge.sourceHandle === 'body' || edge.targetHandle === 'body'
                    ? '#13c2c2' // 循环/异常处理的连线颜色
                    : (edge.sourceHandle ? '#fa8c16' : '#1890ff'); // 分支连线颜色

                return `
                    <svg class="flow-edge animated" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible;">
                        <path d="${path}" stroke="${edgeColor}" />
                    </svg>
                `;
            }).join('');

            // 空状态
            const emptyState = nodes.length === 0 ? `
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-text">从左侧拖拽节点到此处开始编排流程</div>
                </div>
            ` : '';

            canvas.innerHTML = edgesHtml + nodesHtml + emptyState;

            // 更新节点计数
            document.getElementById('nodeCount').textContent = `${nodes.length} 个节点 · ${edges.length} 条连线`;
        }

        function getNodeColor(type) {
            const colors = {
                trigger: '#1890ff',
                action: '#52c41a',
                condition: '#fa8c16',
                data: '#722ed1',
                output: '#eb2f96',
                error: '#ff4d4f',
                forLoop: '#13c2c2',
                parallel: '#597ef7'
            };
            return colors[type] || '#999';
        }

        function generateBezierPath(x1, y1, x2, y2) {
            const midY = (y1 + y2) / 2;
            // 如果是水平连接（右侧 Handle），使用水平曲线
            if (Math.abs(y1 - y2) < 10) {
                const midX = (x1 + x2) / 2;
                return `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
            }
            return `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`;
        }

        // ========================================
        // 节点拖拽
        // ========================================
        function handleDragStart(event, type) {
            const nodeType = NODE_TYPES.find(t => t.type === type);
            if (!nodeType) return;

            // 检查触发器是否已存在
            if (type === 'trigger' && nodes.some(n => n.type === 'trigger')) {
                event.preventDefault();
                return;
            }

            event.dataTransfer.setData('text/plain', JSON.stringify({
                type,
                label: nodeType.name,
                description: nodeType.desc
            }));
        }

        document.getElementById('canvas').addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.getElementById('canvas').addEventListener('drop', (e) => {
            e.preventDefault();
            const data = e.dataTransfer.getData('text/plain');
            if (!data) return;

            try {
                const nodeData = JSON.parse(data);
                const canvas = document.getElementById('canvas');
                const rect = canvas.getBoundingClientRect();

                // 初始化新节点数据
                const newNodeData = {
                    label: nodeData.label,
                    description: nodeData.description,
                    config: {}
                };

                // 根据节点类型初始化特定数据
                if (nodeData.type === 'forLoop') {
                    newNodeData.iterable = '';
                    newNodeData.itemName = 'item';
                } else if (nodeData.type === 'error') {
                    newNodeData.strategy = 'ignore';
                    newNodeData.retryCount = 3;
                } else if (nodeData.type === 'condition') {
                    newNodeData.conditions = [
                        { id: 'cond1', label: '条件1', expression: '' },
                        { id: 'cond2', label: '条件2', expression: '' },
                        { id: 'else', label: 'else', expression: '' }
                    ];
                } else if (nodeData.type === 'parallel') {
                    newNodeData.branches = [
                        { id: 'branch1', label: '分支1' },
                        { id: 'branch2', label: '分支2' },
                        { id: 'branch3', label: '分支3' }
                    ];
                }

                const newNode = {
                    id: generateId(),
                    type: nodeData.type,
                    x: e.clientX - rect.left - 80,
                    y: e.clientY - rect.top - 40,
                    data: newNodeData
                };

                nodes.push(newNode);
                renderCanvas();
                renderNodeLibrary();
            } catch (err) {
                console.error('解析节点数据失败', err);
            }
        });

        // ========================================
        // 节点移动
        // ========================================
        function handleNodeMouseDown(event, nodeId) {
            if (event.target.classList.contains('node-port')) return;

            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;

            isDragging = true;
            dragNode = node;

            const nodeEl = document.getElementById(`node-${nodeId}`);
            const rect = nodeEl.getBoundingClientRect();

            dragOffset.x = event.clientX - rect.left;
            dragOffset.y = event.clientY - rect.top;

            event.preventDefault();
        }

        document.addEventListener('mousemove', (e) => {
            if (!isDragging || !dragNode) return;

            const canvas = document.getElementById('canvas');
            const rect = canvas.getBoundingClientRect();

            dragNode.x = e.clientX - rect.left - dragOffset.x;
            dragNode.y = e.clientY - rect.top - dragOffset.y;

            // 边界限制
            dragNode.x = Math.max(0, Math.min(dragNode.x, rect.width - 160));
            dragNode.y = Math.max(0, Math.min(dragNode.y, rect.height - 80));

            renderCanvas();
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            dragNode = null;
        });

                        <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">
                            <div>• 上 Handle：主流程入口</div>
                            <div>• 底部分支 Handle：分别连接各分支的起始节点</div>
                            <div>• 所有分支将同时执行</div>
                        </div>
                    </div>
                `;
            }

            // 通用底部删除按钮（除触发器外都可删除）
            const deleteButton = (node.type !== 'trigger') ? `
                <div class="form-group" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border-color);">
                    <button class="btn" style="color: var(--error-color); border-color: var(--error-color);" onclick="deleteSelectedNode()">
                        删除节点
                    </button>
                </div>
            ` : '';

            body.innerHTML = configHtml + deleteButton;

            drawer.classList.add('active');

            // 触发器节点：渲染入参配置
            if (node.type === 'trigger') {
                const inputParams = node.data.inputParams || { header: [], body: [], query: [] };
                renderParams('trigger-input-params-header', inputParams.header || []);
                renderParams('trigger-input-params-body', inputParams.body || []);
                renderParams('trigger-input-params-query', inputParams.query || []);
                // 更新添加按钮显示状态
                updateTriggerAddParamBtnVisibility('header');
                updateTriggerAddParamBtnVisibility('body');
                updateTriggerAddParamBtnVisibility('query');
            }

            // 数据输出节点：渲染参数组装配置
            if (node.type === 'output') {
                const assembleParams = node.data.assembleParams || { header: [], body: [] };
                renderOutputAssembleParams('output-assemble-params-header', assembleParams.header || []);
                renderOutputAssembleParams('output-assemble-params-body', assembleParams.body || []);
            }
        }

        // ========================================
        // 条件分支和并行节点配置辅助函数
        // ========================================

        /**
         * 添加条件分支
         */
        function addCondition() {
            const list = document.getElementById('conditionList');
            if (!list) return;

            const index = list.children.length;
            const newCondition = `
                <div class="form-group" style="margin-bottom: 12px; padding: 12px; background: var(--bg-light); border-radius: 6px;">
                    <div class="param-row" style="margin-bottom: 8px;">
                        <input type="text" class="form-input" id="condLabel${index}" value=""
                            placeholder="分支名称" style="flex: 1;">
                        <button type="button" class="param-remove-btn" onclick="removeCondition(${index})">删除</button>
                    </div>
                    <textarea class="form-textarea" id="condExpr${index}" placeholder="条件表达式，如: ${'{ctx.status}'} == 'active'"></textarea>
                </div>
            `;
            list.insertAdjacentHTML('beforeend', newCondition);
        }

        /**
         * 移除条件分支
         */
        function removeCondition(index) {
            const list = document.getElementById('conditionList');
            if (!list || !list.children[index]) return;
            list.children[index].remove();
            // 重新编号
            updateConditionNumbers();
        }

        /**
         * 更新条件编号
         */
        function updateConditionNumbers() {
            const list = document.getElementById('conditionList');
            if (!list) return;

            Array.from(list.children).forEach((item, index) => {
                const labelInput = item.querySelector('input[id^="condLabel"]');
                const exprInput = item.querySelector('textarea[id^="condExpr"]');
                const removeBtn = item.querySelector('.param-remove-btn');

                if (labelInput) labelInput.id = `condLabel${index}`;
                if (exprInput) exprInput.id = `condExpr${index}`;
                if (removeBtn) removeBtn.setAttribute('onclick', `removeCondition(${index})`);
            });
        }

        /**
         * 添加并行分支
         */
        function addBranch() {
            const list = document.getElementById('branchList');
            if (!list) return;

            const index = list.children.length;
            const newBranch = `
                <div class="form-group" style="margin-bottom: 12px; padding: 12px; background: var(--bg-light); border-radius: 6px;">
                    <div class="param-row">
                        <input type="text" class="form-input" id="branchLabel${index}" value=""
                            placeholder="分支名称" style="flex: 1;">
                        <button type="button" class="param-remove-btn" onclick="removeBranch(${index})">删除</button>
                    </div>
                </div>
            `;
            list.insertAdjacentHTML('beforeend', newBranch);
        }

        /**
         * 移除并行分支
         */
        function removeBranch(index) {
            const list = document.getElementById('branchList');
            if (!list || !list.children[index]) return;
            list.children[index].remove();
            // 重新编号
            updateBranchNumbers();
        }

        /**
         * 更新分支编号
         */
        function updateBranchNumbers() {
            const list = document.getElementById('branchList');
            if (!list) return;

            Array.from(list.children).forEach((item, index) => {
                const labelInput = item.querySelector('input[id^="branchLabel"]');
                const removeBtn = item.querySelector('.param-remove-btn');

                if (labelInput) labelInput.id = `branchLabel${index}`;
                if (removeBtn) removeBtn.setAttribute('onclick', `removeBranch(${index})`);
            });
        }

        /**
         * 切换重试配置显示
         * @param {string} strategy - 异常处理策略
         */
        function toggleRetryConfig(strategy) {
            const retryConfigGroup = document.getElementById('retryConfigGroup');
            if (retryConfigGroup) {
                retryConfigGroup.style.display = strategy === 'retry' ? 'block' : 'none';
            }
        }

        function closeDrawer() {
            document.getElementById('configDrawer').classList.remove('active');
            selectedNode = null;
            renderCanvas();
        }

        function saveNodeConfig() {
            if (!selectedNode) return;

            // 基础配置
            selectedNode.data.label = document.getElementById('nodeLabel')?.value || '';
            selectedNode.data.description = document.getElementById('nodeDesc')?.value || '';

            // 根据节点类型保存特定配置
            if (selectedNode.type === 'trigger') {
                // 触发器配置
                selectedNode.data.triggerType = document.getElementById('nodeTriggerType')?.value;

                // SYSTOKEN凭证白名单
                const systokenInputs = document.querySelectorAll('.systoken-input');
                selectedNode.data.systokenWhitelist = Array.from(systokenInputs).map((input, index) => ({
                    id: `t${index}`,
                    value: input.value.trim()
                })).filter(item => item.value);

                // 入参配置
                selectedNode.data.inputParams = {
                    header: collectParams(document.getElementById('trigger-input-params-header')),
                    body: collectParams(document.getElementById('trigger-input-params-body')),
                    query: collectParams(document.getElementById('trigger-input-params-query'))
                };
            } else if (selectedNode.type === 'action') {
                // 连接器配置
                selectedNode.data.connectorId = document.getElementById('nodeConnector')?.value;
                selectedNode.data.connectorVersionId = document.getElementById('nodeConnectorVersion')?.value;
                selectedNode.data.outputParams = {
                    header: collectConnectorOutputParams(document.getElementById('connector-output-params-header')),
                    body: collectConnectorOutputParams(document.getElementById('connector-output-params-body'))
                };
            } else if (selectedNode.type === 'output') {
                // 数据输出配置
                selectedNode.data.assembleParams = {
                    header: collectOutputAssembleParams(document.getElementById('output-assemble-params-header')),
                    body: collectOutputAssembleParams(document.getElementById('output-assemble-params-body'))
                };
            } else if (selectedNode.type === 'error') {
                // 异常处理配置
                selectedNode.data.strategy = document.getElementById('nodeErrorType')?.value === 'retry' ? 'retry' : 'ignore';
                selectedNode.data.retryCount = parseInt(document.getElementById('nodeRetryCount')?.value) || 3;
            } else if (selectedNode.type === 'data') {
                // 数据处理配置
                selectedNode.data.transform = document.getElementById('nodeDataTransform')?.value;
                selectedNode.data.outputField = document.getElementById('nodeOutputField')?.value;
            } else if (selectedNode.type === 'condition') {
                // 条件分支配置
                const conditionList = document.getElementById('conditionList');
                if (conditionList) {
                    const conditions = [];
                    Array.from(conditionList.children).forEach((item, index) => {
                        const labelInput = document.getElementById(`condLabel${index}`);
                        const exprInput = document.getElementById(`condExpr${index}`);
                        if (labelInput && labelInput.value.trim()) {
                            conditions.push({
                                id: `cond${index + 1}`,
                                label: labelInput.value.trim(),
                                expression: exprInput?.value || ''
                            });
                        }
                    });
                    selectedNode.data.conditions = conditions;
                }
            } else if (selectedNode.type === 'forLoop') {
                // 循环配置
                selectedNode.data.iterable = document.getElementById('nodeIterable')?.value || '';
                selectedNode.data.itemName = document.getElementById('nodeItemName')?.value || 'item';
            } else if (selectedNode.type === 'parallel') {
                // 并行配置
                const branchList = document.getElementById('branchList');
                if (branchList) {
                    const branches = [];
                    Array.from(branchList.children).forEach((item, index) => {
                        const labelInput = document.getElementById(`branchLabel${index}`);
                        if (labelInput && labelInput.value.trim()) {
                            branches.push({
                                id: `branch${index + 1}`,
                                label: labelInput.value.trim()
                            });
                        }
                    });
                    selectedNode.data.branches = branches;
                }
            }

            closeDrawer();
            renderCanvas();
            showToast('配置已保存', 'success');
        }

        function deleteSelectedNode() {
            if (!selectedNode) return;

            // 触发器不能删除
            if (selectedNode.type === 'trigger') {
                showToast('触发器节点不能删除', 'error');
                return;
            }

            // 删除节点
            nodes = nodes.filter(n => n.id !== selectedNode.id);

            // 删除相关连线
            edges = edges.filter(e => e.source !== selectedNode.id && e.target !== selectedNode.id);

            closeDrawer();
            renderCanvas();
            renderNodeLibrary();
            showToast('节点已删除', 'success');
        }

        // ========================================
        // 连接线
        // ========================================

        /**
         * 处理端口鼠标释放事件，创建连线
         * 支持多种 Handle 类型：
         * - top/bottom: 主流程上下 Handle
         * - body: 循环/异常处理的子节点入口 Handle
         * - 分支ID: 条件分支/并行的多出口 Handle
         */
        function handlePortMouseUp(event, nodeId, portType) {
            event.stopPropagation();

            if (!isConnecting) {
                // 开始连线
                isConnecting = true;
                connectStart = { nodeId, portType };

                // 添加连线中的视觉反馈
                document.body.style.cursor = 'crosshair';
            } else {
                // 结束连线
                document.body.style.cursor = 'default';

                if (connectStart.nodeId !== nodeId) {
                    // 确定 source 和 target
                    let source, target, sourceHandle, targetHandle;

                    const sourceNode = nodes.find(n => n.id === connectStart.nodeId);
                    const targetNode = nodes.find(n => n.id === nodeId);
                    const sourceType = sourceNode ? NODE_TYPES.find(t => t.type === sourceNode.type) : null;
                    const targetType = targetNode ? NODE_TYPES.find(t => t.type === targetNode.type) : null;

                    // 判断连线方向和 Handle
                    // 规则：从上/右/多出口 Handle 出，连接到下/右 Handle 入
                    if (connectStart.portType === 'top' || connectStart.portType === 'body' ||
                        (sourceType?.multiOutput && connectStart.portType !== 'bottom')) {
                        // 从起始节点的指定 Handle 出发
                        source = connectStart.nodeId;
                        sourceHandle = connectStart.portType === 'top' ? null : connectStart.portType;
                        target = nodeId;
                        targetHandle = portType === 'body' ? 'body' : null;
                    } else {
                        // 反向连线
                        source = nodeId;
                        sourceHandle = portType === 'top' ? null : portType;
                        target = connectStart.nodeId;
                        targetHandle = connectStart.portType === 'body' ? 'body' : null;
                    }

                    const edge = {
                        id: generateId(),
                        source: source,
                        target: target,
                        sourceHandle: sourceHandle,
                        targetHandle: targetHandle
                    };

                    // 检查是否已存在相同连线（考虑 Handle 类型）
                    const exists = edges.some(e =>
                        e.source === edge.source &&
                        e.target === edge.target &&
                        e.sourceHandle === edge.sourceHandle &&
                        e.targetHandle === edge.targetHandle
                    );

                    if (!exists) {
                        edges.push(edge);
                        renderCanvas();
                    }
                }

                isConnecting = false;
                connectStart = null;
            }
        }

        // ========================================
        // 保存和返回
        // ========================================
        function handleSave() {
            const config = {
                nodes: nodes.map(n => ({
                    id: n.id,
                    type: n.type,
                    position: { x: n.x, y: n.y },
                    data: n.data
                })),
                edges: edges.map(e => ({
                    source: e.source,
                    target: e.target
                }))
            };

            console.log('保存流程配置:', config);
            showToast('保存成功', 'success');
        }

        function handleBack() {
            window.location.href = 'flow-list.html';
        }

        function navigateTo(page) {
            window.location.href = page;
        }

        // ========================================
        // 初始化
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            // 设置流程名称
            const flowName = getUrlParam('name');
            if (flowName) {
                document.getElementById('flowName').textContent = decodeURIComponent(flowName);
            }

            // 初始化版本按钮状态
            const firstVersion = flowVersionData.versions.find(v => v.id === flowVersionData.currentVersion);
            if (firstVersion) {
                updateVersionActions(firstVersion.status);
                updateCanvasState(firstVersion.status);
            }

            // 初始化节点库
            renderNodeLibrary();

            // 初始化画布
            renderCanvas();

            // ESC键关闭抽屉
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeDrawer();
                }
            });
        });

        // ========================================
        // Tab切换和参数添加辅助函数
        // ========================================

        /**
         * 切换触发器入参Tab
         * @param {string} tabName - Tab名称
         */
        function switchTriggerInputTab(tabName) {
            document.querySelectorAll('#triggerInputTabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active',
                    (tabName === 'header' && btn.textContent === 'HTTP请求头') ||
                    (tabName === 'body' && btn.textContent === 'HTTP请求体') ||
                    (tabName === 'query' && btn.textContent === 'URL查询参数'));
            });
            document.querySelectorAll('#triggerInputContent .tab-panel').forEach(panel => {
                panel.classList.toggle('active', panel.dataset.tab === tabName);
            });
        }

        /**
         * 添加触发器入参参数
         * @param {string} tabName - Tab名称
         */
        function addTriggerInputParam(tabName) {
            const container = document.getElementById(`trigger-input-params-${tabName}`);
            if (container) {
                container.insertAdjacentHTML('beforeend', renderParamItem({}, 0));
                // 添加后隐藏添加按钮
                updateTriggerAddParamBtnVisibility(tabName);
            }
        }

        /**
         * 更新触发器节点添加参数按钮的显示状态
         * @param {string} tabName - Tab名称
         */
        function updateTriggerAddParamBtnVisibility(tabName) {
            const container = document.getElementById(`trigger-input-params-${tabName}`);
            if (!container) return;

            const addBtn = container.closest('.tab-panel').querySelector('.trigger-add-param-btn');
            if (!addBtn) return;

            const hasParams = container.querySelectorAll('.param-item').length > 0;
            addBtn.style.display = hasParams ? 'none' : 'inline-flex';
        }

        /**
         * 切换连接器出参Tab
         * @param {string} tabName - Tab名称
         */
        function switchConnectorOutputTab(tabName) {
            document.querySelectorAll('#connectorOutputTabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active',
                    (tabName === 'header' && btn.textContent === 'HTTP请求头') ||
                    (tabName === 'body' && btn.textContent === 'HTTP请求体'));
            });
            document.querySelectorAll('#connectorOutputContent .tab-panel').forEach(panel => {
                panel.classList.toggle('active', panel.dataset.tab === tabName);
            });
        }

        /**
         * 添加连接器出参参数（已禁用，连接器出参不能手动添加）
         * @param {string} tabName - Tab名称
         */
        function addConnectorOutputParam(tabName) {
            // 连接器出参配置不允许手动添加/删除参数
            // 此函数保留但不做任何操作
        }

        /**
         * 切换数据输出参数组装Tab
         * @param {string} tabName - Tab名称
         */
        function switchOutputAssembleTab(tabName) {
            document.querySelectorAll('#outputAssembleTabs .tab-btn').forEach(btn => {
                btn.classList.toggle('active',
                    (tabName === 'header' && btn.textContent === 'HTTP请求头') ||
                    (tabName === 'body' && btn.textContent === 'HTTP请求体'));
            });
            document.querySelectorAll('#outputAssembleContent .tab-panel').forEach(panel => {
                panel.classList.toggle('active', panel.dataset.tab === tabName);
            });
        }

        /**
         * 添加数据输出参数组装参数
         * @param {string} tabName - Tab名称
         */
        function addOutputAssembleParam(tabName) {
            const containerId = `output-assemble-params-${tabName}`;
            const container = document.getElementById(containerId);
            if (container) {
                container.insertAdjacentHTML('beforeend', renderOutputAssembleParamItem({}, 0, containerId));
                // 更新添加按钮显示状态
                updateOutputAddParamBtnVisibility(containerId);
            }
        }

        /**
         * 添加SYSTOKEN凭证项
         */
        function addSystokenItem() {
            const list = document.getElementById('systokenList');
            if (list) {
                const item = document.createElement('div');
                item.className = 'systoken-item';
                item.innerHTML = `
                    <input type="text" class="form-input systoken-input" placeholder="请输入凭证值">
                    <button type="button" class="btn" onclick="this.parentElement.remove()" style="padding: 6px 12px;">删除</button>
                `;
                list.appendChild(item);
            }
        }

        /**
         * 处理连接器变更
         * @param {string} connectorId - 连接器ID
         */
        function handleConnectorChange(connectorId) {
            const versionSelect = document.getElementById('nodeConnectorVersion');
            const connector = CONNECTOR_DATA[connectorId];

            if (connector) {
                versionSelect.innerHTML = connector.versions.map(v =>
                    `<option value="${v.id}">${v.name}</option>`
                ).join('');
                // 渲染第一个版本的出参配置（只读模式，带配置按钮）
                const firstVersion = connector.versions[0];
                if (firstVersion) {
                    renderConnectorOutputParams('connector-output-params-header', firstVersion.outputParams.header || []);
                    renderConnectorOutputParams('connector-output-params-body', firstVersion.outputParams.body || []);
                }
            } else {
                versionSelect.innerHTML = '<option value="">请先选择连接器</option>';
            }
        }

        /**
         * 处理连接器版本变更
         * @param {string} versionId - 版本ID
         */
        function handleConnectorVersionChange(versionId) {
            const connectorId = document.getElementById('nodeConnector').value;
            const connector = CONNECTOR_DATA[connectorId];
            const version = connector?.versions.find(v => v.id === versionId);

            if (version) {
                renderConnectorOutputParams('connector-output-params-header', version.outputParams.header || []);
                renderConnectorOutputParams('connector-output-params-body', version.outputParams.body || []);
            }
        }
    </script>
